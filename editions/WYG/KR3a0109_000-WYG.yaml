body:
  text: 欽定四庫全書御製執中成憲序惟我皇考法天行健一日萬㡬宵旰不遑猶以其閒簡命儒臣採錄經史子集所載自古帝王元徳顯功訏謨大訓以及名臣奏章先儒語類深切治道者次第進呈皇考親為刪定命曰執中成憲始於雍正六年仲春成於十三年中夏未及刋布而我皇考遽遐棄臣民予小子向雖承訓示一二節全編則未之見也嗣統後每以㡬暇始發而讀之既卒業然後知聖心聖學實與堯舜孔子同揆而汲汲於是編則専以啓迪後人昭垂標凖也間嘗殫思大學一書因見仲尼祖述堯舜之實義焉其所謂眀徳者即虞書所謂道心也所謂眀眀徳者懼其為人心所蔽也所謂格物致知者嚴辨人心道心之界以盡萬事萬物之理即書所謂惟精也所謂正心誠意者力祛人心之雜以致道心之純即書所謂惟一也所謂脩身齊家治國平天下而止於至善者即書所謂允執厥中也然極乎執中之量則惟堯舜為無歉而中之散見扵萬事萬物者則不惟三代聖王即秦漢以後仁厚英哲之君下及中主亦必有一事二事之合焉不獨臯夔益契伊傅周召孔曽思孟即近代羣儒文士亦必有一話一言之合焉故中庸曰舜好問而好察邇言執其兩端用其中扵民盖中之理無事無物而不具亦無人而不知是即明徳之根扵性而不息者而惟舜能察之惟舜能執之惟舜能用之故善與人同合徳扵天地我皇考編定是書自二帝三王之事古聖賢之言下逮羣儒文士之可節取者兼收而不遺用是道也皇考之治天下無一事不審其則無一物能匿其情即書所謂惟精大學所謂物格而知至無一時之不敬無一念之不誠即書所謂惟一大學所謂心正而意誠故凡施於政教者或予或奪或寛或嚴或抑揚遲速之稍有不同而無不立乎大中可為民極即書所謂執中大學所謂身脩家齊國治天下平而眀徳新民皆止扵至善也而所以立綱陳紀更化善治其大者皆斷自聖心而細者亦博採扵衆議有其人不能皆入扵善而一言之中必不廢焉即中庸所謂好問好察執兩用中也然我皇考聰眀睿智夙具於聖性而養成扵聖學者已數十年故皇考之惟精乃不思而得皇考之惟一乃不勉而中皇考之執中而化成天下乃從容中道無為而成豈復有資扵是書所以親為刪定者正恐在後之恫懵然無見扵執中立極之道爰示之以成憲也豈惟予小子奉以終身惟日兢兢無敢踰越哉世世子孫苟能服膺勿失而溯其淵源則扵堯舜孔子之道一以貫之矣豈惟君人者舎是無以建其有極以消天下之偏陂反側哉凡百有位果能是訓是行則上之可輔理成化以著勲猷而下亦可以謹身而寡過扵以謨眀弼諧共臻喜起眀良之盛無難矣乾隆丙辰三月望日欽定四庫全書子部一御定執中成憲儒家類提要臣等謹案御定執中成憲八卷雍正六年春世宗憲皇帝勅撰雍正十三年夏書成奏進仰䝉裁定宣付武英殿校刋乾隆三年告蕆御製序文頒行前四卷錄帝堯以來至明孝宗嘉言善政後四卷皆唐虞至明諸臣論説有所禆于治道者其或奥㫖未顯疑義未明則折衷以論以闡發其理藴評斷其是非昔孔子刪書斷自唐虞始著帝王經世之法後來遞相推衍互有發明御製之書惟唐之帝範敷陳得失為最悉官撰之本惟明之君鑒縷舉事迹為最詳然帝範頗叅雜説詞意或不深醇君鑑旁摭諸書義例亦為冗雜至於宋之洪範政鑒以焦贛京房之説附㑹於武王箕子之文益離其宗盖聖人之道統惟聖人能傳之聖人之治法亦惟聖人能述之非可以強而及也我世宗憲皇帝聖徳神功上超三古闡明帝學論定是編汰駁存精刪繁舉要凡遺文舊籍一經持擇即作典謨猶虞帝𫝊心親闡執中之理殷宗典學自述成憲之監也雖百篇之裁於洙泗何以加兹家法貽留以鞏萬世之丕基者豈偶然歟乾隆四十八年三月恭校上總纂官臣紀昀臣陸錫臣孫士毅總校官臣陸費墀欽定執中成憲目錄子部一卷一儒家類唐帝堯虞帝舜夏王禹商王湯商王太甲商王盤庚商王武丁周文王周武王周成王周康王周穆王漢髙祖皇帝漢太宗孝文皇帝卷二漢孝景皇帝漢世宗孝武皇帝漢中宗孝宣皇帝漢世祖光武皇帝漢顯宗孝眀皇帝漢肅宗孝章皇帝漢孝和皇帝晉世祖武皇帝南齊世祖武皇帝梁髙祖武皇帝魏太宗眀元皇帝魏髙祖孝文皇帝魏世宗宣武皇帝唐髙祖皇帝唐太宗皇帝卷三唐太宗皇帝唐徳宗皇帝唐憲宗皇帝唐文宗皇帝唐宣宗皇帝後周世宗皇帝宋太祖皇帝宋太宗皇帝宋真宗皇帝宋仁宗皇帝宋神宗皇帝宋髙宗皇帝宋孝宗皇帝宋理宗皇帝金世宗皇帝金章宗皇帝元太祖皇帝元憲宗皇帝元世祖皇帝元仁宗皇帝卷四眀太祖髙皇帝眀成祖文皇帝眀仁宗昭皇帝眀宣宗章皇帝眀憲宗純皇帝眀孝宗敬皇帝卷五唐虞商周卷六漢三國卷七晉南北朝隋唐宋上卷八宋下金元眀
