body:
  text: 欽定四庫全書欽定執中成憲卷一唐帝堯書稽于衆舍己從人不虐無告不廢困窮惟帝時克論語堯曰咨爾舜天之厯數在爾躬允執其中六韜帝堯王天下之時吏忠正奉法者尊其位亷潔愛人者厚其祿民有孝慈者愛敬之盡力農桑者慰勉之旌别淑慝表其門閭平心正節以法度禁邪僞所憎者有功必賞所愛者有罪必罰存養天下鰥寡孤獨賑贍禍亡之家其自奉也甚薄其賦役也甚寡故萬民富樂而無饑寒之色家語帝富而不驕貴而能降伯夷典禮夔龍典樂流四凶而天下服其言不忒其德不回新書帝堯曰吾存心於先古加意於窮民痛萬姓之罹罪憂衆生之不遂也故一民或饑曰此我饑之也一民或寒曰此我寒之也一民有罪曰此我陷之也仁行而義立德博而化富故不賞而民勸不罰而民治先恕而後行虞帝舜書敷奏以言眀試以功車服以庸象以典刑流宥五刑鞭作官刑撲作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉詢于四嶽闢四門眀四目達四聰咨十有二牧曰食哉惟時柔逺能邇惇德允元而難任人蔡沈集𫝊元仁厚之人也難拒絶也任包藏凶惡之人也帝曰咨汝二十有二人欽哉惟時亮天功三載考績三考黜陟幽眀庶績咸熙帝曰臯陶惟兹臣庶罔或干豫正汝作士眀于五刑以弼五教期于豫治刑期于無刑民協于中時乃功懋哉臯陶曰帝德罔愆臨下以簡御衆以寬罰弗及嗣賞延于世宥過無大刑故無小罪疑惟輕功疑惟重與其殺不辜寧失不經好生之德洽于民心兹用不犯于有司帝曰人心惟危道心惟微惟精惟一允執厥中無稽之言勿聽弗詢之謀勿庸可愛非君可畏非民衆非元后何戴后非衆罔與守邦欽哉慎乃有位敬修其可願帝曰吁臣哉鄰哉鄰哉臣哉蔡沈曰臣以人言鄰以職言帝曰豫違汝弼汝無面從退有後言欽四鄰庶頑讒說若不在時侯以眀之撻以記之書用識哉欲竝生哉工以納言時而揚之格則承之庸之否則威之蔡沈曰在時指忠直為言侯射侯也眀者欲眀其果頑愚讒說與否也撻撲也蓋懲之使記而不忘也識志也録其過惡以志於册也帝庸作歌曰敇天之命惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉臯陶拜手稽首揚言曰念哉率作興事慎乃憲欽哉屢省乃成欽哉乃賡載歌曰元首眀哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事墮哉帝拜曰俞往欽哉中庸孔子曰舜好問而好察邇言隱惡而揚善執其兩端用其中於民孟子舜聞一善言見一善行若決江河沛然莫之能禦也孔子曰舜其至孝矣五十而慕禮記有虞氏貴德而尚齒養國老於上庠養庶老於下庠孔子曰虞帝君天下子民如父母有憯怛之愛有忠利之教親而尊安而敬威而愛富而有禮惠而能散家語舜之為君也其政好生而惡殺其任授賢而替不肖德若天地而靜虛化若四時而變物是以四海承風暢於異類鳳翔麟至鳥獸馴德無他好生故也虞舜寬裕而溫良敦敏而知時畏天而愛民恤逺而親近御製論虞舜好生而惡殺蓋生者發育長養之意是以聖人好之殺者閉藏收斂之威是以聖人惡之二者皆天地四時自然之功用故下文曰德若天地而靜虛化若四時而變物蓋天地以靜虛為德故其生殺也以神應而無心四時以變物為能故其生殺也亦化行於不悖觀風霆雨露之兼施秋肅春溫之迭嬗則知天地四時之有殺正天地四時之惡殺正天地四時之好生也聖人合天地四時以為心故惡殺而不能不用殺如四凶之誅五刑之作皆堯舜好生惡殺之實心實政若務好生之虛名而以無殺為惡殺則其流必出於姑息之一途政寬民慢如水弱之玩而多死是非真能惡殺乃適成其為好殺也豈天地好生惡殺之心豈聖人好生惡殺之道乎帝堯之言曰一人有罪此我陷之也惟存此心然後可以惡殺蓋眀罰敇法正以遏惡揚善順天休命期於人人皆知逺殺其斯為真能惡殺者乎新書舜曰吾盡吾敬以事吾上故見謂忠焉吾盡吾敬以接吾敵故見謂信焉吾盡吾敬以使吾下故見謂愛焉夏王禹書禹曰后克艱厥后臣克艱厥臣政乃乂黎民敏德又曰惠迪吉從逆凶惟影響又曰德惟善政政在養民水火金木土榖惟修正德利用厚生惟和九功惟叙九叙惟歌戒之用休董之用威勸之以九歌俾勿壞禹克勤于邦克儉于家不自滿假又曰知人則哲能官人安民則惠黎民懷之又曰民可近不可下民惟邦本本固邦寧又曰先王克謹天戒臣人克有常憲百官修輔厥后惟眀眀蔡沈曰修輔者各修其職以輔其君也御製論人君出治仰承天命俯臨百官必也上之眀於天戒而省愆修德以承眷佑之恩下之眀於百官修輔之道而選才任能以收贊襄之益故曰厥后惟眀眀也苟不能眀於天戒是不知敬天固無足論矣不能眀於百官修輔之道必至賢否混淆誠僞雜出失辨才論官之宜而庶績皆為叢脞矣是以百官修輔之當眀與眀天戒而並重也孟子禹惡旨酒而好善言史記禹為人敏給克勤其德不違其仁可親其言可信聲為律身為度稱以出亹亹穆穆為綱為紀晉書大禹聖者乃惜寸陰商王湯書王曰惟皇上帝降衷于下民若有恆性克綏厥猷惟后又曰爾有善朕弗敢蔽罪當朕躬弗敢自赦惟簡在上帝之心其爾萬方有罪在豫一人豫一人有罪無以爾萬方仲虺曰惟王不邇聲色不殖貨利德懋懋官功懋懋賞用人惟已改過不吝克寬克仁彰信兆民又曰王懋昭大德建中于民以義制事以禮制心垂裕後昆伊尹曰先王肇修人紀從諫弗咈先民時若居上克眀為下克忠與人不求備檢身若不及又曰敷求哲人俾輔于爾後嗣傅說曰監于先王成憲其永無愆詩不競不絿不剛不柔敷政優優百祿是遒大學湯之盤銘曰苟日新日日新又日新孟子湯執中立賢無方史記湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣及禽獸御製論成湯解網三面史記以為諸侯恱服稱其德及禽獸由斯而言則是聖人當日設為解網之事以籠絡人心聳動觀聽類於權術之為非聖人之心也且既有解網之仁則當其放桀南巢何為不解網而釋之乎以此詰問將不免於後人之疑矣朕謂聖人之心至公無私慶賞刑威皆因物付物而已所執之法如網張於一面而三面皆虛左右之間皆人人可生之地乃人或不肯由三面以自全而甘心蹈一面之網則聖人亦無如之何矣若夏桀者自蹈於一面之網者也書曰天討有罪聖人奉若天道而已何所容心於其間哉湯曰人視水見形視民知治不商王太甲書王曰天作孽猶可違自作孽不可逭御製論天以仁愛為心必無作孽於人之理此皆由人之自取也其云天作孽者乃人有過失天降災異以示警而人能恐懼修省自可潜為轉移故曰猶可違也若有過愆而上天垂訓仍無忌憚不知畏懼故曰自作孽也其能逭乎商王盤庚書王曰若網在綱有條而不紊若農服田力穡乃亦有秋蔡沈曰綱舉則目張喻下從上也力於田𤱔則有秋成之望喻勤有功也御製論為政之道大綱舉而後衆目張所謂大綱者莫有過於農事田功也是以聖人知服田力穡之為綱而所其無逸惟念小民之依則乃亦有秋者即網之有條而不紊也由是而家給人足時和年豐百度之修眀萬邦之作乂莫不於農事統之矣又曰汝分猷念以相從各設中于乃心蔡沈曰分猷者分君之所圖而共圗之分念者分君之所念而共念之相從相與也中者極至之理謂各以極至之理存于心也御製論分猷分念人臣之職也但事有至當之理不及不可過亦不可所謂中也若能得中則所分之猷所分之念皆有益於國計民生苟不得中則雖有佐理之才何能獲贊襄之益乎而此大中之理又不待外求也人性皆善返之此心而自得故曰各設中于乃心商王武丁書說命曰朝夕納誨以輔台德若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳若跣弗視地厥足用傷蔡沈曰啓乃心者開其心而無隱沃朕心者溉我心而厭飫也弗瞑眩喻臣之言不苦口也弗視地喻我之行無所見也又曰股肱惟人良臣惟聖御製論股肱之道左右元首與庶司百職承流宣化者不同故必得其人乃可以翊贊君上康濟兆民若居股肱之任而不能盡股肱之道則非其人矣是即伊尹所稱任官惟賢才左右惟其人之義也至於才全德備盡啓沃寅亮之功而為良臣者此乃禹臯稷契伊尹周公之流立臣道之極所謂聖人者也故曰良臣惟聖若云良臣輔而君聖何以良臣如箕子比干而不能輔導君德於萬一乎此専為臣道而發者况辭意顯然甚易眀曉後人因聖字不敢居遂勉強詮解大失本旨矣又曰惟后非賢不乂乂治也惟賢非后不食食食祿也其爾克紹乃辟于先王永綏民御製論惟賢非后不食舊說賢人待食於君斯亦淺之乎言賢矣朕謂賢非后不食者乃聖賢之心必欲得君以行其道否則憂國憂民寢食為之不寧又或如易井泄不食禮記穫而弗食之義言賢者抱道而不遇主譬猶清泉嘉榖而不得為人所食也詩天命降監下民有嚴不僣不濫不敢怠遑命于下國封建厥福朱子曰言天命降監不在乎他皆在民之視聽則下民亦有嚴矣惟賞不僣刑不濫而不敢怠遑則天命之以天下而大建其國此商宗所以受命而中興也周文王書武王曰文王克眀德慎罰不敢侮鰥寡庸庸祗祗威威顯民蔡沈曰用其所當用敬其所當敬威其所當威一聽於理而已無與焉故德著於民周公曰文王卑服即康功田功蔡沈曰卑服即禹所謂惡衣服也康功安民之功田功養民之功徽柔懿恭懷保小民惠鮮鰥寡自朝至于日中昃不遑暇食用咸和萬民詩維此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國雍雍在宫肅肅在廟朱子曰在閨門之中則極其和在宗廟之中則極其敬不顯亦臨無射亦保朱子曰雖幽隱亦若有臨之者雖無厭斁亦若有所守不聞亦式不諌亦入朱子曰無所前聞自合於法雖無諌諍亦入於善肆成人有德小子有造古之人無斁譽髦斯士朱子曰言文王之德純亦不已故令斯士皆有譽於天下而成其俊乂之美大學詩云穆穆文王於緝熙敬止為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信孟子詩云王赫斯怒爰整其旅以遏徂莒以篤周祜以對於天下此文王之勇也文王一怒而安天下之民文王視民如傷望道而未之見御製論常人不能見道而自妄以為聞道者無足論矣若夫文王乃生安之聖身在道中動容周旋自然中道從心所欲皆合天理渾然與道為一孟子曰望道而未之見者此正言文王聖不自聖惟恐或離於中道即無斁亦保之義也禮記詩曰眀發不寐有懷二人文王之詩也祭之眀日饗而致之又從而思之逸周書文王召太子發曰我所保與所守𫝊之子孫吾厚德而廣惠不為驕侈不為泰靡童牛不服童馬不馳童牛犢也童馬駒也不服不馳所以長養之也士不失其宜萬物不失其性天下不失時以成萬材萬材已成牧以為人即孟子所謂斧斤以時入山林材木不可勝用之意天下利之而勿德是為大仁周武王書王曰惟天地萬物父母惟人萬物之靈亶聰眀作元后元后作民父母御製論臯陶曰天聰眀自我民聰眀武王曰天視自我民視天聽自我民聽是天不自聰眀而以百姓之視聽為聰眀聰眀而以百姓之視聽為聰眀為人主者必能眀四目達四聰以天下人之耳目為耳目方能理無不燭物無不照謂之亶聰眀而克盡元后父母之道其自恃為神靈天縱者非亶聰眀之道也又曰我聞吉人為善惟日不足又曰天視自我民視天聽自我民聽百姓有過在豫一人又曰天畏棐忱蔡沈曰天命不常雖甚可畏然誠則輔之民情大可見小人難保往盡乃心無康好逸豫乃其乂民我聞曰怨不在大亦不在小惠不惠懋不懋蔡沈曰惠者順於理懋者勉於行言民之怨不在事之大小惟視在上之能順與不能順能勉與不能勉耳御製論聖人以仁民愛物為心自無斂怨之理以大公至正為道亦無避怨之方斂怨者咈百姓以從已之欲者也避怨者違道以干百姓之譽者也夫己之欲必不可從而百姓之譽亦不可干何也天下之人心不同則含怨之情亦異善者之所不怨者必惡者之所怨惡者之所不怨者必善者之所怨是以為人君者不在乎辨怨端之大小而為之去就不在乎統怨端之大小而為之趨避惟問我之所行惠與不惠懋與不懋而已吾果惠而順於理即任怨之意果懋而勤於事即任勞之意則在己者信無可怨兆庶之廣即中有怨之之人而無可怨之實則雖怨猶不怨也不能如是則不怨猶怨也實心愛民之君臣常任怨任勞而有所不恤不辭即如子産古之賢臣也為政之初百姓怨之逮及三年百姓頌之同一子産也同一民情也同一子産之政也而先後之間民情迥異如此然則為政者惟凖於理而已何所用其取舍哉又曰人有小罪非眚眚謂過誤乃惟終自作不典謂其固為亂常之事式爾謂用意如此有厥罪小乃不可不殺乃有大罪非終乃惟眚災適爾謂偶爾如此既道極厥辜謂盡輸其情時乃不可殺又曰人無于水監當于民監水監能見人之妍醜民監則其得失可知論語謹權量審法度修廢官四方之政行焉興滅國繼絶世舉逸民天下之民歸心焉中庸武王善繼人之志善述人之事孟子書曰天降下民作之君作之師惟曰其助上帝寵之四方有罪無罪惟我在天下曷敢有越厥志一人衡行於天下武王恥之此武王之勇也而武王亦一怒而安天下之民御製論君師之道非有兩端君師之責亦非分屬為君者教養並施正德利用厚生缺一不可其理自兼為師是師道即在君道之中未有為君而不兼師者也為師者以先知覺後知以先覺覺後覺而君道亦寓孔子為萬世師表其所垂之道法人人尊奉率由實如臣服且千古帝王無不奉令而承教則君道即在師道中矣君師之任有不可岐視者武王不泄邇不忘逺大戴禮武王踐阼召師尚父而問焉曰黃帝顓頊之道存乎師尚父曰在丹書書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶王聞書之言惕若恐懼退而為戒書席銘曰安樂必敬無行可悔一反一側亦不可以忘席所以為安故因為戒鑑銘曰見爾前慮爾後鑑所以為眀故因為戒帶銘曰慎戒必恭恭則夀帶所以為禮故因為戒屨履之銘曰慎之勞勞則富屨履所以為行故因為戒牖銘曰隨天之時以地之財敬祀皇天敬以先時牖所以受天眀故因為戒劍銘曰帶之以為服動必行德行德則興劍所以為佩故因為戒周成王書惟周王撫萬邦巡侯甸四征弗庭綏厥兆民六服羣辟罔不承德歸于宗周董正治官王曰若昔大猷制治于未亂保邦於未危曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯庶政惟和萬國咸寧夏商官倍亦克用乂眀王立政不惟其官惟其人今豫小子祗勤于德夙夜不逮仰惟前代時若訓迪厥官立太師太傅太保兹惟三公論道經邦燮理陰陽官不必備惟其人少師少傅少保曰三孤二公𢎞化寅亮天地弼豫一人冡宰掌邦治統百官均四海司徒掌邦教敷五典擾兆民宗伯掌邦禮治神人和上下司馬掌邦政統六師平邦國司寇掌邦禁詰奸慝刑暴亂司空掌邦土居四民時地利六卿分職各率其屬以倡九牧阜成兆民六年五服一朝又六年王乃時巡考制度于四嶽諸侯各朝于方嶽大眀黜陟王曰嗚呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反以公滅私民其允懷學古入官議事以制政乃不迷其爾典常作之師無以利口亂厥官蓄疑敗謀怠忽荒政不學牆面蒞事惟煩戒爾卿士功崇惟志業廣惟勤惟克果斷乃罔後艱位不期驕祿不期侈恭儉惟德無載爾僞作德心逸日休作僞心勞日拙居寵思危罔不惟畏弗畏入畏不知祗畏則入於可畏之中推賢讓能庶官乃和不和政龎舉能其官惟爾之能稱匪其人惟爾不任王曰嗚呼三事暨大夫敬爾有官亂爾有政以佑乃辟永康兆民萬邦惟無斁王曰我聞曰至治馨香感于神眀黍稷非馨眀德惟馨爾尚式時周公之猷訓惟日孜孜無敢逸豫又曰爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德嗚呼臣人咸若時惟良顯哉御製論成王此語乃向君陳而言故教以善則歸君一德一心之義當如此也若為臣者果有嘉謀嘉猷入告於君可以福蒼生而利社稷則為君者亦自揚播於衆以表彰其善焉蓋君陳臣也故成王訓以為臣之道而成王之所以為君者已在不言之表矣若言成王為一偏之論則大失古聖王垂訓之深意苦心也又曰寬而有制從容以和又曰必有忍其乃有濟有容德乃大越絶書成王時賞賜不加於無功刑罰不加於無罪天下家給人足禾黍茂美使人以時說之以禮說苑成王曰凡處尊位者必以敬下順德撙節安靜以藉之諌者勿振以威勿格以言博采其詞乃擇可觀夫有文無武無以威下有武無文民畏不親文武俱行威德乃成既成威德民服以親周康王書王曰旌别淑慝表厥宅里彰善疸惡樹之風聲弗率訓典殊厥井疆俾克畏慕申畫郊圻慎固封守蔡沈曰申申眀慎戒嚴也以康四海又曰資富能訓蔡沈曰資猶藉也謂藉於富而能率循教訓惟以永年惟德惟義時乃大訓不由古訓于何其訓又曰罔曰弗克惟既厥心罔曰民寡惟慎厥事欽若先王成烈以休于前政蔡沈曰弗克者畏其難而不敢為民寡者易其事以為不足為周穆王書王曰夏暑雨小民惟曰怨咨冬祈寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧蔡沈曰艱者饑寒之艱易者衣食之易又曰昔在文武聰眀齊聖小大之臣咸懷忠良其侍御僕從罔非正人以旦夕承弼厥辟出入起居罔有不欽發號施令罔有不臧下民祗若萬邦咸休又曰慎簡乃僚無以巧言令色便辟側媚其惟吉士又曰雖畏勿畏雖休勿休惟敬五刑以成三德一人有慶兆民賴之其寧惟永孔頴達曰汝所行事雖見畏勿自謂可敬畏雖見美勿自謂有德美欲其謙而勿自恃也惟當敬慎用此五刑以成剛柔正直之三德以輔我天子天子有善事則億兆賴之此乃安寧久長之道也又曰兩造具備師聽五辭五辭簡孚正于五刑五刑不簡正于五罰五罰不服正于五過蔡沈曰兩造兩爭者皆至也具備者詞證皆在也師衆也五辭麗於五刑之辭也簡核其實也孚無可疑也正質也五辭簡核而可信乃質於五刑也不簡者辭與刑參差不應刑之疑者也罰贖也疑於刑則質於罰也不服者辭與罰又不應罰之疑者也過誤也疑於罰則質於過而宥免之也又曰五刑之疑有赦五罰之疑有赦孔安國曰刑疑赦從罰罰疑赦從免御製論刑罰之疑而後有赦疑者其事曖昧而難知游移而莫定聖人罪疑惟輕故赦之也若無可疑則無可赦矣帝王之道賞不僣而刑不濫夫刑之失入固為濫而失出亦為濫後世相沿於刑罰之情狀顯然供證歷歷者猶屢加平反而減等以示寬則是於不疑者亦矜恤之矣若復援肆赦之文槩為宥釋則姑息之害其濫不亦甚乎有眀刑之責者極當詳慎又曰上刑適輕下服下刑適重上服輕重諸罰有權刑罰世輕世重惟齊非齊有倫有要蔡沈曰事在上刑而情適輕則服下刑舜之宥過無大也事在下刑而情適重則服上刑舜之刑故無小也輕重諸罰有權者權一人之輕重也刑罰世輕世重者權一世之輕重也惟齊非齊者法之權也有倫有要者法之經也言刑罰雖惟權變是適而齊之以不齊至其倫要所在蓋有截然而不可紊者又曰非佞折獄惟良折獄罔非在中察辭于差非從惟從哀敬折獄眀啓刑書胥占咸庶中正其刑其罰其審克之蔡沈曰非口才辨給之人可以折獄惟溫良長者視民如傷者能折獄而無不在中此言聽獄者當擇其人也察辭於差者辭非情實終必有差聽訟之要必於其差而察之非從惟從者察辭不可偏主猶曰不然而然所以審輕重而取中也哀敬折獄者惻怛敬畏以求其情也眀啓刑書胥占者詳眀法律而與衆占度也咸庶中王者皆庶幾其無過忒也於是刑之罰之又當審克之此言聽獄者當盡其心也漢髙祖皇帝前漢書項籍將季布數窘帝項籍滅帝購求布千金滕公言於上上乃赦布召拜郎中布母弟丁公亦為項籍將逐窘帝彭城西短兵接帝急顧曰兩賢豈相厄哉丁公引兵而還及項籍滅丁公謁見帝以徇軍中曰丁公為臣不忠使項王失天下者也遂斬之曰使後世為人臣無效丁公也髙祖寬眀而仁恕知人善任使加之以誠信好謀達於聽受見善如不及用人如由己從諌如順流趨時如響赴英雄陳力羣策畢舉漢太宗孝文皇帝史記上曰蓋聞天道禍自怨起而福由德興百官之非宜由朕躬今祕祝之官移過於下以彰吾之不德朕甚不取其除之前漢書文帝曰法正則民慤顔師古曰慤謹也罪當則民從詔曰方春和時草木羣生之物皆有以自樂而吾百姓鰥寡孤獨窮困之人或阽於死亡如淳曰阽近邉欲墮之意而莫之省憂為民父母將何如其議所以振貸之顔師古曰振起也為給貸之令其存立也詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂朕憂其然故今兹親率羣臣農以勸之其賜天下民今年田租之半詔曰道民之路在於務本朕親率天下農十年於今而野不加闢嵗一不登民有饑色是從事焉尚寡而吏未加務也吾詔書數下嵗勸民種樹顔師古曰樹謂藝殖也而功未興是吏奉吾詔不勤而勸民不眀也且吾農民甚苦而吏莫之省將何以勸焉其賜農民今年租稅之半制詔御史蓋聞有虞氏之時畫衣冠異章服以為戮而民弗犯何治之至也今法有肉刑三而姦不止黥劓刖左右趾其咎安在非乃朕德之薄而教不眀與吾甚自愧故夫訓道不純而愚民陷焉詩曰愷悌君子民之父母今人有過教未施而刑已加焉或欲改行為善而道無繇至朕甚憐之夫刑至斷支體刻肌膚終身不息顔師古曰息生也何其刑之痛而不德也豈稱為民父母之意哉其除肉刑有以易之詔曰先王逺施不求其報望祀不祈其福右賢左戚顔師古曰以賢為上然後及親也先民後已至眀之極也今吾聞祠官祝釐皆歸福於朕躬不為百姓朕甚愧之其令祠官致敬無有所祈詔諸侯王公卿郡守舉賢良能直言極諌者上親策詔之曰昔者大禹勤求賢士施及方外四極之內舟車所至人迹所及靡不聞命以輔其不逮近者獻其眀逺者通厥聰比善戮力以翼天子是以大禹能亡失德夏以長楙顔師古曰楙美也髙皇帝親除大害去亂從顔師古曰亂謂作亂者從謂合從者並建豪英以為官師為諌諍輔天子之闕而翼戴漢宗也賴天之靈宗廟之福方內以安澤及四夷今朕獲執天下之正以承宗廟之祀朕既不德又不敏眀不能燭而智不能治此大夫之所著聞也故詔有司諸侯王三公九卿及主郡吏各帥其志以選賢良眀於國家之大體通於人事之始終及能直言極諌者各有人數將以匡朕之不逮二三大夫之行當此三道張晏曰三道國體人事直言也朕甚嘉之故登大夫於朝親諭朕志大夫其上三道之要及永惟朕之不德吏之不平政之不宣民之不寧四者之闕悉陳其志毋有所隱上以薦先帝之宗廟下以興愚民之休利著之於篇朕親覽焉觀大夫所以佐朕至與不至書之周之密之重之閉之興自朕躬顔師古曰言朕自發視之大夫其正論毋枉執事張晏曰毋為有司枉撓也烏呼戒之二三大夫其帥志毋怠詔曰閒者數年比不登又有水旱疾疫之災朕甚憂之愚而不眀未達其咎意者朕之政有所失而行有過與乃天道有不順地利或不得人事多失和鬼神廢不享與何以致此將百官之奉養或費無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益以口量地其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃為酒醪以靡榖者多六畜之食焉者衆與細大之義吾未能得其中其與丞相列侯吏二千石博士議之有可以佐百姓者率意逺思無有所隱文帝每朝郎從官上書疏未嘗不止輦受其言不可用置之言可採未嘗不稱善孝文皇帝時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行日三十里朕乘千里之馬獨先安之於是還馬與道里費而下詔曰朕不受獻也其令四方毋求來獻欽定執中成憲卷一
