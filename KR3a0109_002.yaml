body:
  text: 欽定四庫全書欽定執中成憲卷二漢孝景皇帝前漢書詔曰法令度量所以禁暴止邪也獄人之大命死者不可復生吏或不奉法令以貨賂為市朋黨比周以苛為察以刻為眀令亡罪者失職顔師古曰失其常理也朕甚憐之有罪者不伏罪姦法為暴李斐曰姦法因法作姦也甚亡謂也諸獄疑若雖文致於法而於人心不厭者輒讞之顔師古曰厭服也讞平議也詔曰雕文刻鏤傷農事者也錦繡纂組害女紅者也農事傷則饑之本也女紅害則寒之原也夫饑寒並至而能亡為非者寡矣朕親耕后親桑以奉宗廟粢盛祭服為天下先不受獻減大官省繇賦欲天下務農蠶素有蓄積以備災害強毋攘弱衆毋暴寡老耆以夀終幼孤得遂長今嵗或不登民食頗寡其咎安在或詐僞為吏吏以貨賂為市漁奪百姓侵牟萬民縣丞長吏也姦法與盜盜顔師古曰與盜盜者共盜為盜耳甚亡謂也其令二千石各修其職不事官職耗亂者顔師古曰耗不眀也丞相以聞請其罪詔曰農天下之本也黃金珠玉飢不可食寒不可衣以為幣用不識其終始顔師古曰幣者所以通有無易貴賤也間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸韋昭曰發民用其民取庸用其資以顧用采黃金珠玉者坐臧為盜謂與盜贓同罪二千石聽者與同罪詔曰高年老長人所尊敬也鰥寡不屬逮者罪非己造為人所纍曰逮不屬逮不連及也人所哀憐也其著令年八十以上八嵗以下及孕者未乳師朱儒如淳曰師樂師盲瞽者朱儒短人不能走者當鞠繫者頌繫之顔師古曰頌寬容之不桎梏也漢世宗孝武皇帝前漢書詔丞相御史列侯中二千石二千石諸侯相舉賢良方正直言極諌之士丞相衛綰奏所舉賢良或治申商韓非蘇秦張儀之言請皆罷奏可詔曰公卿大夫所使總方略一統類廣教化美風俗也夫本仁祖義褒德録賢勸善刑暴五帝三王所由昌也朕夙興夜寐嘉與宇內之士臻於斯路故旅耆老顔師古曰旅耆老者加惠於耆老之人若賓旅也復孝敬選豪俊講文學稽參政事祈進民心深詔執事興廉舉孝庶幾成風紹休聖緒夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也二千石官長紀綱人倫將何以佐朕燭幽隱勸元元厲蒸庶崇鄉黨之訓哉且進賢受上賞蔽賢蒙顯戮古之道也其與中二千石禮官博士議不舉者罪御製論漢武帝下求賢之詔而曰議不舉者罪蓋其求賢若渴之意迫切於中故其形於教令者如此夫知人則哲古帝其難之故人不難於舉而難於所舉之公且眀也使臣工果賢則不待罪之而自能舉即或不舉亦必有不舉之故舉不舉公當則均有益即此亦可以觀舉者之心志如臣工未必皆賢則所舉何能盡當又豈可繩之以法使之借口以不得已濫舉塞責乎古者進賢受上賞蔽賢䝉顯戮蓋謂素所深知之賢而媢嫉遏抑不與同升耳非概言不舉者俱加之以重罰也詔曰仁不異逺義不辭難顔師古曰逺近如一是為仁也不憚艱難是為義也今京師雖未為豐年山林池澤之饒與民共之今水潦移於江南迫隆冬至朕懼其饑寒不活江南之地火耕水耨應劭曰燒草下水種稻草與稻並生高七八寸因悉芟去復下水灌之草死獨稻長所謂火耕水耨方下巴蜀之粟致之江陵遣博士等分循行諭告所抵無令重困抵至也謂分循所至無令煩擾使饑寒之民重受其困也吏民有振救饑民免其厄者具舉以聞詔曰農天下之本也泉流灌寖所以育五榖也左右內史地京畿所統曰內史言其在內以别於諸郡守也其地即京兆馮翊扶風三輔之地名山川原甚衆細民未知其利故為通溝瀆畜陂澤所以備旱也今內史稻田租挈重不與郡同顔師古曰租挈收田租之約令也郡謂四方諸郡也其議減令吏民勉農盡地利平繇行水勿使失時顔師古曰平繇者均齊渠堰之力役謂俱得水利也漢中宗孝宣皇帝前漢書令郡臣得奏封事以知下情五日一聽事自丞相以下各奉職奏事以敷奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜詔曰朕既不逮導民不眀反側晨興念慮萬方不忘元元惟恐羞先帝聖德故並舉賢良方正以親萬姓歷載臻兹然而俗化闕焉𫝊曰孝弟也者其為仁之本與其令郡國舉孝弟有行義聞於鄉里者各一人詔曰死者不可生刑者不可息顔師古曰息生長也此先帝之所重而吏未稱今繫者或以掠辜若饑寒瘦死獄中蘇林曰囚徒病律名為瘦何用心逆人道也朕甚痛之其令郡國嵗上繫囚以掠笞若瘦死者所坐名縣爵里丞相御史課殿最以聞詔曰獄者萬民之命所以禁暴止邪養育羣生也能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律二端深淺不平增辭飾非以成其罪奏不如實上亦亡繇知此朕之不眀吏之不稱四方黎民將何仰哉二千石各察官屬勿用此人吏務平法或擅興繇役飾厨𫝊稱過使客越職踰法以取名譽譬猶踐薄冰以待白日豈不殆哉今天下頗被疾疫之災朕甚愍之其令郡國被災甚者毋出今年租賦詔曰蓋聞天子尊事天地修祀山川古今通禮也閒者上帝之祠闕而不親十有餘年朕甚懼焉朕親飭躬齊戒親奉祀為百姓蒙嘉氣獲豐年焉詔曰蓋聞上古之治君臣同心舉措曲直各得其所是以上下和洽海內康平其德弗可及已朕既不眀數申詔公卿大夫務行寬大順民所疾苦將欲配三王之隆眀先帝之德也今吏或以不禁姦邪為寬大縱釋有罪為不苛或以酷惡為賢皆失其中奉詔宣化如此豈不繆哉方今天下少事繇後省減兵革不動而民多貧盜賊不止其咎安在上計簿計簿謂戶口錢榖之數及案訊諸囚論課殿最之簿也每嵗終郡國遣使詣京師上之具文而已務為欺謾以避其課三公不以為意朕將何任諸請詔省卒徒自給者皆止御史察計簿疑非實者按之使真僞毋相亂詔曰潁川太守黃霸宣布詔令百姓嚮化孝子悌弟貞婦順孫日以衆多田者讓畔道不拾遺養視鰥寡贍助貧窮獄或八年無重罪囚吏民嚮於教化興於行誼可謂賢人君子矣其賜爵關內侯黃金百斤漢世祖光武皇帝後漢書帝封功臣皆為列侯下詔曰人情得足苦於放縱快須臾之欲忘慎罰之義惟諸將業逺功大誠欲𫝊於無窮宜如臨深淵如履薄氷戰戰栗栗日慎一日詔曰世以厚葬為德薄終為鄙至於富者奢侈貧者單財李賢曰單盡也法令不能禁禮義不能止其布告天下令知忠臣孝子慈兄悌弟薄葬送終之義異國有獻名馬者日行千里又進寶劍賈兼百金詔以馬駕鼓車劍賜騎士損上林池籞之官廢騁望弋獵之事其以手跡賜方國者皆一札十行細書成文勤約之風行於上下詔曰有德之君以所樂樂人無德之君以所樂樂身樂人者其樂長樂身者不久而亡舍近謀逺者勞而無功舍逺謀近者逸而有終漢顯宗孝眀皇帝後漢書詔曰方春戒節人以耕桑其敇有司務順時氣使無煩擾今選舉不實邪佞未去權門請託殘吏放手李賢曰放手謂貪縱為非有司眀奏罪名並正舉者李賢曰舉非其人並正舉主之罪又郡國每因徴發輕為姦利詭責羸弱先急下貧詭猶僞也下猶賤也縱豪強故詭責嬴弱緩富實故先急下貧其務在均平無令枉刻詔曰喪貴致哀禮存寧儉今百姓送終之制競為奢靡生者無儋石之儲而財力盡於墳土伏臘無糟糖而牲牢兼於一奠糜破積世之業以供終朝之費子孫饑寒豈祖考之意哉又車服制度恣極耳目田荒不耕遊食者衆有司具申眀科禁宜於今者宣下郡國漢肅宗孝章皇帝後漢書詔曰三事大夫李賢曰三事三公也莫肻夙夜小雅之所傷也豫違汝弼汝無面從股肱之正義也羣后百僚勉思厥職各貢忠誠稱朕意焉詔曰昔仲弓季氏之家臣子遊武城之小宰孔氏猶誨以賢才問以得人眀政無大小以得人為本夫鄉舉里選必纍功勞今刺史守相不眀真僞茂才孝亷嵗以百數既非能顯而當授之政事能顯謂才能顯著甚無謂也每尋前世舉人貢士或起甽畞不繫閥閲敷奏以言則文章可採眀試以功則政有異迹文質彬彬朕甚嘉之其令太傅三公中二千石郡國守相舉賢良方正能直言極諌之士各一人詔曰蓋三代導人教學為本孔子曰學之不講是吾憂也於戲其勉之哉漢孝和皇帝後漢書詔曰隄防溝渠所以順助地理通利壅塞今廢慢懈弛不以為負刺史二千石其隨宜疏導勿因緣妄發以為煩擾將顯行其罰晉世祖武皇帝晉書詔曰雖詔有所欲及奏得可而於事不便者皆不可隱情詔以汲郡太守王宏勤恤百姓督勸開荒五千餘頃遇年普饑而郡界獨無匱乏其賜榖千斛布告天下南齊世祖武皇帝南齊書有司以天文失度請禳之上曰應天以實不以文我克己求治思隆惠政若災眚在我禳之何益詔曰婚禮下達人倫攸始周官設媒氏之職國風興及時之詠四爵內陳義不期侈三鼎外列事豈存奢晚俗浮麗歷兹永久每思懲革而民未知禁乃聞同牢之費華泰尤甚膳羞方丈有過王侯富者扇其驕風貧者恥躬不逮或以供帳未具動致推遷年不再來盛時忽往宜為節文頒之士庶並可擬則公朝方樏供設合卺之禮無虧寧儉之義斯在如故有違繩之以法梁髙祖武皇帝梁書詔曰經國有體必詢諸朝所以尚書置令僕丞郎旦旦上朝以議時事前共籌懷然後奏聞頃者不爾每有疑事倚立求决古人有云主非堯舜何得發言便是是故放勳之聖猶咨四嶽重華之睿亦待多士豈朕寡德所能獨斷自今尚書中有疑事前於朝堂參議然後啓聞不得習常其軍機要切前須咨審自依舊典魏太宗眀元皇帝魏書敇有司勸課留農者曰前志有之人生在勤勤則不匱凡庶民之不畜者祭無牲不耕者祭無盛不樹者死無槨不蠶者衣無帛不績者喪無衰教行三農生殖五榖教行園囿育長草木教行虞衡山澤作材教行藪牧養蕃鳥獸教行百工飭成器用教行商賈阜通貨賄教行嬪婦化治絲枲教行臣妾事勤力役自是民皆力勤故歲數豐穰畜牧滋息魏髙祖孝文皇帝魏書詔曰今牧民者與朕共治天下也宜簡其徭役先之勸奬相其水陸務盡地利使農夫外布桑婦內勤若輕有徴發致奪民時以侵擅論民有不從長教惰於農桑者加以罪刑詔曰婚娉過禮則嫁娶有失時之弊厚葬送終則生者有糜費之苦聖王知其如此故申之以禮數約之以法禁乃者民漸奢尚婚葬越軌致貧富相髙貴賤無别朕今憲章舊典祇案先制著之律令永為定準詔曰朕承祖宗夙夜惟懼然聽政之際猶慮未周至於案文審獄思聞已過自今羣官奏事當獻可替否無或面從俾朕之過彰於逺近詔曰文武之道自古並行威福之地必也相藉故三五至仁尚有征伐之事夏殷眀睿未捨兵甲之行然則天下雖平忘戰者殆不教民戰可謂棄之是以周立司馬之官漢置將軍之職皆所以輔文強武威肅四方者矣國家雖崇文以懷九服修武以寧八荒然於習武之方猶為未盡今則訓文有典教武闕然將於馬射之前先行講武之式可敇有司豫修場埓其列陳之儀五戎之數别俟後敇詔曰三載考績自古通經三考黜陟以彰能否今若待三考然後黜陟可黜者不足為遲可進者大成賖緩是以朕今三載一考考即黜陟欲令愚滯無妨於賢者才能不壅於下位各令當曹考其優劣為三等六品以下尚書重問五品以上朕將親與公卿論其善惡上上者遷之下下者黜之中中者守其本任北史詔禁圖䜟祕緯諸巫覡假稱鬼神妄說吉凶及委巷諸非墳典所載者嚴加禁斷魏世宗宣武皇帝魏書詔曰諸州刺史不親民事緩於督察郡縣稽逋旬月之間才一覽决淹獄久訟動延時序百姓怨嗟方成困弊尚書可眀條制申下四方令日親庶事嚴敇守宰不得因循寬怠虧政唐髙祖皇帝舊唐書詔皇族子孫及功臣子弟於祕書外省别立小學髙祖命劉文靜與當朝通識之士更刋律令謂曰本設法令使人共解而往代相承多為隱語執法之官緣此舞弄宜更刋定務使易知西突厥曷薩那可汗獻大珠於髙祖髙祖勞之曰珠信為寶朕所重者赤心珠無所用竟不受之孫伏伽初以三事上諌三事謂納諌諍戒遊戲及擇任太子諸王羣僚也髙祖覽之大恱下詔曰秦以不聞其過而亡典籍豈無先誡臣僕諂諛故弗之覺也漢髙祖反正從諌如流洎乎文景繼業宣元承緒不由斯道孰隆景祚周隋之季忠臣結舌一言喪邦良足深誡永言於此常深歎息朕每惟寡薄恭膺寶命雖不能性於天道庶思勉力常冀弼諧以匡不逮而羣工卿士罕進直言將申虗受之懷物所未諭萬年縣法曹孫伏伽至誠慷慨詞義懇切指陳得失無所回避非有不次之舉曷貽利行之益伏伽既懷諒直宜處憲司可治書侍御史仍頒示逺近知朕意焉雍州萬年人宋興貴纍世同居躬耕致養至興貴已四從矣髙祖聞而嘉之詔曰人稟五常仁義為重士有百行孝敬為先自古哲王經邦致治設教垂範皆尚於斯叔世澆訛人多僞薄修身克己事資誘勸朕躬膺靈命撫臨四海愍兹弊俗方思遷導宋興貴立操雍和志情友穆同居合㸑纍代積年務本力農崇謙履順𢎞長名教敦立風俗宜加褒顯以勸將來可表其門閭蠲免課役布告天下使眀知之髙祖賜髙麗王建武書曰朕恭膺寶命君臨率土祇順三靈綏柔萬國普天之下情均撫字日月所照咸使乂安王既統攝遼左世居藩服思稟正朔逺循職貢故遣使者跋涉山川申布誠懇朕甚嘉焉方今六合寧晏四海清平玉帛既通道路無壅方申輯睦永敦聘好各保疆場豈非盛美但隋氏季年連兵搆難攻戰之所各失其民遂使骨肉乖離室家分析多歷年嵗怨曠不申今二國通和義無阻異在此所有高麗人等已令追括尋即遣送彼處有此國人者王可放還務盡撫育之方共𢎞仁恕之道於是建武悉搜括華人以禮賓送前後至者萬數唐太宗皇帝貞觀政要中書令房𤣥齡奏言秦府舊左右未得官者並怨前宫及齊府左右處分之先己太宗曰古稱至公者蓋謂平恕無私丹朱商均子也而堯舜廢之管叔蔡叔兄弟也而周公誅之故知君人者以天下為公無私於物昔諸葛孔眀小國之相猶曰吾心如稱不能為人作輕重况我今理大國乎朕與公等衣食出於百姓此則人力已奉於上而上恩未被於下今所以擇賢才者蓋為求安百姓也用人但問堪否豈以新故異情凡一面尚且相親况舊人而頓忘也才若不堪亦豈以舊人而先用今不論其能不能而直言其嗟怨豈是至公之道耶太宗謂侍臣曰為君之道必須先存百姓若損百姓以奉其身猶割股以啖腹腹飽而身斃欲安天下必須先正其身未有身正而影曲上理而下亂者朕每思傷其身者不在外物皆由嗜欲以成其禍若耽嗜滋味玩恱聲色所願既多所損滋大既妨政事又擾生人至於出一非理之言則萬姓為之解體怨讟既作離叛亦興朕每思此不敢縱逸又曰正主任邪臣不能致理正臣事邪主亦不能致理惟君臣相遇有同魚水則海內可安朕雖不眀幸諸公數相匡救冀憑直言鯁議致天下太平謂蕭瑀曰朕少好弓矢自謂能盡其妙近得良弓十數以示弓工乃曰皆非良材也朕問其故工曰木心不正則脈理皆邪弓雖剛徑而遣箭不直非良弓也朕始悟焉朕以弧矢定四方用弓多矣而猶不得其理况朕有天下之日淺得為理之意固未及於弓弓猶失之而况於理乎自是詔京官五品以上更宿中書內省每召見皆賜坐與語詢訪外事務知百姓利害政教得失焉有上書請去佞臣者太宗謂曰朕之所任皆以為賢卿知佞者誰耶對曰臣居草澤不的知佞者請陛下佯怒以試羣臣若能不畏雷霆直言進諫則是正人順情阿旨則是佞人太宗謂封德彜曰流水清濁在其源也君者政源人庶猶水君自為詐欲臣下行直是猶源濁而望水清理不可得朕常以魏武帝多詭詐深鄙其為人如此豈可堪為教令謂上書人曰朕欲使大信行於天下不欲以詐道訓俗卿言雖善朕所不取也太宗從容謂侍臣曰周武平紂之亂以有天下秦皇因周之衰遂吞六國其得天下不殊祚運長短若此之相懸也尚書右僕射蕭瑀進曰紂為無道天下苦之故八百諸侯不期而㑹周室微六國無罪秦氏専任智力吞食諸侯平定雖同人情則異太宗曰不然周既克殷務𢎞仁義秦既得志専行詐力非但取之有異抑亦守之不同祚之修短意在兹乎又曰人有眀珠莫不貴重若以彈雀豈非可惜况人之性命甚於眀珠見金錢財帛不懼刑網徑即受納乃是不惜性命眀珠是身外之物尚不可彈雀何况性命之重乃以博財物耶羣臣若能備盡忠直益國利人則官爵立至皆不能以此道求榮遂妄受財物贓賄既露其身亦殞實為可笑帝王亦然恣情放逸勞役無度信任羣小疏逺忠正有一於此豈不滅亡隋煬帝奢侈自賢身死匹夫之手亦可為笑謂房𤣥齡曰自此倘有樂工雜類假使術逾儕輩者只可特賜錢帛以賞其能必不可超授官爵與夫朝賢君子比肩而立同坐而食遺諸衣冠以為恥纍謂侍臣曰朕今孜孜求士欲専心政道聞有好人則抽擢驅使而議者多稱彼皆宰臣親故公等但至公行事勿避此言便為形迹古人內舉不避親外舉不避讐為舉得其賢故也但能舉用得才雖是子弟及有讐嫌不得不舉王圭拜諫議大夫每推誠盡節多所獻納太宗謂曰卿所論皆中朕之失自古人君莫不欲社稷永安然而不得者祗為不聞己過或聞而不能改故也今朕有所失卿能直言朕復聞過能改何慮社稷之不安乎謂朝集使曰任土作貢布在前典當州所産則充庭實比聞都督刺史邀射聲名厥土所賦或嫌其不善踰竟外求更相倣效遂以成俗極為勞擾宜改此弊不得更然謂侍臣曰朕謂亂離之後風俗難移比觀百姓漸知亷恥官人奉法盜賊日稀故知人無常俗但政有治亂耳是以為國之道必須撫之以仁義示之以威信因人之心去其苛刻不作異端自然安靜公等宜共行此事也又曰眀主思短而益善暗主護短而永愚朕今志在君臣上下各盡至公共相切磋以成理道公等各宜務盡忠讜匡救朕惡終不以直言忤意輒相責怒又曰人言作天子則得自尊崇無所畏懼朕則以為正合自守謙恭常懷畏懼昔舜誡禹曰汝惟不矜天下莫與汝爭能汝惟不伐天下莫與汝爭功又易曰人道惡盈而好謙凡為天子若惟自尊崇不守謙恭者在身倘有不是之事誰肻犯顔諌奏朕每思出一言行一事必上畏皇天下懼羣臣天髙聽卑何得不畏羣公卿士皆見瞻仰何得不懼以此思之但知常謙常懼猶恐不稱天心及百姓意也太常少卿祖孝孫奏所定新樂太宗曰禮樂之作是聖人緣物設教以為撙節治政善惡豈此之由御史大夫杜淹對曰前代興亡實由於樂陳將亡也為玉樹後庭花齊將亡也而為伴侣曲行路聞之莫不悲泣所謂亡國之音以是觀之實由於樂太宗曰不然夫音聲豈能感人歡者聞之則恱哀者聽之則悲悲恱在於人心非由樂也將亡之政其人心苦然苦心相感故聞則悲耳何樂聲哀怨能使恱者悲乎今玉樹伴侣之曲其聲俱存朕能為公奏之知公必不悲耳謂侍臣曰古人云君猶器也人猶水也方圓在於器不在於水故堯舜率天下以仁而人從之桀紂率天下以暴而人從之下之所行皆從上之所好至如梁武帝父子惟好釋氏老氏之教終日談論苦空未嘗以軍國典章為意及侯景率兵向闕尚書郎以下多不解乘馬孝元帝在於江陵為萬紐于謹所圍猶講老子不輟百寮皆戎衣以聽此事亦足為鑒戒朕今所好者惟在堯舜之道周孔之教以為如鳥有翼如魚依水失之必死不可暫無耳又曰朕每夜恆思百姓閒事或至夜半不寐惟恐都督刺史或不堪養百姓故於屏風上録其姓名坐臥恆看在官如有善事亦具列於名下朕居深宫之中視聽不能及逺所委者惟都督刺史此輩實理亂所繫尤須得人又曰朕嘗謂貪人不解愛財也至如內外官五品以上祿秩優厚一年所得其數自多若受人財賄不過數萬一朝彰露祿秩削奪此豈是解愛財物規小得而大失者也且為主貪必喪其國為臣貪必亡其身詩云大風有隧貪人敗類固非謬言也昔秦惠王欲伐蜀不知其徑乃刻五石牛置金其後蜀人見之以為牛能便金蜀王使五丁力士拖牛入蜀道成秦師隨而伐之蜀國遂亡漢大司農田延年贓賄三千萬事覺自死如此之流何可勝記朕今以蜀王為元龜卿等亦須以延年為覆轍也謂房𤣥齡等曰朕比見隋代遺老咸稱髙熲善為相者遂觀其本𫝊可謂公平正直尤識治體又漢微巳來諸葛亮為丞相亦甚平直陳夀稱亮之為政開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰卿等豈可不企慕及之朕今每慕前代帝王之善者卿等亦可慕宰相之賢者謂公卿曰朕終日孜孜非但憂憐百姓亦欲使卿等長守富貴天非不髙地非不厚朕常兢兢業業以畏天地卿等若能小心奉法常如朕畏天地非但百姓安寧自身常得歡樂古人云賢者多財損其志愚者多財生其過此言可為深誡若狥私貪濁非止壞公法損百姓縱事未發閒中心豈不常懼恐懼既多亦有因而致死大丈夫豈得苟貪財物以害及身命使子孫每懷愧恥耶卿等宜深思此言謂房𤣥齡等曰自古帝王多任情喜怒喜則濫賞無功怒則濫殺無罪是以天下喪亂莫不由此朕今夙夜未嘗不以此為心恆欲公等盡情極諌公等亦須受人諌語豈得以人言不同己意便即護短不納若不能受諌安能諫人謂侍臣曰治國與養病無異也病人覺愈彌須將護若復觸犯必至殞命治國亦然天下稍安尤須兢慎若便驕逸必至喪敗今天下安危繫之於朕故日慎一日雖休勿休然耳目股肱寄於卿輩既義均一體宜協力同心事有不安可極言無隱倘君臣相疑不能備盡肝膈實為國之大害也又曰朕比見衆議以祥瑞為美事頻有表賀慶如朕本心但使天下太平家給人足雖無祥瑞亦可比德於堯舜夫為人君當須至公理天下以得萬姓之歡心若堯舜在上百姓敬之如天地愛之如父母動作興事人皆樂之發號施令人皆恱之此是大祥瑞也自此後諸州所有祥瑞並不用申奏又曰天下愚人者多智人者少智者不肻為惡愚人好犯憲章凡赦宥之恩惟及不軌之輩古語云小人之幸君子之不幸一嵗再赦善人喑啞凡養稂莠者傷禾稼惠姦宄者賊良人昔文王作罰刑兹無赦又蜀先主嘗謂諸葛亮曰吾周旋陳元方鄭康成之間每見啓告理亂之道備矣曽不語赦故諸葛亮理蜀十年不赦而蜀大化梁武帝每年數赦卒至傾敗夫謀小仁者大仁之賊故我有天下已來絶不放赦今四海安寧禮義興行非常之恩彌不可數將恐愚人常冀僥幸惟欲犯法不能改過謂左庶子于志寧杜正倫曰卿等輔導太子常須為說百姓間利害事朕年十八猶在民間百姓艱難無不諳練及居帝位每商量處置或時有乖疏得人諫諍方始覺悟若無忠諌者為說何由行得好事况太子生長深宫百姓艱難都不聞見乎且人主安危所繫不可輒為驕縱但出敇云有諌者即斬必知天下士庶無敢更發直言故克己勵精容納諌諍卿等常須以此意共相談說每見有不是事宜極言切諫令有所裨益也謂侍中魏徴曰自古侯王能自保全者甚少皆由生長富貴好尚驕逸多不解親君子逺小人故爾朕所有子弟欲使見前言往行冀其以為規範因命徴録古來帝王子弟成敗事名為自古諸侯王善惡録以賜諸王謂侍臣曰朕每閒居靜坐則自內省恆恐上不稱天心下為百姓所怨但思正人匡諫欲令耳目外通下無怨滯又比見人來奏事者多有怖懾言語致失次第尋常奏事情猶如此况欲諫諍必當畏犯逆鱗所以每有諫者縱不合朕心朕亦不以為忤若即嗔責深恐人懷戰懼豈肻更言又曰往昔初平京師宫中美女珍玩無院不滿煬帝意猶不足徴求無巳兼東西征討窮兵黷武百姓不堪遂致滅亡此皆朕所目見故夙夜孜孜惟欲清淨使天下無事遂得徭役不興年榖豐稔百姓安樂夫治國猶如栽樹本根不搖則枝葉茂榮君能清淨百姓何得不安樂乎又曰林深則鳥栖水廣則魚遊仁義積則物自歸之人皆知畏避災害不知行仁義則災害不生夫仁義之道當思之在心常令相繼若斯須懈怠去之已逺猶如飲食資身恆令腹飽乃可存其性命又曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以眀得失朕嘗保此三鏡以防己過今魏徴殂逝遂亡一鏡矣謂諫議大夫褚遂良曰朕所為事若有不當或有其漸或已將終皆宜進諌比見前史或有人臣諫事遂答云業已為之或道業已許之竟不為停改此則危亡之禍可反手而待也詔曰比來有司斷獄多據律文雖情在可矜而不敢違法守文定罪或恐有寃自今門下省復有據法合死而情在可矜者宜録狀奏聞欽定執中成憲卷二
