body:
  text: 欽定四庫全書欽定執中成憲卷八宋范純仁曰博覽羣䇿通逹下情使四方利病必聞羣下之能否皆見然後可以布順民之政恢太平之風又曰道逺者理當馴政事大者不可速成人才不可以急求積弊不可以頓革道不馴致則有揠苖之患事欲速成則有不逹之憂人急求則才佞進而巧偽生弊頓革則人情擾而怨憤作程子曰養民者以愛其力為本民力足則生養遂然後教化可行風俗可美是故善為政者必重民力又曰聖人為戒必於方盛之時方盛慮衰則可以防其滿極而圖其永乆至於既衰而後戒則無及矣又曰王者奉若天道動無非天者命則天命也討則天討也盡天道者王道也又曰任人之道以慎擇為本擇之慎故信之篤信之篤故任之專擇之慎則必得其賢信之篤則人致其誠任之專則得盡其才又曰雖公天下事若用私意為之便是私又曰天地之生萬物之成合而後遂天下國家至於事為之末所以不遂者由不合也所以不合者由有間也故間隔者天下之大害聖王之必去也又曰以含容之量施剛果之用乃聖賢之為也又曰朝廷之上推賢援能者登進之蔽賢自任者疎逺之自然天下嚮風以薦逹為急務搜拔既廣則士益貴而守益堅亷耻格而風俗厚矣又曰王道如砥本乎人情出乎禮義若履大路而行無復回曲又曰凡避嫌者皆内有不足處所為誠公矣何嫌之足避乎又曰事以急而敗者十常七八又曰事君者知人主不當自聖則不為諂諛之言知人臣義無私交則不為阿黨之計又曰人臣之義位愈髙而思所以報國者當愈勤張子曰以責人之心責已則盡道以愛已之心愛人則盡仁又曰心既虚則公平公平則是非較然易見當為不當為之事自知又曰當為而為之雖殺人皆義也有心為之雖善皆私也劉摯曰小人之才非不足用特心之所向不在乎義故希賞之志每在事先奉公之心每在私後范祖禹曰當食則思天下有饑而不得食者當衣則思天下有寒而不得衣者於凡事莫不皆然推至誠以召和氣庻幾皇天報應降豐年之祥使百姓皆家給人足矣又曰古之賢君聞有災害惟責人之不言其救災惟恐不及於事不徒專信守臣奏報恐言者之小其事以緩君心之憂也又曰凡事言於未然則誠為過及其己然則又無所及人君寧受未然之言勿遺無及之悔彭汝礪曰凡國之政教刑禁之要宜以時布於州縣鄉保使有司讀諭而教之其言如是則其法如是其罪如是則其刑如是使天下之民知天子所以教愛之如此而得有所避也刑可得而省矣王居正曰論節損者當知隨時以省事不在隨事以省費雖一切減半計其實未嘗不重費也惟計百事之實而論定之茍非禦寇備敵賑恤百姓皆從姑置則費省而國裕矣吕中曰任用大臣必擇徳望與才智兼備者有才智而無徳望以鎮之則未足以服天下之心有徳望而無才智以充之則未足以濟天下之事李新曰天下之事莫尚於宻聖人之功無易於勤尚宻則無敗事貴勤則無棄功李綱曰人臣之言不激切不足以動主聴而激切則有過當之患人主之聴不廣大不足以盡人言而廣大則有紛擾之患故辭順理直而匪訐者言之善也博詢精考而不惑者聴之公也又曰孝子之於親豈必待其愛而後孝忠臣之於君豈必待其信而後忠哉亦自盡其誠而已又曰凡所施為勿太遽以致騷擾勿太緩以失機㑹則事得其序不擾而辦天下無不可為之事亦無不可為之時惟失其時則患之小者日益大事之易者日益難又曰興衰撥亂之主非英哲不足以當之英則用心剛足以涖大事而不為小故之所揺哲則見善明足以任君子而不為小人之所間楊時曰天下重任非狷忿褊迫者所能勝也狷忿褊迫臨大事不能無輕動輕動則失事機難與成功又曰君臣相與之際當以誠意為主胡安國曰聖人心無偏繫如鏡之無妍醜也因事物善惡而施褒貶賞罰焉不期公而自公爾岳飛曰文臣不愛錢武臣不惜死天下太平矣范成大曰克知灼見知人之眀也其次莫若公公非即眀而可以生眀葢去胸中之私喜怒用天下之公是非以進退天下之才斯十得八九矣羅從彦曰立朝之士當愛君如愛父愛國如愛家愛民如愛子然三者未嘗不相因也凡人愛君則必愛國愛國則必愛民未有以君為心而不以民為心者又曰教化者朝廷之先務亷恥者士人之美節風俗者天下之大事朝廷有敎化則士人有廉恥士人有亷恥則天下有風俗又曰朝廷之法不可不嚴有司行法不可不恕不嚴則不足以禁天下之惡不恕則不足以通天下之情王十朋曰財有限而用無窮生財不如節財省用斯能足用朱子曰天生一世人才自足一世之用但有聖賢之君在上熏蒸陶冶中材以下自能改變以其平日為已之心為公家辦事自然修舉又曰今人説輕刑者只見所犯之人為可憫如刼盜殺人人多為之求生殊不念死者無辜是知為盜賊計而不為良民計也又曰為政必有規矩使奸胥猾吏不得行其私然後刑罰可省賦歛可薄又曰天下之事有緩急之勢朝廷之政有緩急之宜當緩而急則繁細苛察無以存大體而朝廷之氣為之不舒當急而緩則怠慢廢弛無以赴事機而天下之事日入於壊又曰愛人必先節用葢國家財用皆出於民如有不節而用度或闕則横賦暴歛必将有及於下者又曰凡人胸次煩擾則愈見昏昧中有定止則自然光眀又曰聖人之心涵育發生真與天地同徳而物或自逆於理以干天誅則夫輕重取舍之間自有決然不易之理其宥過非私恩其刑故非私怒罪疑而輕非姑息功疑而重非過子如天地四時之運寒凉肅殺常居其半而涵養發生之心未始不流行乎其間又曰修徳之實在乎去人欲存天理人欲不必聲色貨利之娛宮室觀遊之侈也但存諸心者小失其正便是人欲必也存祗懼之心以畏天擴寛𢎞之度以盡下不敢自是而欲人必已同不徇偏見而謂衆無足取出入起居發號施令念兹在兹不敢忘怠而又擇端人正士剛眀忠直能盡言極諫者與居左右務使此心虚眀廣大平正中和表裏洞然無一毫私意之累然後為徳之修而上可以格天下可以感人凡所欲為無不如志又曰集衆思者易為力專已智者難為功又曰聖人之心雖曰好賞而不能賞無功之士雖曰惡刑而不敢縱有罪之人茍功罪之實曉然而無疑則雖欲輕之重之而不可得是乃所以為平也又曰當官勿避事亦勿侵事又曰天下非艱難多事之可憂而宴安酖毒之可畏政使功成治定無一事可為尚當朝兢夕惕居安慮危而不可以少怠又曰朝廷設官求賢故在上者不當以請托而薦人士人當有禮義亷恥故在下者不當自衒鬻而求薦又曰獄事人命所繫尤當盡心近世流俗惑於隂徳之論多以縱出有罪為能而不思善良之無告此最弊事不可不戒然哀矜勿喜之心則不可無也張栻曰人君事天宜求諸視聽言動之間一念纔是便是上帝鑒觀一念纔不是便是上帝震怒又曰胸中着一寛字寛必有弊着一猛字猛必有弊處事當如持衡髙者抑之低者揚之則常平矣又曰壅蔽者天下之大患也去之之道莫先於虚已莫要於任賢虚已則壅蔽消於内任賢則壅蔽撤於外内外無蔽而下情畢通矣又曰治獄所以不得其平者葢由矜智巧以為聰眀持姑息以惠姦慝上則視大官之趨向而重輕在手下則惑胥吏之浮言而二三其心不盡其情而一以威怵之不原其初而一以法繩之如是而能得其平者寡矣呂祖謙曰宴安者衆惡之門也賢者入之而愚眀者入之而昏剛者入之而懦潔者入之而汙豈不甚可畏耶又曰百種巧偽不如一實反復變詐不如慎始防人猜疑不如自慎智數周密不如省事不易之道也胡寅曰難强莫如怠心難制莫如欲心難降莫如驕心難平莫如怒心難觧莫如疑心難正莫如偏心魏了翁曰古之人君以天位為至艱至危如履虎尾如蹈春氷如痌瘝乃身故無一時可縱弛無一事不戒慎無一刻可暇逸無一息敢肆欲也自朝至昃兢兢業業居内之日常少居外之時常多不獨勞於民事葢亦所以養夀命之原保身以保民耳陳傅良曰太虚清眀天之體也將以潤物則為雨露將以動物則為風雷將以成物則為霜雪俄而開霽天體湛然纖翳不留三光如故人主喜則為賞怒則為刑刑賞既行更無凝滯心宇㤗定即天徳也真徳秀曰公事在官是非有理輕重有法不可任已私而咈公理亦不可屈公法以徇人情諸葛亮有言我心如秤不能為人作輕重此有位之士所當法也然人之情每以私勝公者葢徇貨賄則不能公任喜怒則不能公黨親昵畏豪雄顧禍福計利害則皆不能公殊不思是非之不可易者天理也輕重之不可踰者國法也以是為非以非為是則逆乎天理矣以輕為重以重為輕則違乎國法矣又曰為大臣者必以羣下有言為救己之過而不以為形己之短以為愛己而不以為輕己以為助己而不以為異己然後能盡事物之理又曰委任臣工君之大體躬親聽斷君之大權二義竝行初不相悖趙方曰催科不擾是催科中撫字刑罰不差是刑罰中教化崔與之曰天生人才自足以供一代之用惟辨其君子小人而已金髙琪曰聖主以宗廟社稷為心法上天行健之義憂勤庻政夙夜不遑乃太平之階也石琚曰天子之富藏於天下正如泉源欲其流通耳圖克坦鎰曰為政之要在正臣下之心凡行義無取者抑而下之則趨向自正茍羣臣不眀禮義難以責小民之從化唐括安禮曰世無全才當廣取士之路而區别器使之元好問曰人習於惡勞事艱於慮始惟強也故能立天下之懦惟堅也故能易天下之難元亷希憲曰丈夫見義勇為禍福無預於已謂臯夔稷契伊傅周召為不可及是自棄也喀喇托克托曰敬天莫先勤民民安其業則災沴自弭奕赫抵雅爾丁曰讀律不能變通以適事宜譬之醫者雖善方論而不能切脉用藥於疾痛奚益許衡曰治人者法也守法者人也人法相維上安下順則不勞而治又曰古人舉賢不敢自名欲恩澤出於君也刑人亦然不可使人知出於已如月星皆借日以為光與日相逺則光盛猶臣逺於君則聲名大威權重及近日却失其光臣道隂道理當如此又曰人心猶印板然板本不差雖摹千萬本皆不差本既差矣摹之於紙無不差者又曰地力之生物有數人力之成物有限取之有度用之有節則常足取之無度用之無節則常不足生物之豐歉由天用物之多少由人又曰推勘公事已得其情適當其法不旁求深入是即利人也俗吏不逹此理專以出罪為心謂之隂徳夫履正奉公嫉惡舉善人臣之道也有違於此則惡者當害之而反利之善者當利之而反害之顯不能逃其刑責幽不能欺於神眀隂徳何有焉王鶚曰應天者惟以至誠拯民者莫如實惠吳澄曰居官以亷為本然不眀則為吏所蔽雖亷何補眀矣而其心不仁則深刻嚴酷縱其下漁獵躪躒畧無惻隠之意或其心雖仁而短於裁決徒有仁心而民不被其澤仁而不能故也或其才雖能而意之所向不無少偏終亦不免於疵能而未公故也全此五善乃可為官又曰士大夫治官如治家則何事不可辦又曰學以眀義理仕以行政事所眀者本所行者用也本之所培者深則用之所逹者優陳祐曰大臣貴和不貴同和於義則公道昭眀同於利則私怨萌生揭徯斯曰為政以儲才為要養之於位望未隆之先而用之於經歴庻務之後則無失材廢事之患余闕曰知祖宗得天下之難則必能求其所以得之之道矣知其所以得天下之道則知所以保天下之道矣孟子曰三代之得天下也以仁此祖宗得天下之道也易曰何以守位曰仁此子孫保天下之道也富珠哩翀曰聖人之治天下其為道也動與天準其為法也燦若列星使民畏罪遷善而吏不敢舞智御人葢鞭笞斧鉞與禮樂教化相為表裏及其至則民協於中刑措不用道法本無二故也陳天祥曰國家之與百姓上下如同一身民乃國之血氣國乃民之膚體血氣完實則膚體康强未有耗其血氣而能使膚體豐榮者是故民富則國富民貧則國貧民安則國安民困則國困其理然也眀劉基曰夫將以一身統三軍者也三軍之耳目齊於一人故耳齊則聰目齊則明心齊則一萬夫一力天下無敵宋濓曰天生烝民莫不有欲欲動情勝詭偽日滋强暴縱其侵陵柔懦無以自立故聖人設刑憲以為之防欲使惡者知懼而善者獲寜傳所謂獄者萬民之命所恃以禁暴止邪養育羣生者也譬諸禾黍必刈稂莠而後苖始茂茍梗化敗俗之徒不誅雖堯舜不能以為治王禕曰古今之變不同儀章制度不能久而無弊及其既弊則必損益之以求其當審其宜而後可行而其本在乎因天道順人情故禮之本所以合理也不可不同禮之用所以適變也不必盡同又曰人君莫先於法天道莫急於順人心法天道順人心則存於心者自然忠厚施於政者自然廣大祈天永命之道未有越此者又曰法有定論而兵無常形出入離合動有節制向背取舍各適事機非特人莫知吾之所以然雖吾亦不能先必其所以然譬之槃之走丸丸走於槃縱横圜直繫於臨時不可必知所可必知者丸之不能出於槃也方孝孺曰治天下有道仁義禮樂之謂也治天下有法慶賞刑威之謂也古之為法者以仁義禮樂為榖粟而以慶賞刑威為鹽醢故功成而民不病棄榖粟而食鹽醢此亂之所由生也又曰人君之學莫大於治心立政而治心之術有五持敬以弭安肆之萌寡欲以遏侈縱之漸養慈愛之端以充其仁伐驕泰之氣以固其守擇賢士自輔以閑其邪五者立然後可以為政而為政之方有七眀而不至於苛寛而不流於縱嚴而不近於刻仁而不溺於無斷智而不入於詐妄納諫而能委任無逸而能不變此為政之本也于謙曰用兵之法不測如隂陽難知如鬼神貴在臨期應變難以一定而求去來之間如飄風驟雨應敵之餘非勇無以挫其鋒非智無以破其詐必謀勇兼濟而後可以成功又曰華夏蠻貊之人皆係朝廷赤子兵刑不得已而施貴在恩威並行然後人無不服故防奸禦侮之道固難一於招撫亦難專於誅殺葢可撫則撫可捕則捕貴在相機而行隨宜而處也薛瑄曰為政當以公平正大行之是非毁譽皆所不恤必欲曲徇人情使人人譽悦則失公正之體非君子之道也又曰法立貴乎必行立而不行徒為虚文適足以啟下人之玩又曰世有賣法以求賄者此誠何心哉夫法所以治奸頑也奸頑有犯執法以治之則良善者獲伸矣若納賄而縱釋奸頑則良善之寃抑何自而伸哉使良善之寃抑不伸是不惟不能治奸頑而又所以長奸頑也據髙位載顯名秉三尺者忍為此乎又曰治獄有四要公慈明剛公則不偏慈則不刻眀則能照剛則能斷又曰不欺君自不欺心始又曰正以處心亷以律已忠以事君㳟以事長信以接物寛以待下敬以處事此居官之七要也又曰固不可假公法以報私讐亦不可假公法以報私徳又曰世之廉者有三有見理眀而不妄取者有尚名節而不茍取者有畏法律保爵禄而不敢取者見理眀而不妄取無所為而然上也尚名節而不茍取狷介之士其次也畏法律保爵禄而不敢取則勉强而然斯又為次也又曰堯典以欽之辭始益稷以欽之辭終則堯舜傳心之要可知矣又曰法者天討也或重或輕一付之無心可也或治奸頑而務為寛縱暴其小慈欲使人感已之惠其慢天討也甚矣李時勉曰國家所恃長乆者天命與人心也而天命常視人心為去留欲得人心必敦敎化必修禮讓必遂其生養必足其衣食使其知父子君臣之義被道徳仁義之化休養田里不見貪殘之政將災沴不作太平可臻呂坤曰廟堂之上以養正氣為先海宇之内以飬元氣為本能使賢人君子無鬰心之言則正氣培矣能使羣黎百姓無腹誹之語則元氣固矣又曰人情之所易忽莫如漸天下之大可畏莫如漸漸之始也雖君子不以為意有謂其當防者雖君子亦以為迂不知其積重難返之勢天地聖人亦無如何其所由來者漸也又曰四肢百骸一痛癢間心無不知一脉相通之故也守令者郡縣之脉也監司者一省一路之脉也君相者天下之脉也故心之所及四海莫不精神政令所加萬姓莫不鼔舞又曰善用威者不輕怒善用恩者不妄施又曰易偏執而難中正者已也易偷惰而難振作者衆也易壊亂而難整飭者事也故為政要鼔舞不倦綱常張紀常理又曰有以姑息匪人市寛厚名有以毛舉細故市精眀名皆偏也聖人之寛厚不使物有所恃聖人之精眀不使人無所容敦大中自有分曉又曰為政者貴因時事在當因不為後人開無故之端事在當革不為後人長不救之禍又曰自委質後此身原不属我朝廷名分為朝廷守之一毫貶損不得非抗也一毫髙抗不得非卑也朝廷法紀為朝廷執之一毫徇人不得非固也一毫任已不得非葸也又曰物理人情自然而已聖人得其自然者以觀天下而天下之人不能逃聖人之洞察握其自然者以還天下而天下之人不覺為聖人所斡旋即其立法以繩物有近於矯拂然拂其人欲之私而順其天理之公故雖有倔强錮蔽之人莫不警悟而馴服又曰天地之財要看從來處又要看歸宿處從來處要豐要養歸宿處要約要節又曰天下之患成於怠忽者居其半成於激廹者居其半惟聖人能消禍於未形弭患於既著夫是之謂知微知彰知微者不動聲色要在能察幾知彰者不激怒濤要在能審勢邱濬曰聖人之心未嘗自聖世雖已治而猶有願治之心言雖畢陳而恒有渴聞之念又曰人以漸而用而出類之才則不以漸官以次而除而切要之職則不以次又曰報國孰為大薦賢為大葢竭一身之智力其効少竭衆人之智力其効多又曰天下之大譬則人之一身焉一身之中外有四肢百體内有五臟六腑其氣息之相通血脉之周流無一時之可息無一處之可滯故治天下者恒以其身視天下無尺寸之膚不愛則無尺寸之膚不養身處乎宮庭氊厦之上而心常存乎郡國閭里之中又曰財生於地而成於天所以致其用者人也天地歳歳有所生人生歳歳有所用歳用之數不可少而歳生之物或不給茍非歳歳為之制先期而計其數先事而為之備至於臨事而為之措置則有弗及者矣又曰聖人之用刑雖若不得已而實不容己也於不容己之中而存不得己之心不容己者上天討罪之義不得己者聖人愛物之仁劉大夏曰居官以正己為先所謂正己非特當戒利亦當逺名李東陽曰節用如閘河然節一分則上有一分之益廣儲如蓄源然積一分則下有一分之利楊一清曰無事當如有事時隄防有事當如無事時鎮静王守仁曰古之人能以天地萬物為一體故能通天下之志凡舉事宜必為之但見其易而成之不見其難今居官者多反是豈見不到此乎亦由無忠誠惻怛之心以愛其民不肯身任地方利害為乆逺之圖凡所施為不本於精神心術而惟事補輳掇拾支吾粉飾於其外以茍幸吾身之無事徒有虚名而無實用可張皇於暫時而不可施行永乆者勞逸煩簡相去逺矣邵寳曰勿以一方為小勿以一人為寡勿以一事為㣲勿以一時為近天下一方之㑹也衆人一人之聚也萬事一事之集也萬世一世之積也可不慎哉又曰聽信不惑於親近則採納不患於不覈好尚不徇於同異則品鑑不患於不當喜怒不逐於愛憎則取舍不患於不公楊繼盛曰天下之事每成於憂而敗於喜夫喜則縱縱則視天下之事皆易也而忽心生憂則畏畏則視天下之事皆難也而慎心生慎忽之間天下之治亂所係屠隆曰大臣之道懸鑑持衡適於中和而不偏偏則為害惟虚眀之人辨焉又曰人臣體國葢以國家為身體也人之於身體勞逸欲均饑飽欲時起居欲慎寒暑欲調養其血脉惜其精神何所不到人臣以調護身體者調䕶國家則莫如注念黔首是故節其勞逸問其飢寒敎以義理厚其風俗去其慆淫䘏其疾苦有利於民者興之如口腹之得美飲食也有害於民者去之如面目之去贅疣也以此體國乃人臣之道又曰天地間太和元氣盎然流行造化得之以乆長人物得之以化育治天下者自當敦大醇厚然或寛而無節簡事而流於廢弛愛人而傷於姑息天下玩焉又當濟之以嚴肅紀綱申法度令天下無敢梗吾之化者而後慈愛之心得以宣布人物相生相養各得其所葢寛者仁之用也嚴者義之用也義所以成其仁也張居正曰天之生財在官在民止有此數譬之於人禀賦强弱自有定分善養生者惟撙節愛惜不以嗜欲戕之亦皆足以卻病而延夀潘季馴曰夫避難趨易爭一時之便而畧其害非長䇿也襲功於身而遺艱於後人非純臣之節也王𢎞誨曰一念之逸萬事之隳一時之逸終身之疵法天行健惟日孜孜惟聖克念無不在兹堯兢舜業並稱巍巍惟無逸乃能有逸惟有為是以無為王家屛曰聖王馭世爵人而人以為榮者其命徳公也賞人而人以為勸者其論功當也官不擇徳則名器䙝而得之不足為榮賞不程勞則恩澤濫而觀者莫知所勸葉向髙曰谷惟虚也而後風入之澤惟虚也而後水鍾之心惟虚也而後善歸之眀主知獨聞之易以壅也故與天下共聞之為聰知獨見之易以蔽也故與天下共見之為眀收萬耳目為一耳目合萬心思為一心思含其聰而聰益徹晦其眀而眀逾光幽隠燭於燃犀情偽瑩於觀火邪正之路别於黑白得失之機辨若列眉顧憲成曰官輦轂舉念不在君父官封疆舉念不在百姓即有他美君子不齒髙攀龍曰夫賑飢不難於飢者必賑而難於賑者必飢賑者未必飢則飢者未必活何者以有限之財當無窮之冒必不繼也惟是隨門逐户什伍相稽當時給票據票給米自無中間展轉弊竇民受實惠又曰心本明又湏人自明之故放於外則不眀復於内則眀著於欲則不眀循乎理則眀動於氣則不眀安於止則眀荒於怠則不眀居於敬則眀騖於動則不眀主於静則眀明與不眀在一念轉移間也又曰朝廷膏澤至州縣始致之民州縣不賢則民不安賢者視君為天不敢欺也視民為子不忍傷也則奉法修職皆出於心之所不容已非有為也又曰人心各有隂私故各成隔礙凡居位者必自心先無隂私而後可潛消人之隂私自心先無隔礙而後可潛通人之隔礙惟君國是念毋身家茍營而後可𢎞濟於艱難趙南星曰人之為善為奸皆必以才故愛才者易至於容奸而擊奸者易至於棄才又曰天下承平乆則居官者習於逸樂逸樂久則節行不立節行不立則綱紀廢弛而名分陵夷周宗建曰大臣者小臣之表也大臣公則小臣自不敢以私見大臣正則小臣自不敢以私干大臣剛方自任則小臣自不敢優游取適大臣髙尚自矢則小臣自不敢耽戀求容葉伯巨曰天下趨於治也猶堅冰之將泮也冰之堅非太陽一日之光能消之也陽氣發生土脉微動和氣熏蒸然後融釋聖人之治天下亦猶是也刑以威之禮以導之漸民以仁摩民以義而後其化熙熙也周怡曰人臣以盡心體國為忠協力濟事為和舍己從人為虚忘讐序賢為公自古及今未有不由此而治者也劉廷蘭曰天下之事非一家私議故可否相濟乃謂之和君臣且然况於共事之人所宜協𠂻一徳以成厥美聖莫髙於周召猶有不相説之時豈可舍社稷安危之計而顧私家疑忌之嫌哉欽定執中成憲卷八
