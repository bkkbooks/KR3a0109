body:
  text: 欽定四庫全書欽定執中成憲卷三唐太宗皇帝舊唐書貞觀元年陳君賔轉鄧州刺史州邑喪亂之後百姓流離君賔至才期月皆來復業二年天下諸州並遭霜潦君賔一境獨免當年多有儲積蒲虞等州户口盡入其境逐食太宗下詔勞之曰朕以隋末亂離毒被海內率土百姓零落殆盡州里蕭條十不存一寤寐思之心焉若疚是以日昃忘食未明求衣曉夜孜孜惟以安養為慮每見水旱降災霜雹失所撫躬責己自慚德薄恐貧乏之黎庶不免飢餒傾竭倉廩普加賑恤其有一人絶食若朕奪之分命庶寮盡心匡救去年關內六州及蒲虞陕鼎等復遭亢旱禾稼不登糧儲既少遂令分房就食比聞刺史以下及百姓等並識朕懷逐糧户到遞相安養回還之日各有贏糧乃别賫布帛以申贈遺如此用意嘉歎良深一則知水旱無常彼此遞相拯贍不慮凶年二則知禮讓興行輕財重義四海士庶皆為兄弟變澆薄之風教仁慈之俗政化如此朕復何憂其安置房口官人支配得所並令考司録為功最養戶百姓不吝財帛已敕下者免今年調物宜知此意善相勸勉太宗嘗嫌上封者衆不近事實欲加黜責魏徴奏曰古者立誹謗之木欲聞己過今之封事謗木之流也陛下思聞得失祇可恣其陳道若所言衷則有益於陛下若不衷無損於國家太宗曰此言是也並勞而遣之資治通鑑上謂侍臣曰吾聞西域賈胡得美珠剖身以藏之有諸侍臣曰有之上曰人皆知彼之愛珠而不愛其身也吏受賕抵法與帝王徇奢欲而亡國者何以異於彼胡之可笑耶又曰朕有二喜一懼比年豐稔長安斗粟直三四錢一喜也北虜久服邉鄙無虞二喜也治安則驕侈易生驕侈則危亡立至此一懼也又曰人主惟有一心而攻之者甚衆或以勇力或以辨口或以諂諛或以姦詐或以嗜欲輻輳攻之各求自售以取寵祿人主少懈而受其一則危亡隨之此其所以難也唐德宗皇帝舊唐書王希全將赴靈州獻體要八章多所規諫德宗深納之乃著君臣針以賜之其詞曰夫惟德惠人惟辟奉天從諫則聖共理惟賢皇立有極駿命不易總萬幾以成務齊六合之殊致一心不能獨鑑一目不能周視敷求哲人式序在位於戲君之任臣必求一德臣之事君咸思正直何啓沃之所宜自古今而未得且以讜言者逆耳讒諛者伺側故下情未通而上聽已惑俾夫忠賢敗於凶慝譬彼輕舟蒸徒楫之亦有和羮宰夫膳之孰云理國不自得師覆車之軌豫甚懲而髙以下升和由甘受惟君無良亦臣之咎聞諸辛毗牽𥚑魏后則有禽息竭忠碎首勉思獻替以平可否勿謂無傷自微而彰勿謂何害積小成大事有隱而必見令既出而焉悔鼓鐘在宫聲聞於外浩然涉水朕未有艾將負扆以虛心期盡忠而納誨在昔稷契實匡舜禹近兹魏徵佐我文祖君臣協德混一區宇肆豫寡昧獲纘丕緒臣哉鄰哉爾翼爾輔髙秋始肅我武惟揚輟此禁衛殿於大邦戀闕方甚嘉言乃昌是規是諌金玉其相辭髙理要入德知方總彼千慮備於八章宣父有言起豫者商殷有盤銘周有欹器或戒以詞或警以事披圗演義發於爾志與金鏡而髙懸將座右而同置人皆有初鮮愼厥終汝其夙夜期保朕躬無曰爾身在外而誠不通一言之應千里攸同導彼遐徐達豫四聰華彜仰德時乃之功既往既來懷賢忡忡唱豫和汝式示深衷唐憲宗皇帝舊唐書憲宗嗣位之初讀列聖實録見貞觀開元故事竦慕不能釋卷顧謂丞相曰太宗之創業如此元宗之致理如此既覽國史乃知萬倍不如先聖當先聖之代猶須宰執臣寮同心輔助豈朕今日能獨為理哉自是延英議政晝漏率下五六刻方退唐文宗皇帝舊唐書詔曰儉以足用令出惟行著在前經斯為理本朕自臨四海愍元元之久困日昃忘食宵興疚懷雖文繡之飾尚愧茅茨之儉亦諭卿士形於詔條如聞積習流弊餘風未革車服第室相髙以華靡之制資用寶貨同啓於貪冒之源有司不禁侈俗兹扇蓋朕教導之未敷使兆庶昧於恥尚也其何以足用行令臻於至理與永念慙歎逮兹申敕自今內外班列職位之士各務素朴𢎞兹國風有僣侈尤甚者御史糾上主者宣示中外知朕意焉唐宣宗皇帝資治通鑑上與宰相論元和循吏孰為第一周墀曰臣嘗守土江西聞觀察使韋丹功德被於八州沒四十年老稚歌思如丹尚存詔史館修撰杜牧撰丹遺愛碑以紀之仍擢其子河陽觀察判官宙為御史後周世宗皇帝資治通鑑詔曰朕於卿大夫才不能盡知面不能盡識若不採其言而觀其行審其意而察其忠則何以見器識之淺深知任用之得失若言之不入罪實在豫茍求之不言咎將誰執宋太祖皇帝宋史令自今諸州嵗受稅租及管𣙜貨利上供物帛悉官給舟車輸送京師毋役民妨農帝一日罷朝坐便殿不樂者久之左右請其故曰爾謂為天子容易耶早作乘快誤決一事故不樂耳詔曰民生在勤所寶惟榖先王之明訓也朕奄宅中夏為之司牧眷乃億兆期臻富庶矧農桑之業為衣食之原今陽和在辰土膏脈起當播種之云始慮遊惰之尚多茍力作之不勤則秋斂之何望諸州長吏等任居牧守職司勸課所宜敦率黎庶勉勵農功俾比屋之人服勞於南畝三時之務無失於西成極其藨蓘之勤用致茨梁之詠懋功信賞國典在焉詔曰豐年之詠播於頌聲廣蓄之訓垂於載籍今三時不害百姓小康田里無愁嘆之聲壠畝有遺滯之穗州縣長吏等職司牧養義當勸率俾及嵗穰各務儲積或值凶歉不至匱乏古者倉廩實禮節興所宜禁民蒱博勿致遊惰戒其崇儉免於靡榖申嚴條教稱朕意焉太祖召王昭素問治世飬身之術昭素曰治世莫若愛民飬身莫若寡欲太祖重其言書於屏風通鑑永寧公主因侍坐與皇后同言曰官家作天子日久豈不能用黃金裝肩輿乘以出入帝笑曰我以四海為富宫殿悉以金銀為飾力亦可辦但念我為天下守財耳豈可妄用古稱以一人治天下不以天下奉一人茍以自奉養為意使天下之人何仰哉當勿復言宋太宗皇帝宋史上曰凡士未達見當世之務戾於理者則怏怏於心及列於位得以獻可替否當盡其所藴雖言未必盡中亦當僉議而更之俾協於道朕固不以崇髙自恃使人不敢言也又曰世之治亂在賞當其功罰當其罪即無不治謂為飾喜怒之具即無不亂卿等慎之謂宋琪等曰在昔帝王多以崇髙自處顔色嚴毅左右無敢質言者朕與卿等周旋欵曲商確時事蓋欲通上下之情無有壅蔽卿等但直道而行無得有所顧避諭宰臣曰每閲大理奏案節目小未備移文案覆動涉數千里外禁繫淹久甚可憐也卿等詳酌非人命所繫即量罪區分勿須再鞫謂宰相曰中外臣僚若皆留心政務天下安有不治者古人宰一邑守一郡使飛蝗避境猛虎渡河況能惠飬黎庶申理寃滯豈不感召和氣乎朕每自勤不怠此志必無改易或云有司細故帝王不富親決朕意則異乎是若以尊極自居則下情不能上達矣令內外官凡所舉薦有變節踰矩者自首則原其聨坐之罪詔郡縣有治行尤異吏民畏服居官亷恪蒞事明敏鬪訟衰息倉廩盈羡寇盜剪滅部內肅清者本道轉運司各以名聞當驛置赴闕親問其狀加旌賞焉其貪冒無狀淹延鬪訟踰越憲度盜賊競起部內不治者亦條其狀以聞當行貶斥帝親選京朝官三十餘人自書戒諭之言於印紙曰勤政愛民奉法除姦方可書為勞績且謂錢若水曰奉法除姦之言恐諸臣未喻因而生事可語之曰除姦之要在乎奉法太宗幸國子監召孫奭講書至事不師古以克永世匪説攸聞帝曰此至言也商宗乃得賢相如此耶因咨嗟久之詔曰古者振木鐸於路所以來四方之風謠設獸樽於庭所以延羣臣之諌諍在朝內外官自今或知民間利病及時政得失並得直言無隱詔曰昔舜之有天下也選於衆而舉善人則不仁不善者斯逺矣矧今提封至廣設官尤衆銓選既限於常調英俊或沈於下僚俾振滯淹屬在倫類傳不云乎如有所譽者其有所試矣朕當親覽而進之其令常參官舉升朝官者各二人通鑑帝遷守臣得楊延慶等十餘人命為知州因謂宰相曰刺史之任最為親民茍非其人民受其禍昔秦彭守潁川教化大行境內多瑞宋琪曰秦彭一郡守政善而天應之若此況君天下者乎宋真宗皇帝宋史詔曰朕為民司牧罔敢逸豫冀聞闕政屢詔讜言而羣臣奏對罕有極陳得失豈詢求之未至何循默以自持其令御史臺諭內外官各上所見勿為顧避宋仁宗皇帝帝學經筵講尚書洪範五事帝曰王者之用五事皆本於五行乎王洙對曰王者治五行得其性則五事皆善故五事得則有休徴五事失則有咎徴是以聖人克謹天戒以修其身帝曰人君奉天在於修德夙夜兢兢戒慎於未形尚恐不至必俟天有譴告然後修德此豈畏天之道也宋史詔曰學猶殖也不學將落遜志務時敏厥修乃來朕慮天下之士或有遺也既以臨軒較得失而憂其屢不中科則衰邁而無所成退不能返其里閭而進不得預於祿仕故常數之外特為之甄采而狃於寬恩遂隳素業茍簡成風甚可恥也自今宜篤進厥學無習僥幸詔守令或貪恣耄昏以弛為寬以苛為察以增賦斂為勞以出入刑罰為能而部使者莫之舉劾自今其各思率職勿撓權幸勿縱有罪以稱朕意詔曰國家設制策之科將博詢於鯁議有能規朕躬之過失陳宰相之闕遺紏中外之姦回斥左右之朋比述未明之機事貢無隱之密謀以至臺省之官阿私而罔上郡國之吏專恣以濫刑或通受貨財潛行請託或恃憑權勢敢事貪殘並許極言朕當親覽其令百官遇起居日轉對在外臣僚亦許其實封以聞詔曰夫和平醇一之政行則民休美之氣應險刻偷薄之路啓則民戚慘之變生蓋風化之感天下其猶影響之相從也御史執法嘗為朕言宜深詔執事以遏浮競之風其令中書門下務采端厚忠實可以表厲風俗之士並進於朝以啓迪朕心其詭激辨巧敢涉朋比之迹者必行放棄之罰庶幾朝廷清明百異消弭以起治平咨爾攸司其服朕命詔曰朕惟善治之主以天下耳目為視聽而不自任其聰明耳目之官今臺諌之任也夫以四海之廣萬事之衆臺官數人不能以周知固將詢及士大夫而其間傾邪險害之徒不惟朝廷義理所在謂職在言責勢必施行輒徇己之愛憎倚依形似扇造語言以中善良豈朕所以圖治之意哉其令中書門下開警百工務行敦實通鑑輔臣以雨稱賀帝曰天久不雨朕每焚香上禱昨夕寢殿中忽聞微雷遽起冠帶露立殿下須臾雨至衣皆沾濕移刻雨霽再拜以謝方敢升階比欲下詔罪己撤樂減膳又恐近於崇飾虛名不若夙夜精心密禱敢受賀乎宋神宗皇帝宋史帝曰灌溉之利農事大本但陜西河東民素不習此茍享其利後必樂趨三白渠為利尤大有舊迹可極力修治凡疏積水須自下流開導則畎澮易治書所謂濬畎澮距川是也詔曰傳曰近臣盡規以其榮恥與上同也今在此位者視朕過失與朝廷政事之闕默而不言乃或私議竊歎若以其責不在己夫豈皆習見成俗以為當然其亦有含章懷寶待倡而發者也今百度墮弛風俗偷墮薄蝕災異譴告不一此誠忠賢助朕憂惕以創制改法救弊除患之時宜令侍從官自今視朕過失與朝廷政事之闕無有巨細各具章極言無隱噫言善而不用朕有厥咎道之而不言爾為不恭朕將用此考察在位所以事君之實而明黜陟焉宋高宗皇帝言行録上曰人心國之本也雖有土地若失人心亦不可立國宋史幸祕書監頒手詔曰士習為空言而不為有用之學久矣爾其勉修術業益勵猷為一德一心以共赴亨嘉之會用丕承我祖宗之大訓顧不美歟吕頤浩等以旱乞罷政帝賜詔曰與其去位曷若同寅協恭交修不逮思所以克厭天心者通鑑以黃庭堅所書戒石銘頒於州縣令刻石文曰爾俸爾祿民膏民脂下民易虐上天難欺宋孝宗皇帝宋史詔曰獄重事也用法一傾則民無所措手足比年以來治獄之吏巧持多端隨意輕重之朕甚患焉其自今革玩習之弊明審克之公使姦不容情罰必當罪用迪於刑之中勉之哉毋忽詔曰朕惟旱乾水溢之災堯湯盛時有不能免民未告病者備先具也豫章諸郡縣但阡陌近水者苖秀而實髙仰之地雨不時至苖輒就稿意水利不修失所以為旱備乎唐韋丹為江西觀察使治陂塘五百九十九所灌田萬二千頃此特施之一道其利如此矧天下至廣也農為生之本也泉流灌溉所以育五榖也今諸道名山川原甚衆民未知其利然則通溝瀆瀦波澤監司守令顧非其職歟其為朕相邱陵原隰之宜勉農桑盡地利平繇行水勿使失時雖有豐凶而力田者不至措手受弊亦天人相因之理也朕將即勤惰而寓賞罰焉通鑑帝作敬天圗謂輔臣曰無逸一篇享國長久皆本於寅畏朕近日取尚書所載敬天事編為兩圗朝夕觀覽以自警省虞允文對曰惟陛下盡躬行之實敬畏不已必有明效大驗帝然之帝謂葉衡等曰朝廷用人止論其賢否如何不可有黨如唐之牛李其黨相攻四十年不解皆緣主聽不明所以至此文宗乃言去河北賊易去朝中朋黨難朕常笑之為人主者但公是公非何緣有黨又曰近來士大夫好倡為清議此語一出切恐相師成風便以趨事赴功者為猥俗以矯激沽譽者為清髙駸駸不已如東漢激成黨錮之風深害治體豈可不戒卿等宜書諸紳趙雄奏事上曰今夏蠶麥甚熟絲米價平可喜雄奏孟子語王道始於不飢不寒上曰近世士大夫好髙論恥言農事微有西晉風豈知周禮與易言理財周公孔子曷嘗不以理財為務宋理宗皇帝通鑑詔曰朕粵稽盛帝明王制治保邦曷嘗不以人材為先務蓋雖堯舜之法度文武之方䇿茍非其人是迪是循則亦徒法而已故必賴濟濟之賢藹藹之士布列中外道德一而風俗同然後可望其舉行不悖相繼於長久也我國家舊設進士一科得人為盛三百年間所以保乂王家垂休億載者厥功茂哉弊久蠧滋近年尤甚非無佳士穎出由此其選然窮經學古者或病於詞華植德勵行者難究其藴奧高才大器者往往局於纎悉繩墨之末是以官甚冗而才愈乏家殊俗而風益漓至於冒國法以茍營假儒官而挾䇿俚言亂雅勦説趨時使習之者反賊其良而取之者莫任其咎人情至此咸欲變通蓋披閲先朝名臣奏議其論取士之法非一惟程皓頤兄弟深明治道酌古準今綱條詳明用意肫切今三省詳議參酌其可行者條具以聞務於科舉令甲無大更張以妥安士心而於進士之外舉所以崇尚經術考察德行選用材能之道立為一代之典陶成四方之風庶幾豐芑之仁垂之萬世顧不美歟金世宗皇帝上諭左宣徽使敬嗣暉曰凡為人臣上欲要君之恩下欲干民之譽必虧忠節卿冝戒之謂宰臣曰朕觀在位之臣初入仕時競求聲譽以取爵位亦既顯達即徇默茍容為自安計朕甚不取宜宣諭百官使知朕意又曰朕已行之事卿等以為成命不可復更但承順而已一無執奏且卿等凡有奏何嘗不從自今朕旨雖出宜審而行有未便者即奏改之或在下位有言尚書省所行未便亦當從而改之毋拒而不從上與親王宰執從官從容論古今興廢事曰經籍之興其來久矣垂教後世無不盡善今之學者既能誦之必須行之然知而不能行者多矣茍不能行誦之何益女直舊風最為純直雖不知書然其祭天地敬尊戚尊耆老接賓客信朋友禮意欵曲皆出自然其善與古書所載無異汝輩當習學之舊風不可忘也諭宰臣曰凡已經奏斷事有未當卿等勿謂已行不為奏聞改正朕以萬幾之繁豈無一失卿等但言之朕當更改必無吝也尚書省奏擬同知永寧軍節度使事阿古爾為刺史上曰阿古爾年幼於事未練授佐二官可也平章政事唐古安禮奏曰臣等以阿古爾宗室故擬是職上曰郡守係千里休戚安可不擇人而私其親耶若以親親之恩賜與雖厚無害於政使之治郡而非其才一境何賴焉謂宰臣曰帝王之政固以寬慈為德然如梁武帝專務寬慈以至紀綱大壞朕嘗思之賞罰不濫即是寬政也餘復何為謂宰執曰齊桓中庸主也得一管仲遂成霸業朕夙夜以思惟恐失人朕既不知卿等又不薦必俟全才而後舉蓋亦難矣如舉某人長於某事朕亦量才用之又言人之有幹能固不易得然不若德行之士最優也謂大臣曰國初風俗淳儉居家惟布衣非大會賔客未嘗輒烹羊豕朕嘗念當時節儉之風不欲妄費凡宫中之官與賜之食者皆有常數謂宰臣曰朕觀唐史惟魏徵善諌所言皆國家大事甚得諌臣之體近時臺諌惟指摘一二細碎事姑以塞責未嘗有及國家大利害者豈知而不言歟毋乃亦不知也有司奏重修上京御容殿上謂宰臣曰宫殿制度茍務華飾必不堅固今仁政殿遼時所建全無華飾但見他處嵗嵗修完惟此殿如舊以此見虛華無實者不能經久也今土木之工滅裂尤甚下則吏與工匠相結為姦侵尅工物上則户工部官支錢度材惟務茍辦至有工役才畢隨即欹漏者姦弊茍且勞民費財莫甚於此自今體究重抵以罪金章宗皇帝金史詔戒諭尚書省曰國家之治在乎紀綱紀綱所先賞罰必信今乃上自省部之重下逮司縣之間律度弗循私懷自便遷延曠嵗茍且成風習此為恆從何致理朝廷者百官之本京師者諸夏之儀其朂自今各懲已往遵繩奉法竭力赴功無枉撓以徇情無依違而避勢一歸於正用範乃民元太祖皇帝元史太祖有訓欲治身先治心欲責人先責己元憲宗皇帝元史帝諭羣臣曰爾輩若得朕奬諭之言即志氣驕逸志氣驕逸而災禍有不隨至者乎爾輩其戒之元世祖皇帝元史世祖即位之初首詔天下國以民為本民以衣食為本衣食以農桑為本於是頒農桑輯要之書於民俾民崇本抑末命宣撫司官勸農桑抑遊惰禮高年問民疾苦舉文學才識可以從政及茂才異等列名上聞以聽擢用其職官汙濫及民不孝弟者量輕重議罰帝立御史臺以塔齊爾為御史大夫張雄飛為侍御史且戒之曰卿等既為臺官職在直言朕為汝君茍所行未善亦當極諌况百官乎汝宜如朕意人雖嫉妬汝朕能為汝地也帝曰朕於廷臣有戅直忠言未嘗不恱而受之違忤者亦未嘗加罪蓋欲養忠直而退諛侫也元仁宗皇帝元史詹事院臣啓金州獻色克色哩洞請遣使采之帝曰所寶惟賢色克色哩何用焉若此者後勿復聞先是近侍言賈人有售美珠者帝曰吾服御雅不喜飾以珠璣生民膏血不可輕耗汝等當廣進賢才以恭儉愛人相規不可以奢靡蠧財相導言者慚而退詔曰朕賴天地祖宗之靈纂承聖緒永惟治古之隆羣生咸遂國以乂寧朕夙興夜寐不敢怠遑任賢使能興滯補闕庶其臻兹斂時五福用敷錫厥庶民朕之志也帝曰夫法者所以辨上下定民志自古及今未有法不立而天下治者使人君制法宰相能守而勿失則下民知所畏避綱紀可正風俗可厚其或法弛民慢怨言並興欲求治安豈不難哉顧謂侍臣曰卿等以朕居帝位為安耶朕惟太祖創業艱難世祖混一疆宇兢業守成恆懼不能當天心繩祖武使萬方百姓樂得其所朕念慮在兹卿等固不知也詔曰比嵗設立科舉以取人材尚慮高尚之士晦迹邱園無從可致各處其有隱居行義才德高邁深明治道不求聞達者所在官司具姓名牒報本道廉訪司覆奏察聞以備録用又屢詔求言於下使得進言於上雖指斥時政並無譴責往往采擇其言任用其人列諸庶位以圖治功其他著書立言禆益教化啓迪後人者亦斟酌録用著為常式云欽定執中成憲卷三
