body:
  text: 欽定四庫全書欽定執中成憲卷五唐虞書益曰吁戒哉警戒無虞罔失法度罔遊于逸罔淫于樂任賢勿二去邪勿疑疑謀勿成百志惟熙蔡沈曰百志猶百慮也言方寸之間光輝明白罔違道以干百姓之譽罔咈百姓以從己之欲無怠無荒四夷來王益贊于禹曰惟德動天無逺弗屆滿招損謙受益時乃天道皋陶曰都慎厥身修思永惇叙九族庶明勵翼邇可逺在兹蔡沈曰慎者言不可不致其謹也身修則無言行之失思永則非淺近之謀厚叙九族則親親恩篤而家齊矣庶明勵翼則羣哲勉輔而國治矣邇近也言近而可推之逺者正此道也蓋身修家齊國治而天下平矣又曰無教逸欲有邦兢兢業業一日二日萬幾無曠庶官天工人其代之蔡沈曰無教逸欲有邦者言天子當以勤儉率諸侯不可以逸欲導之也一日二日者言其日之至淺萬幾者言其幾事之至多也蓋一日二日之間事幾之來且至萬焉是可一日而縱欲乎又曰天叙有典敕我五典五惇哉天秩有禮自我五禮有庸哉蔡沈曰有庸當作五庸同寅協恭和衷哉蔡沈曰叙者君臣父子兄弟夫婦朋友之倫叙也秩者尊卑貴賤等級隆殺之品秩也言典禮雖天所叙秩然正之使叙而益厚用之使秩而有常則在我而已故君臣當同其寅畏協其恭敬誠一無間融會流通而民彝物則各得其正所謂和衷也天命有德五服五章哉天討有罪五刑五用哉政事懋哉懋哉懋勉也天聰明自我民聰明天明畏蔡沈曰明者顯其善畏者威其惡自我民明威蔡沈曰威古文作畏逹于上下敬哉有土蔡沈曰言天之聰明非有視聽也因民之視聽以為聰明天之明畏非有好惡也因民之好惡以為明畏上下上天下民也言天人一理通逹無間民心所存即天理之所在而吾心之敬是又合天民而一之者也有天下者可不知所以敬之哉商書仲虺曰德日新萬邦惟懷志自滿九族乃離王懋昭大德建中于民以義制事以禮制心垂裕後昆豫聞曰能自得師者王謂人莫已若者亡好問則裕自用則小伊尹曰今王嗣厥德罔不在初立愛惟親立敬惟長始于家邦終于四海又曰嗣王祗厥身念哉聖謨洋洋嘉言孔彰惟上帝不常作善降之百祥作不善降之百殃爾惟德罔小萬邦惟慶爾惟不德罔大墜厥宗蔡沈曰言勿以小善而不為萬邦之慶積于小勿以小惡而為之厥宗之墜不在大蓋善必積而後成惡雖小而可懼又曰慎乃儉德惟懷永圖若虞機張往省括于度則釋蔡沈曰括矢括也釋發也言若虞人之射努機既張必往察其括之合于法度然後發之則發無不中矣欽厥止率乃祖攸行惟朕以懌萬世有辭又曰奉先思孝接下思恭視逺惟明聽德惟聰朕承王之休無斁蔡沈曰思孝則不敢違其祖思恭則不敢忽其臣惟亦思也思明則所視者逺而不蔽于淺近思聰則所聽者德而不惑于憸邪又曰惟天無親克敬惟親民罔常懷懷于有仁鬼神無常享享于克誠天位艱哉德惟治否德亂與治同道罔不興與亂同事罔不亡終始慎厥與惟明明后又曰若升髙必自下若陟遐必自邇無輕民事惟難無安厥位惟危慎終于始有言逆于汝心必求諸道有言遜于汝志必求諸非道真德秀曰聽言之道當求義理之當不當順意見之偏茍合乎理雖逆吾意不可不從茍拂乎理雖順吾意不可不察又曰君罔以辨言亂舊政臣罔以寵利居成功邦其永孚于休又曰天難諶諶信也命靡常常厥德保厥位厥德靡常九有以亡又曰非天私我有商惟天佑于一德非商求于下民惟民歸于一德德惟一動罔不吉德二三動罔不凶惟吉凶不僣在人惟天降災祥在德蔡沈曰僣差也惟吉凶不差在人者惟天之降災祥在德故也又曰任官惟賢才左右惟其人蔡沈曰左右者輔弼大臣非賢才之稱可盡故曰惟其人臣為上為德蔡沈曰為上為德左右厥辟也不曰君而曰德者兼君道而言也為下為民其難其慎惟和惟一蔡沈曰難者難于任用慎者慎于聽察所以防小人也和者可否相濟一者始終如一所以任君子也德無常師主善為師善無常主協于克一蔡沈曰克一者能一之謂也博而求之于不一之善約而會之于至一之理此聖學始終條理之序也說苑伊尹曰王者得賢材以自輔然後治也雖有堯舜之明而股肱不備則主恩不流化澤不行故明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官尊其爵重其祿賢者進以顯榮罷者退而勞力是以主無遺憂下無邪慝百官能治臣下樂職恩流羣生潤澤草木昔者虞舜左禹右皋陶不下堂而天下治此使能之效也書傅說曰惟木從繩則正后從諫則聖后克聖臣不命其承疇敢不祇若王之休命蔡沈曰言君果從諌臣雖不命猶且承之况命之如此誰敢不敬順其美命乎又曰明王奉若天道建邦設都樹后王君公承以大夫師長不惟逸豫惟以亂民亂治也惟天聰明惟聖時憲惟臣欽若惟民從乂蔡沈曰天之聰明無所不聞無所不見無他公而已矣人君法天之聰明一出于公則臣敬順而民亦從治矣又曰慮善以動動惟厥時蔡沈曰善當乎理也時時措之宜也又曰惟厥攸居政事惟醇蔡沈曰居止而安之義安于義理之所止也義理安于自然則一矣一故政事醇而不雜也又曰非知之艱行之維艱王忱不艱允協于先王成德惟說不言有厥咎蔡沈曰王忱不艱言王忱信之亦不為難又曰人求多聞時惟建事學于古訓乃有獲事不師古以克永世匪說攸聞蔡沈曰人求多聞者是惟立事然必學古訓深識義理然後有得惟學遜志務時敏厥修乃來允懷于兹道積于厥躬蔡沈曰遜其志如有所不能敏于學如有所不及虛以受人勤以勵己則其所修如泉始逹源源乎其來矣篤信而深念乎此則道積于身不可以一二計矣惟斆學半念終始典于學厥德修罔覺蔡沈曰斆教也言教人居學之半始之自學學也終之教人亦學也一念終始常在于學無少閒斷則德之所修有不知其然而然者矣周書箕子曰人之有能有為使羞其行而邦其昌蔡沈曰羞進也使進其行則官使者皆賢才而邦國昌盛矣又曰惟辟作福惟辟作威惟辟玉食臣無有作福作威玉食臣之有作福作威玉食其害于而家凶于而國人用側頗僻民用僣忒三略呂望曰軍井未逹將不言渴軍幕未辦將不言倦軍竈未炊將不言饑與之安與之危故其衆可合而不可離以其恩素篤謀素和也書召公奭曰不作無益害有益功乃成不貴異物賤用物民乃足又曰不寶逺物則逺人格所寶惟賢則邇人安又曰夙夜罔或不勤不矜細行終纍大德為山九仞功虧一簣周公曰君子所其無逸先知稼穡之艱難乃逸則知小人之依蔡沈曰先知稼穡之艱難乃逸者以勤居逸也逸周書周公曰王者所佩在德德在利民昌大在自克無過在數懲不困在豫慎見禍在未形除害在能斷安民在知過用兵在知時勝大患在合人心施舍在平心不幸在不聞其過福在受諫基在愛民固在親賢禍福在所密利害在所近存亡在所用尊在慎威安在恭已國語史佚曰動莫若敬居莫若儉德莫若讓事莫若咨左傳周任曰為國家者見惡如農夫之務去草焉芟夷藴崇之藴崇積聚也絶其根本勿使能殖則善者信矣又曰為政者不賞私勞不罰私怨國語虢文公曰夫民之大事在農上帝之粢盛於是乎出民之蕃庶於是乎生事之共給共供也於是乎在和協輯睦於是乎興財用蕃殖於是乎始敦龎純固於是乎成左傳季梁曰夫民神之主也是以聖王先成民而後致力於神故務其三時修其五教親其九族以致其禋祀於是乎民和而神降之福故動則有成國語內史過曰國之將興其君齊明衷正齊齊也精潔惠和其德足以昭其馨香其惠足以同其民人神饗而民聽民神無怨故明神降之觀其德政而均布福焉曹劌曰夫惠本而後民歸之民和而後神降之福若布德於民而平均其政事君子務治而小人務力動不違時器不過用財用不匱莫不共祀是以用民無不聽求福無不豐管子管夷吾曰凡牧民者欲民之可御也欲民之可御則法不可不審法者將立朝廷者也將立朝廷者則爵服不可不貴也爵服加於不義則民賤其爵服民賤其爵服則人主不尊人主不尊則令不行矣法者將用民力者也將用民力者則祿賞不可不重也祿賞加於無功則民輕其祿賞民輕其祿賞則上無以勸民上無以勸民則令不行矣又曰規矩者方圓之正也雖有巧目利手不如拙規矩之正方圓也故巧者能生規矩不能廢規矩而正方圓雖聖人能生法不能廢法而治國又曰天子有善讓德於天諸侯有善慶之於天子大夫有善納之於君民有善本於父慶之於長老此道法之所從來是治本也又曰雖有明君百步之外聽而不聞閒之堵墻窺而不見也而名為明君者君善用其臣臣善納其忠也信以繼信善以傳善君信而臣繼之君善而臣傳之是以四海之內可得而治又曰天不為一物枉其時冬不為松柏不凋輟其霜雪夏不為薺麥枯死止其雨露明君聖人亦不為一人枉其法天行其所行而萬物被其利聖人亦行其所行而百姓被其利又曰昔年七十九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫國富多粟生於農故先王貴之凡為國之急者必先禁末作文巧末作文巧禁則民無所游食民無所游食則必農民事農則田墾田墾則粟多粟多則國富國富者兵强兵强者戰勝戰勝者地廣是以先王知衆民強兵廣地富國之必生於粟也故禁末作止奇巧而利農事又曰目貴明耳貴聰心貴智以天下之目視則無不見也以天下之耳聽則無不聞也以天下之心慮則無不知也又曰天生四時地生萬財以養萬物而無取焉明主配天地者也教民以時勸之以耕織以厚其養而不伐其功不私其利故曰能豫而無取者天地之配也又曰天之道滿而不溢盛而不衰明主法象天道故貴而不驕富而不奢行理而不惰故能長守貴富久有天下而不失也故曰持滿者與天又曰國有四維一曰禮二曰義三曰亷四曰恥又曰一年之計莫如樹榖十年之計莫如樹木終身之計莫如樹人又曰人君泄則言實之士不進言實之士不進則國之情僞不竭於上又曰夫民别而聽之則愚合而聽之則聖雖有湯武之德復合於市人之言是以明君順人心安情性而發於衆心之所聚先王善與民為一體與民為一體則是以國守國以民守民也又曰天因人聖人因天又曰公之所加罪雖重下無怨氣私之所加賞雖多士不為歡又曰明主之治國也其當賞者群臣不得辭也其當罰者群臣不敢避也夫賞功誅罪所以為天下致利除害也草茅弗去則害禾榖盜賊弗誅則傷良民夫舍公法而行私惠則是利姦邪而長暴亂也行私惠而賞無功則是使民偷幸而望於上也行私惠而赦有罪則是使民輕上而易為非也夫舍公法用私意明主不為也又曰錯國於不傾之地積於不涸之倉藏於不竭之府下令於流水之原使民於不爭之官明必行之路開必得之門不為不可成不求不可得不處不可久不行不可復錯國於不傾之地者授有德也積於不涸之倉者務五榖也藏於不竭之府者養桑麻育六畜也下令於流水之原者令順民心也使民於不爭之官者使各為其所長也明必行之路者嚴刑罰也開必得之門者信慶賞也不為不可成者量民力也不求不可得者不強民以其所惡也不處不可久者不偷取一世也不行不可復者不欺其民也故授有德則國安務五榖則食足養桑麻育六畜則民富令順民心則威令行使民各為其所長則用備嚴刑罰則民逺邪信慶賞則民輕難量民力則事無不成不強民以其所惡則詐僞不生不偷取一世則民無怨心不欺其民則下親其上又曰人主之所以令則行禁則止者必令於民之所好而禁於民之所惡也民之情莫不欲生而惡死莫不欲利而惡害故令於生利人則令行禁於殺害人則禁止又曰斷制五刑各當其名罪人不怨善人不驚又曰疑今者察之古不知來者視之往萬事之生也異趣而同歸古今一也又曰時者得天義者得人既時且義故能得天與人又曰主不周密則正言直行之士危正言直行之士危則人臣黨而成羣又曰凡民之從上也非從口之所言從情之所好者也上之所好民必甚焉明君知民之必以上為心也故置法以自治立儀以自正也又曰心治是國治也治心在於中治言出於口治事加於民故功作而民從又曰聽言之道勿望而距勿望而許許之則失守距之則閉塞又曰凡人莫不欲利而惡害是故與天下同利者天下扶之擅天下之利者天下謀之天下所謀雖立必隳天下所扶雖高不危又曰明主之道卑賤不待尊貴而見大臣不因左右而進故無壅遏之患國語晉文公問於郭偃曰始也吾以國為易今也難對曰君以為易其難也將至矣君以為難其易也將至矣左傳胥臣曰敬德之聚也能敬必有德熊旅曰民生在勤勤則不匱又曰夫武禁暴戢兵保大定功安民和衆豐財者也豐財謂綏萬邦屢豐年也國語王孫說曰聖人之施舍也議之其喜怒取與也亦議之是以不主寬惠亦不主猛毅主德義而已范燮曰賢者寵至而益戒不足者為寵驕又曰德福之基也無德而福隆猶無基而厚墉也其壞也無日矣左傳臧孫紇曰在上位者灑濯其心一以待人軌度其信可明徴也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎灑讀作洗士弱曰政不可不慎也務三而已一曰擇人二曰因民三曰從時子太叔問政於子産子産曰政如農功日夜思之思其始而成其終朝夕而行之行無越思思而後行如農之有畔言其次其過鮮矣鄭人游於鄉校以論執政論其得失然明謂子産曰毁鄉校如何子産曰何為夫人朝夕退而游焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毁之我聞忠善以損怨為忠善則怨謗息不聞作威以防怨欲毁鄉校即作威豈不遽止然猶防川大決所犯傷人必多吾不克救也不如小決使道道通也不如吾聞而藥之也以為已藥石又曰君子有四時朝以聽政晝以訪問夕以修令夜以安身衛侯問北宫文子曰何為威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其民謂之有威儀也晏嬰曰君令臣忠父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮之經也君令而不違臣忠而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而貞姑慈而從婦聽而婉禮之質也又曰君人執信臣人執恭忠信篤敬上下同之天之道也又曰君所為可而有否焉臣獻其否以成其可君所為否而有可焉臣獻其可而去其否是以政成而不干晏子春秋晏嬰曰先王之立愛以勸善也其立惡以禁暴也昔者三代之興也利於國者愛之害於國者惡之故明所愛而賢良衆明所惡而邪僻滅又曰古之聖王其行公正而無邪故讒人不得入不阿黨不私色故羣徒之卒不得容薄身厚民故聚斂之人不得行又曰賢君之治國其政任賢其行愛民其取下節其自養儉從邪害民者有罪進善舉過者有賞其政刻上而饒下赦過而救窮不因喜以加賞不因怒以加罰不從欲以勞民不修怨而危國上無驕行下無諂德上無私義下無竊權上無朽蠧之藏下無凍餒之民賢君之治國若此左傳閔馬父曰禍福無門惟人所召易孔子彖傳曰泰小往大來吉亨則是天地交而萬物通也上下交而其志同也朱子曰泰通也小謂隂大謂陽言坤往居外乾來居內謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也朱子曰人能謙則其居尊者其德愈光其居卑者人亦莫能過天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服天地養萬物聖人養賢以及萬民天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恆而天地萬物之情可見矣家人女正位乎內男正位乎外男女正天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣兑說也剛中而柔外說以利貞是以順乎天而應乎人說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉程子曰君子之道其說於民如天地之施感於心而悅服無斁故以之先民則民悅隨而忘其勞率之以犯難則民心悅服於義而不恤其死天地節而四時成節以制度不傷財不害民象傳曰天地交泰后以財成天地之道輔相天地之宜以左右民程子曰裁成謂體天地交泰之道而裁制成其施為之方也輔相天地之宜天地通泰則萬物茂遂人君體之而為法制使民用天時因地利輔助化育之功成其豐美之利也如春氣發生萬物則為播種之法秋氣成實萬物則為收斂之法乃輔相天地之宜以左右輔助於民也民之生必賴君上為之法制以教率輔翼之乃得遂其生養是左右之也風雷益君子以見善則遷有過則改文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事朱子曰以仁為體則無一物不在所愛之中故足以長人嘉其所會則無不合禮使物各得其所利則義無不和貞固者知正之所在而固守之故足以為事之幹君子行此四德者故曰乾元亨利貞繫辭傳曰勞謙君子有終吉此謙九三爻辭子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也朱子曰德言盛禮言恭言德欲其盛禮欲其恭也不出户庭無咎此節初九爻辭子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義朱子曰正辭便只是分别是非禮記孔子曰儒有內稱不避親外舉不避怨程功積事不求厚祿推賢而進逹之不望其報君得其志茍利國家不求富貴其舉賢援能有如此者又曰夫禮先王以承天之道以治人之情又曰張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也又曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聽命錯諸天下無所不行孔子侍坐於哀公公曰敢問何謂為政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政如之何孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣子夏曰三王之德參於天地敢問何如斯可謂參天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私孔子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也又曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之孝經孔子曰愛親者不敢惡於人敬親者不敢慢於人愛敬盡於事親而德教加於百姓刑於四海蓋天子之孝也甫刑云一人有慶兆民賴之又曰在上不驕高而不危制節謹度滿而不溢高而不危所以長守貴也滿而不溢所以長守富也富貴不離其身然後能保其社稷而和其民人蓋諸侯之孝也詩曰戰戰兢兢如臨深淵如履薄冰又曰夫孝天之經也地之義也民之行也天地之經而民是則之則天之明因地之利以順天下是以其教不肅而成其政不嚴而治先王見教之可以化民也是故先之以博愛而民莫遺其親陳之以德義而民興行先之以敬讓而民不爭導之以禮樂而民和睦示之以好惡而民知禁又曰昔者明王之以孝治天下也不敢遺小國之臣而况於公侯伯子男乎故得萬國之歡心以事其先王治國者不敢侮於鰥寡而况於士民乎故得百姓之歡心以事其先君又曰君子言思可道行思可樂德義可尊作事可法容止可觀進退可度以臨其民是以其民畏而愛之則而象之故能成其德教而行其政令又曰君子之事上也進思盡忠退思補過將順其美匡救其惡故上下能相親也左傳仲尼曰政寬則民慢慢則糾之以猛糾猶攝也猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和又曰君子之行也度於禮施取其厚事舉其中斂從其薄大戴禮孔子曰君子之道譬則防歟夫禮之塞亂之所從生也猶防之塞水之所從來也故以舊防為無用而壞之者必有水敗以舊禮為無用而去之者必有亂患凡人之知能見已然不能見將然禮者禁於將然之前而法者禁於已然之後是故法之用易見而禮之所為難知也若夫慶賞以勸善刑罰以懲惡先王執此之正堅如金石行此之信順如四時處此之公無私如天地豈顧不用哉然曰禮云禮云者貴絶惡於未萌而起教於微渺使民日徙善逺罪而不自知也又曰福莫長於無咎又曰工女必自擇絲麻良工必自擇齎材賢君良上必自擇左右是故佚於取人勞於治事勞於取人佚於治事又曰父之於子天也君之於臣天也有子不事父有臣不事君是非反天而倒行耶故有子不事父不順有臣不事君必刃家語孔子曰御四馬者正六轡御天下者正六官同是車馬或以致千里或不及數百里以其所為進退緩急異也同是官法或以致平或以致亂者亦以其所為進退緩急異也晏子春秋孔子曰古之善為人臣者聲名歸之君禍災歸之身入則切磋其君之不善出則高譽其君之德義賈誼新書孔子曰少成若天性習慣成自然說苑孔子曰弓調而後求徑焉馬服而後求良焉士信慤而後求知能焉韓詩外傳子路曰敢問持滿有道乎孔子曰持滿之道抑而損之子路曰損之有道乎孔子曰德行寬裕者守之以恭土地廣大者守之以儉祿位尊盛者守之以卑人衆兵彊者守之以畏聰明睿智者守之以愚博聞强記者守之以淺夫是之謂抑而損之荀子顔淵曰鳥窮則啄獸窮則攫人窮則詐自古及今未有窮其下而無危者也大戴禮曽子曰君子成人之美朝有過夕改則與之夕有過朝改則與之又曰目者心之孚也言者行之指也作於中則播於外也故曰以其見者占其隱者又曰先憂事者後樂事先樂事者後憂事又曰古者天子日旦思其四海之內戰戰唯恐不能乂諸侯日旦思其四封之內戰戰唯恐失損之大夫士日旦思其官戰戰唯恐不能勝庶人日旦思其事戰戰唯恐刑罰之至也是故臨事而栗者鮮不濟又曰與父言言畜子與子言言事父與兄言言友弟與弟言言承兄與君言言使臣與臣言言事君又曰孝子善事君又曰與君子遊苾乎如入蘭芷之室久而不聞則與之化矣與小人遊忒乎如入鮑魚之次久而不聞則與之化矣是以君子慎其所去就與君子遊如長日加益而不自知也與小人遊如履薄冰每履而下幾何而不陷乎哉公羊傳公羊高曰君子之善善也長惡惡也短惡惡止其身善善及其子孫子華子程本曰上下洞逹而無疑是以天下和平天下之所以平者政平也政之所以平者人平也人之所以平者心平也荀子荀卿曰田野縣鄙者財之本也垣窖倉廪者財之末也窖窖也百姓時和事業得叙者貨之源也等賦府庫等賦以差等制賦也貨之流也故明主必謹養其和節其流開其源而時斟酌焉使天下必有餘而上不憂其不足如是則上下俱富交無所藏之是知國計之極也故禹十年水湯七年旱而天下無菜色者十年之後年榖豐熟而陳積有餘是無他故焉知本末源流之謂也又曰義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得喪士不通財貨從士以上皆羞利而不與民爭利樂分施而恥積藏又曰公生明偏生暗端慤生通詐僞生塞誠信生神夸誕生惑又曰有治人無治法陳囂問孫卿子曰先生議兵常以仁義為本仁者愛人義者循理然則又何以兵為孫卿子曰非汝所知也彼仁者愛人故惡人之害之也義者循理故惡人之亂之也彼兵者所以禁暴除害也非爭奪也又曰刑當罪則威不當罪則侮爵當賢則貴不當賢則賤又曰天不為人之惡寒也而輟冬地不為人之惡遼逺也而輟廣君子不為小人之胸胸也而輟行又曰聖人無欲無惡無始無終無近無逺無博無淺無古無今兼陳萬物而中懸衡焉是以衆異不得相蔽也又曰人心譬如槃水正措而勿動則湛濁在下而清明在上則可以見鬚眉而察理矣微風過之湛濁動乎下清明亂乎上則不可以得形之正也心亦如是矣導之以理養之以清物莫之傾則足以定是非决嫌疑矣小物引之其正外易其心內傾則不足以察粗理矣又曰以仁心說以學心聽以公心辨說教人也聽聽人之言也辨辨其是非也又曰王者尚賢使能而等位不遺惜願禁悍而刑罰不過使百姓曉然皆知為善於家而取賞於朝也為不善於幽而䝉刑於顯也欽定執中成憲卷五
