body:
  text: 欽定四庫全書欽定執中成憲卷四明太祖髙皇帝洪武寶訓右御史大夫鄧愈等各言便宜事太祖覽之謂愈等曰治天下當先其重且急者而後及其輕且緩者今天下初定所急者衣食所重者教化衣食給而民生遂教化行而習俗美足衣食者在於勸農桑明教化者在於興學校學校興則君子務德農桑舉則小人務本如是為治則不勞而政舉矣今卿輩所言皆國家之不可闕者但非所急卿等國之大臣於經國之道庇民之術尚當為豫盡心焉太祖與侍臣論及創業之難曰朕賴將帥之力掃除禍亂以成大業今四海漸平朕豈不欲休息以自娛然所畏者天所懼者民苟所為一有不當上違天意下失民心馴至其極而天怒人怨未有不危亡者矣朕每念及之中心惕然又曰人主能以天下之好惡為好惡則公以天下之智識為智識則明又曰人之常情多矜已能多言人過君子則不然揚人之善不矜巳之善貸人之過不貸己之過又曰萬事不可以耳目察惟虛心以應之萬方不可以智力服惟誠心以待之太祖退朝顧謂翰林學士劉三吾曰朕歷年久而益懼者恐為治之心有懈也懈心一生百事皆廢生民休戚係焉故日愼一日惟恐弗及如是而治效猶有未臻甚矣為治之難也自昔先王之治必本於愛民然愛民而無實心則民必不䝉其澤民不䝉其澤則衆心離於下積怨聚於上國欲不危難矣朕每思此為之惕然太祖將告祀南郊戒飭百官執事曰人以一心對越上帝毫髮不誠怠心必乘其機瞬息不敬私欲必投其隙夫動天地感鬼神惟誠與敬耳人莫不以天之高逺鬼神幽隱而有忽心然天雖高所鑒甚邇鬼神雖幽所臨則顯能知天人之理不二則吾之誠敬自不容於少忽矣今當大祀百官執事之人各宜愼之洪武四年命建奉先殿謂禮部尚書陶凱曰朕聞事死如事生朕祖考陟遐已久不能致其生事之誠然於追逺之道豈敢怠忽復感歎曰飬親之樂不足於生前思親之苦徒切於身後今嵗時致享則於太廟至於晨昏謁見節序告奠古必有其所爾其考論以聞謂侍臣宋濓等曰自古聖哲之君知天下之難保也故逺聲色去奢靡以圖天下之安是以天命眷顧久而不厭後世中才之主當天下無事侈心縱欲鮮克有終至於秦始皇漢武帝好尚神仙以求長生疲精勞神卒無所得使移此心以圗治天下安有不理以朕觀之人君能清心寡欲勤於政事不作無益以害有益使民安田里足衣食熙熙皥皥而不自知此即神仙也功業垂於簡册聲名流於後世此即長生不死也夫恍惚之事難憑幽怪之說易惑在謹其所好尚耳朕常夙夜兢業圗天下之安其敢游心於此謂侍臣曰人君不能無好尚要當慎之蓋好功則貪名者進好財則言利者進好術則游談者進好諛則巧侫者進夫偏於好者鮮有不纍其心故好功不如好德好財不如好廉好術不如好信好諛不如好直夫好得其正未有不治好失其正未有不亂所以不可不慎也謂羣臣曰謀國之道習於舊聞者當適時宜狃于近俗者當計逺患茍泥古而不通今溺近而忘於逺者皆非也故凡政事設施必欲有利於天下可貽於後世不可茍且惟事目前蓋國家之事所係非小一令之善為四海之福一令不善有無窮之患不可不慎也又曰人有精金必求良冶而範之有美玉必求良工而琢之至於子弟有美質不求明師教之豈愛子弟不如金玉耶蓋師所以模範學者使之成器因其材力各俾造就朕諸子將有天下國家之責功臣子弟將有職任之寄教之之道當以正心為本心正則萬事皆理矣茍導之不以正為衆欲所攻其害不可勝言卿等宜輔以實學毋徒效文士記誦章句而已太祖與儒臣論易至天地飬萬物聖人飬賢以及萬民曰人主職在飬民但能飬賢與之共治則民皆得所飬然知人最難若所養果賢而使之治民則國無虛祿民獲實惠茍所飬非賢反厲其民何補於國哉故人主飬賢非難知賢為難謂秦府右相文原吉等曰蓄藥所以防病積貨所以防貧用賢所以輔德朕為諸子擇賢以為之輔爾等居左右宜朝夕規誨以成其德人情於大事或能謹之而常忽於細微夫細行不謹大德必虧姑息小過大愆必至故塞水者必於其源源塞而流絶伐木者必於其根根斷而木拔矣設王有所違失爾若曰所失者小可勿言也則是大失將至俟其大失將至然後規之救有所弗及矣夫善雖小可以成名惡雖小足以亡身凡歷代賢王著名方册其臣亦皆賢者故能濟其美爾等職在輔導宜盡心所事諭學士朱升等曰治天下者修身為本正家為先正家之道始於謹夫婦后妃雖母儀天下然不可使與政事至於嬪嬙之屬不過備職事侍巾櫛若寵之太過則驕恣犯分上下失序觀歷代宫閫政由內出鮮有不為禍亂者也故內嬖惑人甚於鴆毒惟賢明之主能察之於未然其他未有不為所惑者卿等為我纂述女戒及古賢妃之事可為法者使後世子孫知所持守太祖與侍臣論用人之道曰人主以明為治而不自用其明當取衆人之見以為明夫爝火之光豈勝於列炬衆人之見必廣於一人故用天下之賢才以為治使天下之情幽隱畢達則明無不照而治道成矣茍自作聰明而不取衆長欲治道之成不可得也謂廷臣曰治國之道必先通言路言猶水也欲其長流水塞則衆流障遏言塞則上下壅蔽今豫以一人而酬應天下之務非兼聽廣詢何以知其得失詩曰先民有言詢于芻蕘夫芻蕘至賤者也古人尚有取于其言況左右前後之人與共事者豈無一得之長乎諸公所建明當備陳之諭侍臣曰毁譽之言不可不辨也人固有卓然自立不同于流俗而得毁者亦有諂媚狎昵同乎汙俗而得譽者夫毁者未必真不賢而譽之者未必真賢也第所遇有幸不幸耳人主能知其毁者果然為賢則誣謗之言可息而人亦不至於受抑矣知其譽者果然不肖則偏陂之私可絶而人亦不至於幸進矣問君子於小人小人未必能知君子鮮有不為所毁問小人於小人其朋黨阿私則所譽者必多矣惟君子則處心公正然後能得毁譽之正故取人為難而知言為尤難也諭羣臣曰古之賢君常憂治世而古之賢臣亦憂治君然賢臣之憂治君者君常安而明主之憂治世者世常治今土宇日廣斯民日蕃而豫心未嘗一日忘其憂何也久困之民未盡蘇息撫綏之方未盡得宜卿等能同豫之憂乎能同豫憂庶幾格天心而和氣可致矣若徒竊位茍祿於生民之利病漫不加省卒之禍敗隨至不可得而救矣可不懼哉太祖與羣臣論民間事曰四民之業莫勞於農觀其終嵗勤勞少得休息時和嵗豐數口之家猶可足食不幸水旱年榖不登則舉家飢困朕一食一衣則念稼穡機杼之勤爾等居有廣厦乘有肥馬衣有文繡食有膏粱當念民勞大抵百姓足而後國富百姓逸而後國安未有民困窮而國獨富安者爾等其思佐朕裕民之道庶幾食祿無愧太祖觀漢武帝紀顧謂翰林待制吳沈曰人君理財之道視國如家可也一家之內父子不異資其父經營儲積未有不為其子計者父子而異資家必隳矣君民猶父子也若惟損民以益君民衣食不給而君獨富豈有是理哉太祖閲內藏慨然謂臣下曰此皆民力所供蓄積為天下之用吾何敢私茍奢侈妄費取一己之娛殫耳目之樂是以天下之積為一己之奉也今天下已平國家無事封賞之外正宜儉約以省浮費太祖謂侍臣曰淡泊可以飬志儉素可以飬德縱欲敗度奢侈移性故竒技哇淫皆役心損德之具朕觀元世祖在位躬行儉朴遂成一統之業至庚申帝驕淫奢侈飫粱肉於犬豕致怨怒於神人故逸豫未終敗亡隨至此近代之事可為明鑒朕常以此訓諸子使知所警戒則可長保國家矣命博士許存仁進講經史存仁講尚書洪範篇至休徵咎徵之應太祖曰天道微妙難知人事感通易見天人一理必以類應稽之往昔君能修德則七政順度雨暘應期災害不生不能修德則三辰失行旱潦不時災異迭見其應如響箕子以是告武王以為君人者之警戒今宜體此下修人事上合天道然豈特為人上者當勉為人臣者亦當修省以輔其君上下交修斯為格天之本謂侍臣曰吾自起兵以來凡有所為意向始萌天必垂象示之其兆先見故常加警省不敢逸豫侍臣曰天髙在上其監在下故能修省者䝉福不能者受禍太祖曰天垂象所以警乎下人君能體天之道謹而無失亦有變災而為祥者故宋公一言熒惑移次齊侯暴露甘雨應期災祥之來雖曰在天實由人致也又曰前代庸君暗主莫不以垂拱無為藉口縱恣荒寧不親政事孰不知治天下者無逸然後可逸若以荒寧怠政為垂拱無為帝舜何為曰耄期倦于勤大禹何以惜寸隂文王何以日昃不食且人君日理萬幾怠心一生則庶務壅滯貽患不可勝言朕即位有年常以勤勵自勉未旦即臨朝晡時而後還宫夜臥不能安席披衣而起或仰觀天象見一星失次即為憂惕或量度民事有當速行者即次第筆記待旦發遣朕非不欲暫安但祗畏天命不敢故耳朕言及此者但恐羣臣以天下無事便欲逸樂股肱既惰元首叢脞民何所賴書云功崇惟志業廣惟勤爾羣臣但能以此為勉朕無憂矣太祖與侍臣論治身之道曰人之害莫大於欲欲非止於男女宫室飲食服御而已凡求私便於己者皆是也然惟禮可以制之先王制禮所以防欲也禮廢則欲肆為君而廢禮縱欲則毒流於民為臣而廢禮縱欲則禍延於家故循禮可以寡過肆欲必至滅身侍臣進講尚書無逸篇太祖曰自昔有國家者未有不以勤而興以逸而廢勤與逸理亂盛衰所繫也人君當存惕厲不可少怠以圗其終成王之時天下晏然周公輔政乃作是書反覆開諭上自天命之精微下至民生稼穡之艱難以及閭里小民之怨詛莫不具載周公之愛君先事而慮其意深矣朕每觀是篇必反覆詳味求古人之用心常令儒臣書於殿壁朝夕省閲以為鑒戒今日講之深愜朕心聞之愈益警惕太祖頗聞公侯中有好神仙者悉召至諭之曰神仙之術以長生為說而又謬為不死之藥以欺人故前代帝王及大臣多好之然卒無驗且有服藥以喪其身者蓋由富貴之極惟恐一旦身歿不能久享其樂是以一心好之縱使其術信然可以長生何故四海之內千百年間曽無一人得其術而久住於世者若謂神仙混物非凡人所能識此乃欺世之言切不可信人能懲忿窒欲飬以中和自可延年有善足稱名垂不朽雖死猶生何必枯坐服藥以求不死況萬無此理當痛絶之太祖閲漢書謂侍臣曰漢髙以追逐狡比武臣發縱指示比文臣譬諭雖切而語則偏重朕謂建立基業猶搆大厦剪伐斫削必資武臣藻繪粉飾必資文臣用文而不用武是斧斤未施而先加黝堊用武而不用文是棟宇已就而不加塗塈二者均失之為天下者文武相資庶無偏陂諭戶部臣曰善為政者賦民而民不困役民而民不勞故民力紓財用足今天下有司能用心於賦役使民不至於勞困則民豈有不足田野豈有不安爭訟豈有不息官府豈有不清如此則民豈有不受其福者乎民既受福為官長者亦得以享其福矣近來有司不以民為心動即殃民殃民者禍亦隨之茍能憂民之貧而慮民之困使民得以厚其生此可謂善為政也爾等勉之太祖御謹身殿翰林學士劉三吾侍因論治民之道三吾言南北風俗不同有可以德化有當以威制太祖曰地有南北民無兩心帝王一視同仁豈有彼此之間汝謂南方風氣柔弱故可以德化北方風氣剛徑故當以威制然君子小人何地無之君子懷德小人畏威施之各有攸當烏可槩以一言乎三吾悚服稽首而退謂宰臣曰朕每燕居思天下之事未嘗一日自安蓋治天下猶治絲一絲不理則衆緒棼亂故凡遇事必精思而後行惟恐不當致生奸弊以殃吾民以此不敢頃刻安逸至於刑法尤所關心然此非一人所能獨理卿等皆須䆒心庶幾民無寃抑刑獄清省漢宣帝言獄者所以禁暴止奸養育羣生甚得用法之意卿等宜體之毋忽也命刑部都察院斷事等官審録囚徒太祖曰録囚務在情得其真刑當其罪大抵人之隱曲難明獄之疑似難辨故往往有經審録尋復反異蓋由審刑者之失以至此耳故善理獄者在推至公之心擴至明之見則巧僞無所隱疑似無所惑自然訟平理直枉者得申繫者得釋茍存心失公聼斷不明是猶舍衡以求平掩鑑以索照獄何由得理事何由䏻直今命爾等審録囚徒務以公破私明辨惑毋使巧僞繁滋而疑讞不决生者拘幽於囹圄死者受寃于地下非惟負朕慎刑之心實違上天好生之意凡録囚之際必預先稽閲前牘詳審再三具實以聞謂侍臣曰賞罰者國之大權人君操賞罰之權以御天下一本於至公故有功者雖所憎必賞有罪者雖所愛必罰賞以當功上不為德罰以當罪下不敢怨不以小嫌而妨大政不以私意而害至公庶有以服天下之心太祖遣人諭大將軍徐逹副將軍常遇春曰聞將軍巳下齊魯諸郡中外皆慶豫獨謂勝而能戒者可以常勝安而能警者可以常安戒者雖勝若始戰警者雖安若履危夫屢勝之兵易驕久勞之師易潰能慮於敗乃可以無敗能愼於成乃可以有成必須周防謹密常若臨敵勿生懈怠為人所乘慎之慎之征南將軍湯和移師進攻延平太祖遣使賫敕諭和曰軍中之事難於執一惟當以德服人必其負固弗順然後威以震之凡推德必先邇者邇者逺之所瞻示威必先大者大者小之所憑邇服則逺來大懾則小懼又曰若欲人不違己當使之以信欲人成功當任之以專不信則令不一不專則權有所分矣凡此皆汝所短故特諭爾太祖御奉天殿受朝賀大宴羣臣宴畢太祖見諸功臣進退有禮召前諭之曰朝廷之間以禮為主人之有禮如衣之有章朕聞元世祖命巴延阿珠二人平江南班師之日世祖遣儒臣許衡齎酒迎之兩人推讓莫肻先飲巴延曰阿珠之功當先酌阿珠曰巴延之功當先酌相讓者久之衡歎曰賢矣哉古有拔劍擊柱而爭功者視此何如今觀卿等雖出身行陳而進退周旋不失禮度朕為之喜卿等能始終如此何患後世無稱道之者命京衛將士練習武藝是時諸將率師平中原入關陜而將士之留京師者多安逸太祖諭之曰凡事必預備然後有濟先時浚流臨旱免憂已涸而汲沃焦弗及汝等當閒暇之日宜練習武藝不可謂無事便可宴安也夫溺於宴安者必至於危亡安而慮危者乃可以常安又曰成功非易保祿尤難今國家之用人正如用車茍有齟齬不行即移載他車矣汝等其戒之諸將皆頓首謝謂諸武臣曰治定功成頒爵授祿爾等享有富貴正當與賢人君子講學以明道理以廣見聞通達古今之務以成逺大之器豈可茍且自足止於武夫而已夫位隆而不知學徒長驕傲之心生今而不知古豈識成敗之跡古之良將皆文武相資爾等不可以為兩途有識者必然吾言其次在從違之間其下者耳若不聞吾言諄切爾等其勉識之太祖親閲武於教場既罷諭諸將臣曰畜兵所以衛民勞民所以飬兵兵民相資彼此相利今爾等無耕耨之勞而充其食無織絍之苦而足其衣是皆出於民也然無知之徒不知捍禦之道橫起凌虐之心以害其民民受其害而至於困弊者是自損其衣食之夲也不仁甚矣爾等勤勞建功皆已榮顯宜戒其縱恣之心體朕恤下之意且貴能思賤富能思貧者善處富貴也憂能同其憂樂能同其樂者善體衆情也不違下民之欲斯能合上天之心合乎上天之心斯可以享有富貴矣永道桂陽諸州蠻寇竊發命金吾右衛指揮同知陸齡率兵討之諭之曰蠻夷梗化自作不靖今命卿等討之軍旅之事以仁為本以威為用申明號令不可姑息號令明則士有勵心姑息行則人懷怠志士心勵雖少必濟人志怠雖衆弗克所謂仁者非姑息所謂威者非殺伐仁以撫衆威以振旅則鮮有不克齡受命行皆討平之諭省府臣曰爾諸大臣既受封爵進職位可謂尊顯矣當同心輔國以享祿位朕嘗思古之君臣居安不忘警戒盈滿常懼驕縱兢兢業業日慎一日故能始終相保不失富貴大抵開基創業之主待功臣非不欲始終盡善如韓信彭越自不能保全其功深可惜也至承平之後舊臣多有獲罪者䆒其所以蓋其事主之心日驕富貴之志日淫以致於敗古人置欹器於座側正以戒其驕盈耳汝等宜戒慎之又謂都督府臣康茂才等曰汝等今成大功豈汝一人之能哉非軍士同心效力曷能致此切不可挾功驕恣輕忽下人若此則鮮有不敗者朕故拳拳為爾等言之古之人主待其臣下往往以權術駕馭不以至誠相感故易生猜疑今吾以直言告汝常相警戒非止在於汝身汝又當以朕意訓汝子孫則可與國同其長久矣諭來朝守令曰朕設置百官各司厥職以分理庶務惟郡守縣令為牧民之官凡賦斂徭役訴訟皆先由縣次方至府若縣令賢明則賦斂平徭役均訴訟簡一縣之事既治則府可以無憂矣茍縣官貪虐以毒民或怠荒以廢事民間利病尸坐不聞不惟民受其殃府亦受其弊矣為府官者知其弊能繩其奸貪去其闒茸請更賢者而任之則上下皆安矣若知而不舉上下䝉蔽雖茍且一時終必為其所纍智人君子必能察於此矣爾等勿謂身居逺外朕不能知異日政績有聞必有嘉賞顧爾等為政何如耳吏部奏用國子生十四人皆為六品以下官太祖諭之曰事君之道惟盡忠不欺治民之道惟至公無蔽凡一郡一邑之民必有飢寒不得其所者有獄訟寃抑者有賢才不舉者有豪猾蠧民者汝等到任能不為私欲所蔽人言所惑則方寸自明而諸弊可息一牽於私欲而惑於人言則冥然如坐暗室飢寒者無由獲濟寃抑者無由伸理賢才壅蔽而豪猾縱橫則為廢職矣古人有言人始入官如入暗室久而乃明明乃治汝等切記之毋為人蔽惑也謂將臣曰用兵之道必先固其本本固而戰多勝少敗何謂本內是也內欲其實實則難破何謂實有備之謂也後世不知務此至有戰勝之餘遂忘武偹往往至於取敗人孰不曰天下平定之時可以息兵偃武殊不知治兵然後可以言息兵講武而後可以言偃武若晋徹州郡之偹卒召五胡之擾唐徹中國之備終致安史之亂此無備之驗也夫當天下無虞之時正須常守不虞之戒然則武備其可一日而忘哉有御史自廣西還進平蠻六䇿內有曰立威太祖覽畢諭之曰汝說甚善但立威之說亦有偏耳夫中國之與蠻夷在制馭之何如蓋蠻夷非威不畏非惠不懷然一於威則不能感其心一於惠則不能懾其暴惟威惠並行此馭蠻夷之道也古人有言以懷德畏威為强正以此耳謂廷臣曰朕常命寺人發庫藏中古鏡十餘以鑑容貌多失真召冶工數人而問之莫能答最後一人言曰煆錬不至範模不正故鏡體偏邪照人失真朕聞之惕然感悟夫鏡一物耳略有偏邪乃不可鑑形人君主宰天下辨别邪正審察是非皆原於心心有不正百度乖矣正心之功其可忽乎明成祖文皇帝大訓記各布政司府州官進表者辭歸上諭曰治天下者以天下之心為心治一方者以一方之心為心朕居君位夙夜念慮未嘗忘民每思飲食衣服百物之奉皆出民力民或有寒不得衣飢不得食勞不得息朕何忍獨安爾等皆以賢才為國家任牧民之職夫受人寄者當盡已之力為人上者當推已之心治民之道惠飬為急不害播種則民無飢不妨蠶桑則民無寒蓋民之衣食皆出己力未嘗仰給公家惟賴公家統理以免强凌衆暴之患耳爾等當明其利害順其好惡去其為惡之人則為善者自安懲其趨末之習則務本者自固况數年以來軍旅供給民勞為甚今略得休息正如病者初差宜保養調護若復勞擾病將愈深其歸戒之周王橚來朝且獻騶虞百僚稱賀以為皇上至仁格天所致既罷朝上謂侍臣曰適聞羣臣言不覺惕然天下之大如一夫有怨豈得謂仁一念不誠豈能格天朕方夙夜慚懼何可便謂騶虞是天降祥於朕侍臣曰此天心真不偶然者上曰祥瑞之來易令人驕是以古之明主皆遇祥自警未嘗因祥自怠警怠者國之安危繫焉騶虞若果為祥在朕更當加慎上御右順門覽奏牘時御案有鎮紙金獅欹側將墜給事中耿通趨進移置案中上顧侍臣曰一器之微置於危處則危置於安處則安天下大器也獨可置之於危乎尤須安之天下雖安不可忘危故小事必謹小不謹而積之將至大患小過必改小不改而積之將至大壞皆致危之道也上顧諸將論用兵之法曰兵法云多算勝少算不勝蓋用兵之際智在勇先不可忽也馭衆之道固須步武整肅進退以律然必將帥撫士卒如父兄于子弟則士卒附將帥亦如手足之捍頭目上下一心乃克有濟至於同列尤須和協一隊當敵則各隊䇿應左右前後莫不皆然譬如舟行遇風同舟之人齊力以奮波濤雖險靡不獲濟爾等勉之明仁宗昭皇帝大訓記刑部尚書金純左都御史劉觀等奏刑名畢上諭之曰朕於刑法未嘗敢以喜怒增損卿等鞫獄之際亦當虛心聽察量其情實有罪不可幸免無罪不可濫刑持法明信則人有所畏而不敢犯若不明其情而任已輕重或迎合朕意使人含寃抱恨者朕之所惡卿等其以為戒卿等皆國大臣非獨自己當存矜獄之心如朕一時過于嫉惡處法失中卿等更須執正毋以乖忤為慮朕不難于從善也明史通政使請以四方雨澤章奏送給事中收貯帝曰祖宗令天下奏雨澤欲知水旱以施恤民之政積之通政司既失之矣今又令收貯是欲上之人終不知也自今奏至即以聞明宣宗章皇帝大訓記上諭吏部尚書蹇義等曰前命御史考察在外等官政欲任賢退不肖庶幾民受其惠近聞考察之官少能著實但信偏言更不博詢其有勤于職業因理公務不免施刑小人不喜誣為酷暴反致罷退庸濫之官綱紀不立人所狎玩或貪贓賄低首下氣依阿度日小人貪其易與乃更保留如此不當孔子曰衆好惡必察焉宜嚴戒飭之務盡至公毋使正人受誣小人得志如或不當責有所歸上御奉天門諭三法司官曰朕夜來觀周書立政篇有云式敬爾繇獄以長我王國此深有意味蓋能敬慎用刑不致枉濫則仁恩浹洽足以培固國本福祚豈不靈長今不必論效驗但當以敬為主有虞欽恤正是此意卿等宜夙夜勿忘謂侍臣曰三代以下人主唐太宗善納諌當時之臣若魏徴王圭亦善諌故有貞觀之治宋太祖嘗曰唐太宗受人諌疏常自引咎不以為耻不若已不為非使人無可諌二者孰是侍臣對曰宋太祖所言為優上曰宋太祖固是務本之論然人所行豈能皆是若禹聞善言則拜湯從諌弗咈改過不吝禹湯猶取善于人况其下者乎朕以為人君者當以太宗為法明憲宗純皇帝明史山西巡撫何喬新劾奏遲延獄詞僉事尚敬劉源因言凡二司不决斷詞訟者半年之上悉宜奏請執問帝曰刑獄重事周書曰要囚服念五六日至于旬時特為未得其情者言耳茍得其情即宜决斷無罪拘幽往往瘐死是刑官殺之也故律特著淹禁罪囚之條其即以喬新所奏通行天下明孝宗敬皇帝寶訓上視學行釋奠禮御彝倫堂賜敕勉勵諸生曰朕惟自古帝王本綱常以致治必以學校為首務焉學校所以明人倫也孔子述經垂教莫先乎此我祖宗奄有寰宇建學育材文教誕敷治化旁洽肆朕繼統之初聿遵成憲擇日視學祇謁先師孔子退即彝倫堂聽講經書因以勸勵師生夫治本於道道載於經所當講明而體行者舍綱常何以哉朕躬行圗治惟古帝王是期爾師生其亦以古之賢才是勵於經必䆒其精微之奧於綱常倫理必盡其允蹈之功蘊之為德行措之為事業大足以尊主庇民次足以修政立事罔俾濟濟之咏專美有周則我明治化將與唐虞於變時雍匹休矣欽哉故諭敕刑部都察院大理寺曰朕惟刑以輔治用之貴得其平刑平則善有所勸惡有所懲而人心服天道和不平則不足以勸善懲惡而人心不服天道乖災變之來誠有不能免焉故特戒飭爾等各加敬慎仍行南京三法司及天下大小問刑衙門今後問刑之際務必存心以仁恕持法以公平察辭辨色詳審其情罪所當重者重之以懲惡毋務姑息而不顧縱惡長奸之非罪所當輕者輕之以宥過毋事苛刻而致有抑鬱稱寃之歎其或證驗無憑情隱難明者尤當加意推究毋或𫝊致於一時而冀不坐罪于他日如此庶不背古聖人欽恤之訓而於朕刑期無刑之治亦有裨益焉欽定執中成憲卷四
