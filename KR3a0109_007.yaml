body:
  text: 欽定四庫全書欽定執中成憲卷七晋普書羊祜曰適道之論皆未應權故謀之雖多而决之欲獨晋文杜預曰聖王之政循乎自然虛已委誠而信順之道應神感心通而天下之理得蜀志陳夀曰諸葛亮之為相國也開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶循名責實虛僞不容邦域之內畏而愛之刑政雖峻而無怨者以其用心平而勸戒眀也晋書荀朂曰事留則政稽政稽則功廢處位者孜孜不怠奉職司者夙夜不懈則雖在挈瓶而守不假器矣左傳雖有挈瓶之智守不假器杜預注挈瓶汲者喻小智為人守器尚知不以借人簡文案略細苛令之所施必使人易視聽願之如陽春畏之如雷霆勿使微文煩擾為百吏所黷二三之命為百姓所饜則吏竭其誠下悅上命矣設官分職委事責成君子心競而不力爭言心能自强於善而不以力爭勝也量能受任思不出位則官無異業政典不奸矣凡此皆省事之本也又曰發號施令典而當則安凡職所臨履先精其得失使忠信之官明察之長各裁其中條上言之然後斟酌大體詳省所宜則令下必行不可搖動傅咸曰榖帛難生而用之不節無緣不匱故先王之化天下食肉衣帛皆有其制奢侈之費甚於天災又曰興化之要在於官人才非一流職有不同譬諸林木洪纎枉直各有攸司內外之任措置隨宜溫嶠曰使命愈逺益宜得才宣揚王化延譽四方宜重其選陶侃曰大禹聖人乃惜寸隂至於衆人當惜分隂鄭默曰勸稼務農為國之基選人得材濟世之道居官久職政事之宜明慎黜陟勸戒之道崇尚朴素化𨗳之本阮种曰王道之本經國之務必先之以禮義而致人於亷恥禮義立則君子軌道而讓於善亷恥立則小人謹行而不淫於制度故上有克讓之風則下有不爭之俗朝有矜節之士則野無貪冒之人又曰賢臣之於主進則忠國愛人退則砥節潔志營職不干私義出心必由公塗明度量以程其能審經制以效其功紀瞻曰政因時以興機隨物而動故聖王究窮通之原審始終之理適時之宜期於濟世虞預曰天道貴信地道貴誠誠信者蓋二儀所以生植萬物人君所以保乂黎庶是以宣威擬於震電推恩象於雲雨刑罰在於必信慶賞貴於平均潘尼曰崇德莫大乎安身安身莫尚乎存正存正莫重乎無私無私莫要於寡欲袁宏曰古之眀君知視聽之屬不能不關於物也知一已之眀不能不滯於情也求忠信之人而置之左右故好惡是非之情未嘗宣於外而愛憎毁譽之言無由而至矣又曰經綸之方在乎設官分職因萬物之所能統體之道在乎至公無私與天下均其欲抱朴子葛洪曰堯舜有為人主之勤無為人主之欲故天下各得濟其欲又曰怒不越法以加虐喜不踰憲以厚遺割情於所愛而有犯者無赦採善於所憎而有勞者不遺掩細瑕而録大用忘近過而念逺功又曰人臣勳不𢎞則耻俸祿之日厚也績不茂則羞爵命之妄髙也南北朝魏書甄琛曰王者濟時拯物為民父母乾坤所惠天子順之山川祕利天子通之月令稱山林藪澤有能取蔬食禽獸者野虞教導之相侵奪者罪之周禮有川澤之禁正所以防其殘盡必令取之有時障護雖在官實為民守之耳韓麒麟曰哲王經國立治積儲九稔謂之太平故躬藉千畝以勵百姓入粟者與斬敵同爵力田者與孝弟均賞實為治之先務也髙允曰古人云方一里則為田三頃七十畝百里則為田三萬七千頃若勤之則畝益三升不勤則畝損三升方百里損益之率為粟二百二十萬斛况以天下之廣乎李彪曰尚儉者開福之源好奢者起貧之兆周書黎景熙曰天地極其髙厚故萬物仰容養焉四時著其寒暑故庶類資忠信焉帝王者寬大象天地忠信則四時蘇綽曰天地之性惟人為貴然性無常守隨化而遷化於敦朴則質直化於澆僞則浮薄凡諸牧守令長貴能扇之以淳風浸之以太和被之以道德示之以朴素使百姓亹亹日遷於善而不知其所以然此之謂化也又曰衣食所以足者由於地利盡地利所以盡者由於勸課有方主此教者在乎牧守令長而已每至歲首戒敕部人皆令就田墾發以時勿失其所單劣之户及無牛之家勸令有無相通使得兼濟三農之隙及隂雨之暇又令種桑植果藝其蔬菜修其園圃畜育雞豚以備生生之資以供養老之具夫為政不欲過碎碎則人煩勸課不容太簡簡則人怠善為政者必消息時宜而適煩簡之中又曰凡所求材藝者為其可以理人也有材藝而本於正直必循分以效績若有材藝而習於奸僞必蠧法以行私故求材藝必先擇志行志行善則舉之志行不善則去之然善官人者必先省其官官省則善人易充善人充則事無不理又曰察獄之官精心悉意推究根源先之以五聽周官小司寇職一曰辭聽二曰色聽三曰氣聽四曰耳聽五曰目聽參之以證驗慎測情狀窮鑒隱伏使奸無所容罪人必得然後隨事加刑輕重皆當舍過矜愚得情勿喜又能消息情理斟酌禮律無不曲盡人心而逺眀大教此善之上也率至公之心去阿枉之志聽察以理必窮所見考訊以法不苛不暴隨事斷理獄無停滯此亦其次也又曰征稅之法宜令平均平均者不舍豪强而徴貧弱不縱奸巧而困愚拙也然財貨之生其均不易必須勸課使預營理先時而備至時而輸故王賦獲供下人無困又曰為國之道當愛人如慈父訓人如慈師隋隋書房彥謙曰賞以勸善刑以懲惡故疏賤之人有善必賞尊貴之戚犯惡必刑未有罰則避親賞則遺逺者也文中子王通曰無赦之國其政必平多斂之國其財必削民貧則賦少又曰推之以誠則不言而信鎮之以靜則不行而謹惟有道者能之又曰聞謗而怒者讒之由也見譽而喜者佞之媒也又曰帝者之制恢恢乎無所不容其上湛然其下恬然天下之危與天下安之天下之失與天下正之千變萬化吾常守中焉其卓然不可動乎其感而無不通乎唐唐文張藴古大寶針曰今來古往俯察仰觀唯辟作福為君實難主普天之下處王公之上任土貢其所有具寮和其所倡是故恐懼之心日弛邪僻之情轉放豈知事起於所忽禍生於無妄固以聖人受命拯溺亨屯歸罪於已因心於民大眀無偏照至公無私親故以一人治天下不以天下奉一人禮以禁其奢樂以防其佚左言而右事出警而入蹕四時調其慘舒三光同其得失故身為之度而聲為之律勿謂無知居髙聽卑勿謂何害積小成大樂不可極極樂生哀欲不可縱縱欲成災壯九重於內所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂罔念邱其糟而池其酒勿內荒於色勿外荒於禽勿貴難得之貨勿聽亡國之音內荒伐人性外荒蕩人心難得之貨侈亡國之音淫勿謂我尊而傲賢慢士勿謂我智而拒諫矜已聞之夏后據饋頻起亦有魏帝牽𥚑不止安彼反側如春陽秋露巍巍蕩蕩恢漢髙大度撫兹庶事如履薄臨深戰戰栗栗用周文小心詩曰不識不知書曰無偏無黨一彼此於胸臆捐好惡於心想衆棄而後加刑衆悅而後命賞弱其强而治其亂伸其屈而直其枉故曰如衡如石不定物以數物之懸者輕重自見如水如鏡不示物以形物之鑒者妍媸自生勿渾渾而濁勿皎皎而清勿汶汶而暗勿察察而眀雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲縱心於湛然之域遊神於至道之精扣之者應洪纎而效響酌之者隨深淺而皆盈故曰天之清地之寧王之貞四時不言而代序萬物無為而受成豈知帝有其力而天下和平吾王撥亂戡以智力民懼其威未懷其德我皇撫運扇以淳風民懷其始未保其終爰述金鏡窮理盡性使人以心應言以行包括治體抑揚詞令天下為公一人有慶開羅起祝援琴命詩一日二日念兹在兹惟人所召自天祐之諍臣司直敢告前疑舊唐書魏徴曰臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其德義源不浚而望流之逺根不固而求木之長德不厚而思國之安臣雖下愚知其不可而况於眀哲乎人君當神器之重居域中之大不念居安思危戒奢以儉斯亦伐根以求木茂塞源而欲流長也凡昔元首承天景命善始者實繁克終者蓋寡豈取之易守之難乎蓋在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體傲物則骨肉為行路雖董之以嚴刑振之以威怒終茍免而不懷仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎誠能見可欲則思知足以自戒將有為則思知止以安人念髙危則思謙沖而自牧懼滿盈則思江海下百川樂盤遊則思三驅以為度憂懈怠則思慎始而敬終慮壅蔽則思虛心以納下懼讒邪則思正身以黜惡恩所加則思無因喜而謬賞罰所及則思無以怒而濫刑總此十思𢎞兹九德簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其惠信者效其忠文武並用垂拱而治何必勞神苦思代百司之職役哉又曰省畋遊之娛息靡麗之作罷不急之務慎偏聽之怒近忠厚逺便佞杜悅耳之邪說聽苦口之忠言去易進之人賤難得之貨採堯舜之誹謗追禹湯之罪已惜十家之産順百姓之心近取諸身恕以待物思勞謙以受益不自滿以招損有動則庶類以和出言而千里斯應超上德於前載樹風聲於後昆此聖哲之宏規帝王之盛業能事斯畢在於慎守而已又曰君能盡禮臣能納忠必在於內外無私上下相信上不信則無以使下下不信則無以事上信之為義大矣哉故自天祐之吉無不利岑文本曰覽古今之事察安危之機上以社稷為重下以億兆在念眀選舉慎賞罰進賢才退不肖聞過即改從諫如流為善在於不疑出令期於必信頤神養性省畋遊之娛去奢崇儉省工役之費務靜方內而不求闢土載􅐤弓矢而無忘武備凡此數者思之而不倦行之而不怠則至道之美與三五比隆億載之祚隨天地長久又曰創撥亂之業其功既難守已成之基其道不易故居安思危所以定其業也有始有卒所以隆其基也劉仁軌曰屋漏在上知之者在下愚夫之計擇之者聖人是以周王詢於芻蕘殷后謀於版築故得享國長久傳祚無疆功宣清廟慶流後葉姚班曰忠臣事君有犯而無隱眀主馭下納諫以進德故書云有言逆于志必求諸道有言順于志必求諸非道盧藏用曰刑獄不濫則人夀賦斂蠲省則人富法令有常則國靜賞罰得中則兵強馬周曰臨天下者以人為本欲令百姓安樂惟在刺史縣令縣令既衆不必皆賢若每州得良刺史則合境蘇息資治通鑑陳子昻曰尚德行者必無凶險之類務公正者必無邪佞之朋保廉節者必憎貪冒之黨有信義者必訾茍且之徒此天地之性物類之情其理自然不可改易吳兢曰以一人之意綜萬方之政明有所難燭智有所難周上心未喻於下下情未逹於上惟以虛受人博覽兼聽使深者不隱逺者不塞所謂明四目逹四聰也李絳曰人臣進言於上豈易哉君有雷霆之威彼晝度夜思始欲存十事俄而去五六及將以聞則又憚而削其半故上逹者止十之二耳雖開納奬勵尚恐不至若譴訶之使直士杜口非社稷利也唐文陸贄曰君天下者必以天下之心為心而不私其心以天下之耳目為耳目而不私其耳目故能通天下之志盡天下之情夫以天下之心為心則我之好惡乃天下之好惡也是以惡者無謬好者不邪以天下之耳目為耳目則天下之聰明皆我之聰眀也是以眀無不鑒聰無不聞又曰君人之道子育為心雖深居九重而慮周四表雖恆處安樂而憂及困窮近取諸身如一體之於四支其疾病無不恤也逺取諸物如兩曜之於萬類其鑒照無不均也故時有豐凶而人無流亡恃天聽之必聞知上澤之將至也又曰總天下之智以助聰明順天下之心以施教令則君臣同志何有不從逺邇歸心無思不服又曰人之所助在乎信信之所立由乎誠守誠於中然後俾衆無惑存信於已可以教人不欺又曰天之視聽皆因乎人天降菑祥皆考其德非於人事之外别有天命也人事著於下而天命降於上天人之間影響相凖又曰聖人制事必度物宜尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚所任愈崇故所擇愈少進不失倫選不失類以類則詳知實行有倫則杜絶徼求是故選自卑逺始升於朝者各委長吏任舉之則下無遺賢矣置於周行既任以事者乃使宰臣序進之則朝無曠職矣才德兼茂歷試不渝者然後人主倚任之則海內無遺士矣又曰核才馭吏有三術焉一曰拔擢以旌其異能二曰黜罷以糾其失職三曰序進以謹其守常如此則髙課者驟升無庸者亟退其餘績非出類守不敗官則循以常資約以定限故得殊才不滯庶品有倫又曰君人者以衆智為智以衆心為心恆恐一夫不盡其情一事不得其理孜孜訪納惟善是求又曰仲尼謂人情者聖王之田言道理所由生也萬化所繫必因人情情有通塞故否泰生情有厚薄故損益生通天下之情者莫智於聖人盡聖人之心者莫深於易象乾下坤上則曰泰坤下乾上則曰否損上益下則曰益損下益上則曰損蓋氣不交則庶物不育情不交則萬邦不和天氣下降地氣上騰然後歲功成君澤下流臣誠上逹然後理道立損益之義亦由是焉又曰聖人之於愛才不惟側席求思而已乃復引進以崇其術業歷試以發其器能旌善以重其言優祿以全其操歲月積久聲實並豐列之於朝則王室尊分之於土則藩鎮重蓋人皆含靈惟所誘致如玉之在璞抵擲則瓦石追琢則圭璋如水之發源壅閼則汚泥疏濬則川沼又曰求善若不及用之懼不周如梓人之任材曲直當分如滄海之歸水洪涓必容不抉瑕不求備不以人廢舉不以已格人聞其才必試以事能其事乃進以班自無不用之材亦無不實之舉又曰接下之道待之以禮煦之以和虛心以盡其言端意以詳其理不形好惡以招諂不大聲色以示威如權衡之懸不作其輕重故輕重自辨無從而詐也如水鏡之設無意於妍媸而妍媸自彰莫得而怨也又曰求才貴廣考課貴精求廣在於各舉所知貴精在於按名責實又曰推誠之道在彰信在任人彰信不在於盡言貴出言則可復任人不可以無擇貴已擇則不疑言而必誠然後可求人之聽命任而勿二然後可責人以成功又曰以能改其過為善以得聞其過為眀故諫者多表我之能好諫者直示我之能賢諫者狂誣眀我之能恕諫者漏泄彰我之能從有一於斯皆為盛德是則人君之與諫者交相益之道也又曰言或乖宜可引過以改其言而不可茍任或乖當可求賢以代其任而不可疑又曰王者爵人必於朝刑人必於市言與衆共之奬而不言其善斯謂曲貸罰而不書其惡斯謂中傷曲貸則授受不眀而私幸之門啓中傷則枉直無辨而讒間之道行可不慎哉白居易曰聖人之為治豈盡得賢而用之乎豈盡知不肖而去之乎將在乎秉其樞操其要剗邪為正變觚為圓能使善之必遷不謂善之盡有能使惡之必改不謂惡之盡無成此功者非他懲勸之所致也劉蕡曰刺史之任治亂之根本繫焉朝廷之法制在焉權可以御豪彊恩可以惠孤寡强可以禦姦寇政可以移風俗茍無治人之術者不當任此官李德裕曰致理之要在於辨羣臣之邪正夫邪正二者勢不相合正人指邪人為邪邪人亦指正人為邪人主辨之甚難又曰人君拒諫有二一曰生於愛名二曰不能去欲唯英主能從諫何者自知功德及人逺矣雖有小過不諱人言也宋王昭素曰治世莫若愛民飬身莫若寡欲錢若水曰髙尚之士不以名位為光寵忠正之士不以窮逹易志操其以爵祿位遇之故而效忠於上中人以下者之所為也田錫曰謀慮者斷之始勇敢者斷之用若謀慮未精成敗未盡見情僞未洞知而不忍小忿小恥卒然奮發自謂決斷斯乃剛愎而趨敗也安得謂之斷哉蓋謀熟而後斷則大功隨之而興智淺而言斷則大患亦隨之而起故智與斷在乎兼備也張詠曰事君者廉不言貧勤不言苦忠不言已效功不言已能可以事君矣王曽曰人臣章奏不可擇利近名須純意於國事又曰用賢人主之事薦人而使之知是徇私市恩也杜衍曰歲有豐凶榖有貴賤豪商大賈乘時收賤水旱之歲則閉糴髙價以圖厚利故常平之法必量户口衆寡出納無壅增損有宜且嚴賞罰課官吏禁借以規利者然後民受其益范仲淹曰朝廷清要之位覬覦者衆必審賢以與之賢傑之材讒疾者衆必先時以辨之聖主眀王常精意於求賢不勞慮於臨事精意求賢則聰眀自廣勞心臨事則叢脞自困精而求之熟而觀之然後置之要地使竭力殫心則政成於下而柄歸於上始可以言無為矣又曰歲饑修城郭倉廒吏舍祠寺兼倡富民興築塘堰可發有餘之財以惠貧民工技食力之人食於官府私家者日數千百人並以贍其老弱救荒之政莫大於此又曰士當先天下之憂而憂後天下之樂而樂又曰善養身者在康寧之時不謂終無疾病於是有節宣方藥之備焉善安國者當太平之時不謂終無危亂於是有教化經略之備焉又曰帝王爵以尚德祿以報功未有賞其空言者又曰凡密陳得失未可盡以為實當深究其宜韓琦曰凡進言於君事不眀辨則忽而不聽論或過當則激而不信當顧體酌宜主於理勝而以至誠將之又曰處事不可有心有心則擾富弼曰人主好惡不可令人窺測可窺測則奸人得以傅㑹當如天之鑒人善惡皆所自取然後誅賞隨之則功罪皆得其實矣包拯曰帝王行事但顧理道如何固不計其言之先入後陳也必若主先入者以為是則姦罔之人逞其敏捷或巧中人或隂圖事惟恐居其後矣又曰凡臣僚上言利害如可為經久之制方許頒行或小有異同非蠧政害民者不可數有更易如此則法存畫一民有定志張方平曰古者合兵農而議政通文武以命官故苟有制勝之術何必擊刺之利乃為武茍有經邦之道何必章句之學乃為文蔡襄曰針闕失獻眀謨擲回邪擊權幸諫官之職也邪人惡之必曰好名以彰君過夫忠臣務盡其心事有必需切直者則極論之人主從而行之適以見從諫之美所謂好名以彰君過則巧佞者所為耳於事之難言者喑而不言擇其所無忤者言之就令不行不復再議退而曰其事我嘗言之矣此之謂好名也且事有缺失諫官最為近密如不盡言人主何從知而改之傳之天下後世終以為過此正所謂彰君過也惟眀君能察忠臣巧佞之分則聰眀廣而利害悉矣蘇舜欽曰四海至逺民有隱情不可以遍照故博采愚賤之言而擇用之萬幾至煩事有習弊不可以獨覽故詳察衆多之議以更張之然後朝無遺政物無遁情又曰惟誠可以應上天惟實可以安下民滕甫曰君子無黨辟之草木綢繆相附者必蔓草非松柏也朝廷無黨雖中主可以濟不然雖上聖亦難之程子曰欲當大任須是篤實又曰善言治者必以成就人材為急務人材不足雖有良法孰與行之又曰天下之事須才與至誠合一方有濟司馬光曰人君之大德有三曰仁曰眀曰武仁非姑息之謂修政治養百姓利萬物此人君之仁也眀非伺察之謂知道義識安危别賢愚辨是非此人君之眀也武非彊亢之謂惟道所在斷之不疑姦不能惑佞不能移此人君之武也又曰水未至而虛為之防水雖不至亦無所害謂水不足憂而不為之防一旦水至則防無所及矣故君子貴於思患而豫防之也又曰王者以天下為家無有逺邇當視之如一不可使惻隱之心止於目前而已又曰人君不行無功之賞則羣下勸人臣不受非分之賜則廉恥立又曰國家必先實而後文安國家利百姓仁之實也保基緒傳子孫孝之實也辨貴賤立綱紀禮之實也和上下親逺邇樂之實也決是非眀好惡政之實也詰姦邪禁暴亂刑之實也察言行試政事求賢之實也量材能課功狀審官之實也詢安危訪治亂納諫之實也選勇果習戰鬭治兵之實也實之不存雖文之盛美無益也故必撥去浮文悉敦本實選任良吏以子惠庶民深謀逺慮以保安宗廟張布綱紀使下無覦心和厚風俗使人無離怨别白是非使萬事得正誅鋤姦惡使威令必行取有益罷無用使野無遺賢進有功退不職使朝無曠官察讜言考得失使謀無不盡擇智將練勇士使征無不服則國家安若泰山又何貴文采之飾哉又曰人之材性各有短長人君當量能授官人臣當陳力就列如此則事無曠廢上下得宜又曰古者諫無官自公卿大夫至於工商無不得諫者漢興以來始置官夫以天下之大四海之衆得失利病萃於一官使言之其為任亦重矣居是官者當志其大舍其細先其急後其緩專利國家而不為身謀彼汲汲於名者猶汲汲於利也其間相去何逺哉又曰爵祿者天下之爵祿非以厚所喜也刑罰者天下之刑罰非以快所怒也是故古者爵人必與士共之刑人必與衆棄之眀不敢以已之私心蓋天下之公議也又曰聖帝眀王聞人之言則能識其是非故謂之聰觀人之行則能察其邪正故謂之眀取是而捨非誅邪而用正確然無所疑故謂之斷誅一不善而天下不善者皆懼故謂之威賞一有功而天下有功者皆喜故謂之福又曰右人有言曰謀之在多斷之在獨謀之多故可以觀利害之極致斷之獨故可以定天下之是非又曰馭下之道恩過則驕驕則不可不戢之以威威過則怨怨則不可不施之以恩恩威之道聖人所以制世御俗猶天地之有隂陽損之益之不失中和以生成萬物者也恩雖至厚而人不敢妬者何也衆人之所與也罰雖至重而人無所怨者何也衆人之所惡也又曰王者撫有四海君臨億兆若事無巨細皆以身親之則所得至寡所失至多矣古語有之曰察目睫者不能見百步察百步者亦不能見目睫非不欲兼之勢不可也是以眀王總其大體執其樞要精選賢能任以百職有功者賞有罪者誅故處躬不勞而收功甚大又曰人臣之進言者捨其急而議其緩則言益繁而用益寡矣人君之納聽者忽其大而謹其細則心益勞而功益淺矣又曰采名而不責實則天下飾名以希功按法而不求情則天下巧文以避罪又曰為人君者灑濯其心至公至正審察善惡眀辨是非忠信者雖有怨讎而必用姦回者雖有私恩而必誅是以羣臣曉然各知所守一心同德以事其上又曰為政有體治事有要以一人之智力兼天下之衆務欲物物而知之日亦不給矣是故尊者治衆卑者治寡治衆者事不得不約治寡者事不得不詳約則舉其大詳則盡其細此自然之勢也又曰眀主之不妄賞賜非吝之也誠以賜一無功則天下無功之人皆有邀覬之心有功之人皆懷怨望惟無功者不能得然後有功者勸又曰夫水之微也捧土可塞及其盛也漂木石沒邱陵火之微也勺水可滅及其盛也焦都邑燔山林故治之於微則用力寡而功多治之於盛則用力多而功寡聖帝眀王皆銷惡於未萌弭禍於未形是以天下隂被其澤而莫知所以然也顧未然之言嘗見棄忽及其已然又無所及夫宴安怠惰肇荒淫之基竒巧珍玩發奢侈之端甘言卑詞啓僥幸之塗附耳屏語開讒賊之門不惜名器導僭逼之源假借威福授凌奪之柄凡此六者其初甚微朝夕狎玩未嘗甚害日滋月益遂至深固比知而革之則用力百倍矣又曰眀君之於聽納無彼無我無親無疏無先無後惟其是而已矣若重我所有而輕彼所陳信其所親而疑其所賤主先入之言而拒後來之議則雖有是者亦不可得而見矣范鎮曰人臣言事當論其是非不當問其難易呂公著曰人主延見羣臣論及人物之臧否尤宜謹密茍有未至則人臣悼後害之及念失身之戒而不敢盡其所言矣蘇洵曰法不足以制天下以法制天下法之所不及天下斯欺之矣故先王本之以至誠使天下所以不吾欺者未必皆吾法之所能禁亦其中有所不忍而已蘇軾曰事慎重則必成輕發則多敗慎重者始若怯終必勇輕發者始若勇終必怯又曰救災恤患尤當在早若災傷之民救之於未飢則用物約而所及廣不過寬減上供糶賣常平官無大失而人人受賜若救之於已饑則用物博而所及微雖大發倉庫虧損課利官為之困而已飢之民終多死亡又曰以寬得愛愛止於一時以嚴得畏畏止於力之所及故寬而見畏嚴而見愛皆聖賢之難事蘇轍曰薄賦斂散蓄聚若以致貧而民安其生盜賊不作縣官食租衣稅廪有餘粟帑有餘帛久而不勝其富也厚賦斂奪民利若以致富而民所入有限所害無窮久而不勝其貧也又曰帝王之治必先正風俗風俗既正中人以下皆自勉以為善風俗既敗中人以下皆自棄而為惡中人自勉於善則人主耳目衆多易與為治中人自棄於惡則臣下朋黨比附易以為非又曰天下之患常伏於其所偏重故內重則為內憂外重則為外患欽定執中成憲卷七
