body:
  text: 欽定四庫全書欽定執中成憲卷六漢新書賈誼曰操德而固則威立教順而必則令行周聽則不蔽稽驗則不惑明好惡則民心化密事端則君道神凡權重者必謹於事令行者必謹於言則過鮮矣史記張釋之曰法者天子所與天下公共也法如此而更重之是法不信于民也廷尉天下之平也一傾而天下用法皆為輕重民安所錯其手足韓詩外傳韓嬰曰原天命治心術理好惡適性情而治道畢矣原天命則不惑禍福不惑禍福則動靜修治心術則不妄喜怒不妄喜怒則賞罰不阿理好惡則不貪無用不貪無用則不害物性適情性則不過欲不過欲則養性知足四者不求于外不假于人反諸己而存矣又曰善御者不忘其馬善射者不忘其弓善為上者不忘其下誠愛而利之四海之內闔若一家又曰君子有主善之心而無勝人之色德足以君天下而無驕肆之容又曰昔者聖王不出户而知天下不窺牖而見天道非目能視乎千里之前非耳能聞乎千里之外以己之情量之也已惡飢寒則知天下之欲衣食也已惡勞苦則知天下之欲安佚也已惡衰乏則知天下之欲富足也知此三者聖王之所以不降席而匡天下也又曰昔之君子道其百姓不使之迷型其仁義謹其教道使民目晰焉而見之使民耳晰焉而聞之使民心晰焉而知之則道不迷而民志不惑矣詩曰示我顯德行故道義不易民不由也禮樂不明民不見也詩曰周道如砥其直如矢言其易也君子所履小人所視言其明也眷言顧之澘焉出涕哀其不聞禮義而就刑誅也又曰夫霜雪雨露殺生萬物者也天無事焉猶之貴天也執法按文治官治民者有司也君無事焉猶之尊君也夫闢土殖榖者后稷也決江疏河者禹也聽獄執中者皋陶也然而聖后者堯也故有道以御之能者為己用無道以御之身雖多能猶將無益于存亡矣又曰順道而行順理而言公平無私不為安肆志不為危激行又曰智如泉源行可以為表儀者人師也智可以砥礪行可以為輔弼者人友也據法守職而不敢為非者人吏也當前順意一呼再諾者人隸也故上主以人師為佐中主以人友為佐下主以人吏為佐危亡之主以人隸為佐又曰治國者譬若乎張琴然大絃急則小絃絶矣又曰觀布衣者其友皆孝悌篤謹畏令如此者家必日益而身曰安此所謂吉人者也觀事君者其友皆誠信有行好善如此者措事日益官職日進此所謂吉臣者也人主朝臣多賢左右多忠主有失敗皆交爭正諫如此者國日安主日尊名聲日顯此所謂吉主者也又曰賞勉罰偷則民不怠兼聽齊明則天下歸之明其分職考其事業較其官能莫不理法則公道逹而私門塞公義立而私事息如是則持厚者進而佞諂者止貪戾者退而亷節者起又曰崇恩博利以懷衆明好惡以正法度率民力稼學校庠序以立教事老養孤以化民升賢賞功以勸善懲姦絀失以醜惡講御習射以防患禁姦止邪以除害接賢連友以廣智宗親族附以益強又曰聖人何以不可欺也曰聖人以己度人者也以心度心以情度情以類度類前漢書董仲舒曰為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一於正而無有邪氣姦其間者是以隂陽調而風雨時羣生和而萬民殖五榖熟而草木茂天地之間被潤澤而大豐美四海之內聞盛德而皆徠臣諸福之物可致之祥莫不畢至又曰夫萬民之從利也如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪並出刑罰不能勝者其隄防壞也古之王者明于此是故南面而治天下莫不以教化為大務立大學以教于國設庠序以化于邑漸民以仁摩民以義節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也又曰天者羣物之祖也故遍覆包涵而無所殊建日月風雨以和之經隂陽寒暑以成之故聖人法天而立道亦溥愛而無私布德施仁以厚之設誼立禮以導之春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也又曰強勉學問則聞見博而知益明強勉行道則德日起而大有功此皆可使還至而立有效也詩曰夙夜匪懈書曰懋哉懋哉皆強勉之謂也又曰天子之大夫者下民之所視效逺方之所四面而內望也近者視而效之逺者望而效之豈可居賢人之位而為庶人行哉夫皇皇求財利常恐匱乏者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之事也負擔者小人之事也此言居君子之位而為庶人之行者其禍患必至也春秋繁露董仲舒曰考績絀陟計事除廢有益者謂之公無益者謂之煩挈名責實不得虛言有功者賞有罪者罰賞罰用于實不用于名賢愚在于質不在于文則百官勸職爭進其功又曰天髙其位而下其施藏其形而見其光髙其位所以為尊也下其施所以為仁也藏其形所以為神見其光所以為明也為人主者法天之行內深藏所以為神外博觀所以為明也任羣賢以受成不自勞于事所以為尊也泛愛羣生不以喜怒賞罰所以為仁也又曰聖人之為天下興利也其猶春氣之生草也各因其生小大而量其多少其為天下除害也若川瀆之瀉于海也各順其勢傾側而制於南北又曰人主以好惡喜怒變俗習天以暖清寒暑化草木人主之好惡喜怒必當義乃出若暖清寒暑必當其時乃發也使好惡喜怒未嘗差也如春秋冬夏未嘗過也可謂參天矣又曰天有和有德有平有威春者天之和也夏者天之德也秋者天之平也冬者天之威也天之序必先和然後發德必先平然後發威以此觀之雖有所愈而喜必先和心以求其當然後發慶賞以立其德雖有所忿而怒必先平心以求其正然後發刑罰以立其威若是者謂之天德前漢書韓安國曰聖人以天下為度者也不以己之私怒傷天下之公義又曰聞之利不什不易業功不百不變常是故古之人君謀事必就聖發政必擇語語古人之善語也重作事也史記司馬遷曰觀三代損益乃知緣人情而制禮依人性而作儀經緯萬端規矩無所不貫誘進以仁義束縛以刑罰所以總一海內而整齊萬民也前漢書東方朔曰天有常度地有常形君子有常行君子道其常小人計其功鹽鐵論桓寬曰治不可以煩煩則亂治不可以怠怠則廢又曰牧民之道除其所疾適其所安安而不擾使而不勞是以百姓勸業而樂公賦又曰築城者先厚其基而後求其高育民者先厚其業而後求其贍又曰古者篤教以導民明辟以正刑刑之於治猶䇿之於御也良工不能無䇿而御有䇿而勿用聖人假法以成教教成而刑不施前漢書王褎曰夫賢者國家之器用也所任賢則趨舍省而功施普器用利則用力少而就效衆路溫舒曰獄者天下之大命也死者不可復生絶者不可復續書曰與其殺不辜寧失不經夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏郤則鍛鍊而周內之蓋奏當之成雖皋陶聽之猶以為死有餘辜何則成練者衆文致之罪明也魏相曰誅亂禁暴謂之義兵兵義則王敵加于己不得已而起者謂之應兵兵應者勝劉向曰舜命九官濟濟相讓和之至也衆賢和于朝則萬物和于野故簫韶九成而鳯凰來儀擊石拊石百獸率舞四海之內靡不和寧及至周文開基西郊雜遝衆賢罔不肅和崇推讓之風以銷分爭之訟周公歌詠文王之德其詩曰於穆清廟肅雍顯相濟濟多士秉文之德當此之時武王周公繼政朝臣和于內萬國歡于外故盡得其歡心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆言四方皆以和來也諸侯和于下天應報于上故周頌曰降福穰穰以和致和獲天助也又曰執狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消故易有否泰小人道長君子道消君子道消則政日亂故為否否者閉而亂也君子道長小人道消小人道消則政日治故為泰泰者通而治也又曰昔孔子與顔淵子貢更相稱譽不為朋黨禹稷與皋陶轉相汲引不為比周何則忠于為國無邪心也故賢人在上位則引而聚之于朝易曰飛龍在天大人聚也顔師古曰言聖人正位臨馭四方則賢人君子皆來見也在下位則思與其類俱進易曰拔茅茹以其彚征吉鄭氏曰茹牽引也彚類也顔師古曰征行也在上則引其類在下則推其類故湯用伊尹不仁者逺而衆賢至類相致也説苑劉向曰巍巍乎惟天為大惟堯則之此蓋人君之公也夫以公與天下其德大矣推之于此行之于彼萬姓之所載後世之所則也彼人臣之公治官事則不營私家當公法則不阿親戚奉公舉賢不避仇讎忠于事君仁于利下伊呂是也故顯名存于今是之謂公又曰易曰君子以除戎器戒不虞夫兵不可玩玩則無威兵不可廢廢則召寇故明王之制國也上不玩兵下不廢武又曰賢臣之事君也受官之日以主為父以國為家以士人為兄弟故茍有可以安國家利人民者不避其難不憚其勞以成其義又曰聖人布德施惠非求報于百姓也郊望禘嘗非求報于鬼神也山致其高雲雨起焉水致其潔蛟龍生焉君子致其道德而福祿歸焉夫有隂德者必有陽報有隱行者必有昭名又曰人臣之行有六正六邪六正者一曰萌牙未動形兆未見昭然獨見存亡之幾得失之要預禁乎未然之前使主超然立乎顯榮之處天下稱焉如此者純臣也二曰虛心白意進善通道勉主以禮誼喻主以長䇿將順其美匡救其惡功成事立歸善于君不敢自伐其勞如此者良臣也三曰夙興夜寐進賢不懈數稱于往古之德行事以厲主意庶幾有益以安國家社稷宗廟如此者忠臣也四曰察幽隱見成敗早防而救之引而復之塞其間絶其源轉禍以為福使君終以無憂如此者智臣也五曰守文奉法任官職事辭祿讓賜不受餽遺衣服端齊飲食節儉如此者貞臣也六曰國家昏亂所為不道然而敢犯主之顔面言主之過失不辭其誅身死國安不悔所行如此者直臣也是為六正也六邪者一曰安官貪祿營于私家不務公事懷其智藏其能主飢于論渴于䇿猶不肯盡節容容乎與世沉浮上下左右觀望如此者具臣也二曰主所言皆曰善主所為皆曰可隱求主之所好進之以快主耳目偷合茍容與主為樂不顧其後害如此者諛臣也三曰中實頗險外容貌小謹巧言令色又心嫉賢所欲進則明其美而隱其惡所欲退則明其過而匿其美使主妄行過任賞罰不當號令不行如此者姦臣也四曰智足以飾非辨足以行説反言易辭而成文章內離骨肉之親外妬亂朝廷如此者讒臣也五曰専權擅勢持操國事以為輕重于私門成黨以富其家又復增加威勢擅矯主命以自貴顯如此者賊臣也六曰諂言以邪墜主不義朋黨比周以蔽明主入則辨言好辭出則更復異其言語使白黑無别是非無間使主惡名布於境內聞於四鄰如此者亡國之臣也是謂六邪又曰高上尊賢無以驕人聰明聖智無以窮人資給疾速無以先人剛毅勇猛無以勝人不知則問不能則學雖知必質然後辨之雖能必讓然後為之質問也又曰存亡禍福其要在身聖人重誡敬慎所忽諺曰誡無垢思無辱夫不誡不思而以存身全國者亦難矣又曰人皆知以食愈飢莫知以學愈愚又曰施德者貴不德施恩者尚必報是故臣勞勤以為君而不求其賞君持施以牧下而無所德故易曰勞而不伐有功而不德厚之至也又曰萬物得其本者生百事得其道者成又曰聖人以心導耳目小人以耳目導心前漢書翼奉曰治道要務在知下之邪正人誠嚮正雖愚為用若乃懷邪知益為害李尋曰土之美者善養禾君之明者善養士中人皆可使為君子蕭望之曰民函隂陽之氣有仁義欲利之心在教化之所助雖堯在上不能去民欲利之心而能令其欲利不勝其好義匡衡曰考制度修外內近忠正逺巧佞放鄭衛進雅頌舉異才開直言任溫良之人退刻薄之吏顯潔白之士昭無欲之路覽六藝之意察上世之務明自然之道博和睦之化以崇至仁匡失俗易民視令海內昭然咸見本朝之所貴又曰匹配之際生民之始萬福之源婚姻之禮正然後品物遂而天命全孔子論詩以關雎為始言太上者民之父母后夫人之行不侔乎天地則無以奉神靈之統而理萬物之宜故詩曰窈窕淑女君子好逑言能致其貞淑不二其操情欲之感無介乎容儀宴私之意不形乎動靜夫然後可以配至尊而為宗廟主此綱紀之首王教之端自上世已來三代興廢未有不由此者也又曰六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖于其本性者也故審六藝之指則天人之理可得而和草木昆蟲可得而育此永永不易之道也論語孝經聖人言行之要宜究其意又曰聖王動靜周旋奉天承親臨朝享臣物有節文以章人倫蓋欽翼祇栗事天之容也溫恭敬遜承親之禮也正躬儼恪臨衆之儀也嘉惠和説饗下之顔也舉錯動作物遵其儀故形為仁義動為法則大雅曰敬慎威儀惟民之則又曰天人之際精祲有以相蕩善惡有以相推事作乎下者象動乎上隂陽之理各應其感又曰治性之道必審己之所有餘而強其所不足蓋聰明疏通者戒于太察寡聞少見者戒于壅蔽勇猛剛強者戒于太暴仁愛溫良者戒于無斷湛靜安舒者戒于後時廣心浩大者戒于遺忘必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進杜欽曰功同賞異則勞臣疑罪均刑殊則百姓惑後漢書魯恭曰萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况于人乎故愛人者必有天報桓談曰善為政者視俗而施教察失而立防威德更興文武迭用然後政調于時鍾離意曰百姓可以德勝難以力服先王要道民用和睦故能致天下太平災害不生禍亂不作鹿鳴之詩必言宴樂者以神人之心洽然後天氣和也班固曰天子作民父母為天下王聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而久立故制禮以崇敬作刑以明威也聖人既躬明哲之性必通天地之心制禮作教立法設刑動緣民情而則天象地故曰先王立禮則天之明因地之性也刑罰威獄以類天之震曜殺戮也溫慈惠和以效天之生殖長育也又曰古人有言天生五材民並用之廢一不可誰能去兵鞭撲不可弛於家刑罰不可廢於國征伐不可廢於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至于刑措兵寢者其本末有序帝王之極功也又曰經謂君為元首臣為股肱明其一體相待而成也白虎通班固曰天雖至神必因日月之明地雖至靈必有山川之化聖人雖有萬人之德必須俊賢以順成其道論衡王充曰太平以治定為效百姓以安樂為符百姓安者太平之驗也百姓安則隂陽和隂陽和則萬物育萬物育則奇瑞出聖主治世期于民安不期符瑞後漢書王符曰富民者以農桑為本以遊業為末百工者以致用為本以巧飾為末商賈者以通貨為本以鬻奇為末又曰國以賢興以諂衰君以忠安以佞危又曰養稂莠者傷禾稼惠姦宄者賊善良書曰文王作罰刑兹無赦先王之制刑罰也非好為傷人肌膚斷人壽命也貴威姦懲貪除人害也潛夫論王符曰聖王之建百官也皆以承天治地物養萬民者也故有號者必稱典名理者必效于實羣僚師尹各列其職以責其效百郡千縣各辨其治以考其績辭言應對各緣其文以核其實則奉職不懈而陳言者不得誣矣又曰榖之所以豐殖者以有人功也功之所以能建者以有日力也君明察而百官治下循正而得其所則民安靜而力有餘聖人深知力者乃民之本國之基故務省役而為民愛日又曰上聖不務治民事而務治民心道之以德齊之以禮務厚其情而明於義民親愛則無相害傷之意動思義則無姦邪之心又曰國無常治又無常亂法令行則國治法令弛則國亂法無常行亦無常弛君敬法則法行君慢法則法弛忠經馬融曰天之所覆地之所載人之所履莫大乎忠忠者中也至公無私天無私四時行地無私萬物生人無私大亨貞中也者一其心之謂夫又曰大臣於君可謂一體下行而上信故能成其忠在乎沉謀潛運正國安人任賢以為理端委而自治尊其君有天地之大日月之明隂陽之和四時之信聖德洋溢頌聲作焉又曰君子之事上也入則獻其謀出則行其政秉職不回言事無憚茍利社稷不顧其身上下用成故昭君德蓋百工之忠也又曰在官惟明蒞事惟平立身惟清三者備矣然後可以理人宣君德以𢎞其化明國法以期於無刑視君之民如視其子則民愛之如愛其親蓋守宰之忠也又曰祇承君之法度行孝弟於其家服勤稼穡以供王賦此兆人之忠也又曰惟天監人善惡必應善莫大於作忠惡莫大於不忠君子守道所以長守其休小人不常所以自陷其咎後漢書崔實曰為國之法有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之粱肉也夫以德教除殘是以粱肉理疾也以刑罰理平是以藥石供養也楊賜曰王者心有所惟意有所想雖未形顔色而五星以之推移陰陽為其變度以此而觀天之與人豈不符哉仲長統曰制地以分人立政以分事明版籍以相數閲審什伍以相連持急農桑以豐委積省末作以一本業敦教學以移性情表德行以勵風俗核才藝以敘官宜簡精悍以習師旅嚴禁令以防僣差信賞罰以驗懲勸糾遊戲以杜姦邪察苛刻以絶煩暴審此以為政務操之有常課之有限安寧勿懈惰有事不迫遽又曰作有利于時制有便于物者可為也事有乖于數法有玩于時者可改也故行于古有其迹行于今無其功者不可不變變而不如前易而多所敗者亦不可不復也申鑒荀悅曰興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政又曰善禁者先禁其身而後人不善禁者先禁人而後身若肆情于身而繩欲于衆行詐于官而矜實于民是捨己之所易而責人之所難也又曰臣所貴乎順者三一曰心順二曰職順三曰道順又曰通于道者其守約有一言而可常行者恕也有一行而可常履者正也恕者仁之術也正者義之要也此謂道根執之心胸之間而功被天下也又曰不求無益之物不蓄難得之貨節華麗之飾退利進之路則民俗清矣放邪説去淫智抑百家崇聖典則道義定矣去浮華舉功實絶末技同本務則事業修矣又曰君子之所以動天地應神明正萬物而成王治者必本乎真實而已故在上者審則儀類以定好惡善惡要于功罪毁譽效于凖驗聽言責事舉名察實無或虛偽以蕩衆心故善無不顯惡無不彰俗無姦怪民無淫風百姓上下睹利害之存乎己也故肅恭其心慎修其行內不忒惑外無異望無罪過不憂懼請謁無所聽財賂無所用則民志平矣是謂正俗又曰榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭撲以加小人治其形也君子不犯辱况于刑乎小人不忌刑况于辱乎若夫中人之倫則刑禮兼焉教化之廢推中人而墜于小人之域教化之行引中人而納于君子之塗是謂章化又曰人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非徒矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣又曰天子朝以聽政晝以訪問夕以修令夜以安身尊有師傅卑有近臣大則講業小則咨詢不拒直辭不恥下問又曰君臣親而有禮百僚和而不同讓而不爭勤而不怨此治國之風也又曰違上順道謂之忠臣違道順上謂之諛臣忠所以為上也諛所以自為也忠臣安于心諛臣安于身故在上者必察于違順審乎所為慎乎所安又曰心誠則神明應之况于萬民乎志正則天地順之况于萬物乎前漢紀荀悅曰德必核其實然後授位能必核其實然後授事功必核其實然後授賞罪必核其實然後授刑行必核其實然後貴之言必核其實然後信之物必核其實然後用之事必核其實然後修之一物不稱則榮辱賞罰從而繩之故衆正積于上萬事實于下中論徐幹曰人君之所務者其在大道逺數乎大道逺數者仁足以覆幬羣生惠足以撫養百姓明足以照見四方知足以統理萬物權足以變應無端義足以阜生財用威足以禁遏姦非武足以平定禍亂詳于聽受而審于官人逹于興廢之原通于安危之分如此則君道備矣又曰大臣者君之股肱耳目也所以視聽也所以行事也先王知其如是故博求聰明􅌖哲君子措諸上位執邦之政令焉則其事舉其事舉則百僚任其職百僚任其職則庶事莫不致其治庶事致其治則九牧之民莫不得其所故書曰元首明哉股肱良哉庶事康哉大臣者治萬邦之重器也不可以衆譽著也人主所宜親察也衆譽者可以聞斯人而已故堯之聞舜也以衆譽及其任之也則以心之所自見又曰當賞者不賞則為善者失本望而疑其所行當罰者不罰則為惡者輕國法而怙其所守故司馬法曰賞罰不踰時欲使民速見善惡之報也踰時且猶不可而况廢之者乎三國心書諸葛亮曰知人之性最難美惡既殊情貌不一有溫良而為詐者有外恭而內欺者有外勇而內怯者有盡力而不忠者不可不察又曰勿以身貴而賤人勿以獨見而違衆勿以巧佞而為忠信又曰為將之道軍井未汲將不言渴軍米未炊將不言飢軍火未然將不言寒軍幕未施將不言困又曰知人之道間之以是非而觀其志窮之以辭辨而觀其變咨之以計謀而觀其識告之以艱難而觀其勇臨之以利而觀其亷期之以事而觀其信又曰用人之道尊之以爵贍之以財則士無不奮矣接之以禮勵之以信則士無不忠矣恩意不倦法若畫一則士無不服矣先之以身後之以人則士無不勇矣小善必録小功必賞則士無不勸矣忠武集諸葛亮曰忠益者莫大于進人進人者各務其所尚又曰君子之行靜以修身儉以養德非淡泊無以明志非寧靜無以致逺夫學須靜也才須學也非學無以廣才非靜無以成學蜀書諸葛亮曰宮中府中俱為一體賞罰臧否不宜異同又曰威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為治之要於斯而著張裔曰賞不遺逺罰不阿近爵不可以無功取刑不可以貴勢免此賢愚之所以僉忘其身者也魏文曹植曰天地協氣而萬物生君臣合德而庶政成又曰論德而授官者成功之君也量能而受爵者敬事之臣也故君不可虛授臣不可虛受王粲曰八政之於民也以食為首故仰伺星辰以審其時俯耕藉田以率其力封祀農稷以神其事祈榖報年以寵其功設農師以監之置田畯以董之黍稷茂則受賞田不墾則加罰農地益闢則吏受大賞農損地荒則吏受重罰也魏書杜恕曰帝王之道莫尚乎安民安民之術在於豐財豐財者務本而節用也魏志陳羣曰臣下雷同是非相蔽國之大患也若不和睦則有讎黨毁譽無端真偽失實不可不深防備有以絶其源流欽定執中成憲卷六
